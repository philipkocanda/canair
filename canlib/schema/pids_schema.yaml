# ECU Definition Schema
# Validates the per-ECU YAML files in the profile's `ecus/` directory.
# Each file is the SINGLE source of truth for one ECU: address, identity,
# probe history, DTC meanings, and all readable/actuatable data.
# Run: canair validate pids   (alias: canair validate ecus)
#
# Each ECU file (e.g. bcm.yaml) must have this top-level structure:
#   ECU_NAME:              # the canonical short name IS the top-level key
#     tx_id: 0xNNN         # required — hex OBD-II request arbitration ID (RX = TX + 8)
#     identity:            # optional — who this module is (see identity_fields)
#       description: str   # human-readable module name
#       part_number: str   # from F187/F188 (UDS) or 1A 8x (KWP2000)
#       id_protocol: UDS   # how identity DIDs are read (see valid_id_protocols)
#       ...                # see identity_fields below
#     availability: [...]  # optional — ECU-level session control (1001) availability
#                          #   States: sleep, plugged, acc, acc2, ready, charging
#     session: bool        # optional — requires extended diagnostic session (10 03)
#     scan_log:            # optional — probe-history audit (see scan_log_entry_fields)
#       - service: 0x22
#         range: "0101-010F"
#         date: 2026-07-22
#         hits: 0
#     dtcs:                # optional — manufacturer DTC meanings (see dtcs_fields)
#       B2915:
#         description: str
#     pids:                # optional — readable PIDs (identity-only modules omit this)
#       PID_CODE:          # e.g. 22C00B, 2101
#         period: N        # polling interval in ms (optional, default 5000)
#         enabled: bool    # include in profiles (optional, default true)
#         ignored: bool    # hide from queries/profiles (optional, default false)
#                          # Use for DIDs that returned NRC or contain no useful data.
#                          # Ignored PIDs are still documented but excluded from
#                          # build_ecu_index, generate-profile, and query commands.
#         notes: str       # optional — PID-level notes
#         parameters:
#           PARAM_NAME:
#             expression: str     # required — WiCAN formula
#             unit: str           # optional — display unit
#             ...                 # see optional_param_fields below
#
# Profile-wide settings live one level up in `<profile>/profile.yaml`:
#   car_model: str
#   init: str              # AT command init string
#   response_timeout_ms: int   # ELM ATST response timeout in ms (--elm-timeout overrides)
#   multi_did_batching: bool   # profile default for per-ECU service-22 multi-DID batching
#   failure_types: {0xNN: str} # optional — DTC failure-type byte meanings (profile-wide)

required_ecu_fields:
  - tx_id

optional_ecu_fields:
  - identity        # ECU identity (name/part-number/protocol) — see identity_fields
  - availability    # ECU-level: when the ECU responds to session control (10 01)
  - session
  - multi_did       # bool: attempt UDS service-22 multi-DID batching on this ECU
  - response_timeout_ms  # int: per-ECU UDS response budget in ms (slow ECUs get more;
                         #   overridden by the global --timeout flag). See canlib.timeouts.
  - scan_log        # Probe-history audit log — see scan_log_entry_fields below
  - dtcs            # Manufacturer-specific DTC meanings — see dtcs_fields below
  - pids            # Readable PIDs (omit for identity-only modules like AMP/SRS)
  - iocontrol       # IOControl (service 2F) commands — see iocontrol_fields below
  - iocontrol_discoveries  # Raw 0x2F SF 00 scanner output — see iocontrol_discoveries_fields
  - research        # Untested/undecoded PIDs and scan TODOs — see research_fields below
  - routines        # RoutineControl (service 0x31) discoveries — see routines_fields below

# Identity section (under ECU_NAME.identity) — who this module is. The canonical
# short name is the top-level ECU key, not a field here. All fields optional.
identity_fields:
  optional:
    - alias          # secondary name the ECU self-identifies as (e.g. SMK for SKM)
    - description    # human-readable module name
    - part_number    # from F187/F188 (UDS) or 1A 8x (KWP2000)
    - mfg_date       # manufacturing / calibration date
    - hw_version
    - sw_version
    - hw_sw          # combined hardware/software id (some ECUs)
    - boot_sw        # bootloader software version
    - app_sw         # application software version
    - fw_version
    - firmware
    - software        # legacy alias for firmware/sw_id (some ECU identity blocks)
    - serial         # from F18C/F18B
    - ecu_id         # from F110 / KWP2000 1A8C
    - sw_id
    - calibration
    - supplier
    - diag_address   # from F1A0
    - vin            # from F190
    - id_protocol    # how identity DIDs are read (see valid_id_protocols)
    - identity_confidence  # how sure we are of this ECU's identity (see valid_identity_confidence)
    - notes

# Accepted values for identity.id_protocol.
valid_id_protocols:
  - UDS            # ISO 14229 — identity via 22 F1xx
  - KWP2000        # ISO 14230 — identity via 1A 8x/9x
  - none           # responds to session control but exposes no identity DIDs
  - unknown        # not yet determined

# Accepted values for identity.identity_confidence — how well-established the
# ECU's identity is. Omit to let the tool derive it from evidence.
#   confirmed    — identity read from the ECU (part number) and/or physically
#                  or behaviorally verified for this car.
#   probable     — self-reported identity fields present, OR multiple converging
#                  circumstantial evidences.
#   tentative    — single weak basis (cross-vehicle address match or behavioral
#                  guess) with no self-reported identity.
#   speculative  — address-proximity or naming guess with little/no support.
valid_identity_confidence:
  - confirmed
  - probable
  - tentative
  - speculative

# scan_log section (under ECU_NAME.scan_log) — a list of probe outcomes tracking
# which UDS/KWP service+range combos were tried on this ECU.
scan_log_entry_fields:
  optional:
    - service
    - range
    - date
    - hits
    - probes
    - state
    - notes

# dtcs section (under ECU_NAME.dtcs) — manufacturer-specific meanings for this
# ECU's Diagnostic Trouble Codes. Keys are the base SAE code WITHOUT the -FTB
# suffix (e.g. B2915, not B2915-00). The tool derives structural interpretation
# (category / generic-vs-manufacturer / failure-type byte) on its own; this
# supplies the meanings it cannot infer. Profile-wide failure-type byte meanings
# live in <profile>/profile.yaml under `failure_types:`.
dtcs_fields:
  optional:
    - description
    - causes
    - source
    - source_links
    - verified
    - notes

required_pid_fields: []

optional_pid_fields:
  - period
  - enabled
  - ignored
  - availability     # When this PID responds. Array of car power states:
                     #   sleep    — deep sleep, 12V standby only (unplugged)
                     #   plugged  — charge cable connected (AC or DC)
                     #   acc      — ACC1, one start button press, accessory power
                     #   acc2      — ACC2/IGN, two presses without brake, full ignition, no HV
                     #   ready    — brake + start, HV active, driveable
                     #   charging — actively charging (implies plugged)
                     # These are independent properties — e.g. [sleep, plugged] means
                     # the ECU responds both during unplugged sleep AND when plugged in.
                     # Empty array [] means untested/unknown. Omitting is also valid.
  - notes
  - parameters

required_param_fields:
  - expression

optional_param_fields:
  - unit
  - ha_class
  - mqtt_topic
  - min
  - max
  - source
  - source_links
  - verified
  - notes
  - enabled
  - display

required_meta_fields:
  - car_model
  - init

# IOControl section (service 0x2F) — per-ECU actuator commands.
# Lives under ECU_NAME.iocontrol alongside ECU_NAME.pids.
# Format:
#   iocontrol:
#     DID_HEX:                         # e.g. BC01, B05B
#       label: str                     # Human-readable name (required)
#       verified: bool                 # Tested on this car? (same as PID parameters)
#       on: str                        # Full hex command for ON (e.g. "2FBC0103")
#       off: str                       # Full hex command for OFF (e.g. "2FBC0100")
#       notes: str                     # Additional context (use > for multiline)
#       session: bool                  # Requires extended session (default: true)
#       hold: bool                     # Needs --hold to keep active (default: true)
#
# Control type suffixes (appended to 2F<DID>):
#   03 = shortTermAdjustment (ON)
#   00 = returnControl (OFF / release)
#
# Usage with canreq.py:
#   python3 canreq.py --raw <TX_ID>:<on_command> --hold
#   e.g.: python3 canreq.py --raw 770:2FBC0103 --hold
iocontrol_fields:
  - label
  - verified
  - "on"
  - "off"
  - notes
  - session
  - hold
  - status_param   # optional: param name from pids section to query as status indicator

# Research section — untested PIDs, undecoded captures, pending scans, and
# IOControl discovery. Lives under ECU_NAME.research alongside pids/iocontrol.
# Items graduate to pids/iocontrol once decoded/verified; mark research entry "done".
#
# Format:
#   research:
#     - type: scan | decode | verify | iocontrol_scan
#       target: "22 E001-E010"     # PID, DID range, or scan description
#       status: pending | captured | nrc | done
#       priority: P1 | P2 | P3    # P1=high value, P2=medium, P3=speculative
#       prerequisite: [acc]        # Car power states needed (same as availability)
#       date: "2026-04-15"         # When last tested (optional)
#       result: "..."              # Short result summary (optional)
#       notes: "..."               # Details, what to look for
#       sources: [...]             # Cross-references (URLs, file references)
#       what_to_test: [...]        # Specific things to check (optional)
#       capture_protocol: "..."    # How to capture the data needed to decode (optional)
#
# type values:
#   scan           — broad PID/DID range scan not yet performed
#   decode         — response captured but payload not decoded
#   verify         — parameter exists but value unverified on this car
#   iocontrol_scan — IOControl (2F) discovery scan
research_fields:
  required: [type, target, status]
  optional: [priority, prerequisite, date, result, notes, sources, what_to_test, capture_protocol]

# Routines section — RoutineControl discovery results.
# Populated by `canair scan routines` (UDS 0x31 SF03 requestRoutineResults with
# 4-digit RID keys, or KWP2000 0x33 RequestRoutineResultsByLocalIdentifier with
# 2-digit LID keys). Lives under ECU_NAME.routines.
#
# Format:
#   routines:
#     RID_HEX:                       # 4-digit hex Routine Identifier (e.g. F010)
#       response: str                # hex payload of positive 71-response (optional)
#       nrc: 0xNN                    # negative response code (if NRC-based hit)
#       nrc_desc: str                # NRC description text
#       label: str                   # optional human label (filled in as research proceeds)
#       verified: bool               # optional — tested/decoded on this car
#       notes: str                   # optional — findings, cross-refs
#
# Exactly one of {response, nrc} is set per hit. Routines enter here from
# the scanner as leads; promotion to iocontrol (if start-routine is ever
# attempted and verified safe) is a manual step and requires explicit consent.
routines_fields:
  optional: [response, nrc, nrc_desc, label, verified, notes]

# IOControl discoveries section — IOControl discovery scan output (UDS 0x2F SF 00
# returnControlToECU, or KWP2000 0x30 IOCP 00). Populated by `canair scan iocontrol`.
# Lives under
# ECU_NAME.iocontrol_discoveries. Distinct from ECU_NAME.iocontrol (the
# curated, human-authored actuator list) so the scanner can rerun without
# clobbering on/off/notes.
#
# Format: same shape as routines_fields — each entry is a DID_HEX (4-digit
# hex) mapping to {response, nrc, nrc_desc, label, verified, notes}.
# Exactly one of {response, nrc} is set per hit.
#
# Promotion workflow: a discovery becomes a real iocontrol entry manually
# once on/off commands have been determined and verified on the car.
iocontrol_discoveries_fields:
  optional: [response, nrc, nrc_desc, label, verified, notes]
