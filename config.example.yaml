# canair configuration
#
# canair looks for this file at $XDG_CONFIG_HOME/canair/config.yaml
# (default: ~/.config/canair/config.yaml). A legacy ./config.yaml in the repo
# root is still read (and overridden by the user config) for backwards compat.
#
# Copy to your config location and adjust to taste. All keys are optional.
#
# View and edit these settings from the CLI with `canair config`
# (e.g. `canair config show`, `canair config set default_wican home`).

# Which vehicle profile to use when none is given on the command line.
# Overridden by --profile or the CANAIR_PROFILE environment variable.
# If exactly one profile is discovered, it is auto-selected and this is optional.
default_profile: ioniq-2017

# Extra directory to search for vehicle profiles (in addition to
# ~/.config/canair/profiles and the repo-bundled profiles/). Local profiles
# placed here are never committed to the repo.
# profiles_dir: ~/vehicles

# WiCAN device addresses for the --wican flag. Values can be IPs or hostnames.
# --wican accepts any alias defined here, or an arbitrary URL/IP.
wican_addresses:
  ap: "192.168.80.1"    # Direct connection to WiCAN AP (factory default)
  home: "192.168.1.100" # Example: device on your home LAN
  vpn: "10.0.0.100"     # Example: device reachable via VPN/tunnel

default_wican: ap

# WiCAN hardware model: "pro" (default) or "classic" (the regular, non-Pro WiCAN).
# The classic WiCAN has no AutoPID profile support and no ELM327
# WebSocket terminal, so with wican_model: classic canair refuses:
#   - `canair wican autopid upload/download/diff` and `canair wican mode set`
#     (AutoPID sync / mode switch), and
#   - the `wican-ws` transport (ELM327 WebSocket terminal).
# Everything else — reading/scanning/decoding over the default slcan-tcp
# transport, and generating AutoPID JSON with `canair wican autopid write` —
# works on both models. Leave unset (or "pro") if you have a WiCAN Pro.
# wican_model: pro

# CAN transport selection (advanced). Chosen explicitly; never auto-detected.
# The type/host are overridden per-command by --transport/--wican; port and
# bitrate are config-only (no CLI flags). When the type is omitted, canair
# defaults to slcan-tcp (the canonical default — works on both the WiCAN Pro and
# the classic WiCAN), using the wican_addresses/default_wican host above.
# The wican-ws transport requires a WiCAN Pro (see wican_model above).
# transport:
#   type: slcan-tcp      # slcan-tcp (raw SLCAN over TCP, default) | wican-ws (WebSocket ELM327, Pro-only)
#   host: 192.168.3.2    # device host/IP (both transports)
#   port: 35000          # slcan-tcp only (Pro 35000, classic 3333); auto-detected if omitted
#   bitrate: 500000      # slcan-tcp only; defaults to the profile's can_datarate, else 500000
