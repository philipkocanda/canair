  - date: "2026-04-15"
    label: "Charging, dash on, doors unlocked — door/lock PID verification"
    notes: >
      AC charging at home. Dashboard on, all doors closed, all doors UNLOCKED.
      Extended diagnostic session (1003) required for IGPM 22BC03/04/06.
      Verification session to confirm door open/lock bit positions.
    captures:
      - ecu_tx: 0x770
        ecu_rx: 0x778
        ecu_name: IGPM
        pid: "22BC03"
        payload: "62BC03FDEE3C7300600000AAAA"
        state: "all doors closed, UNLOCKED, charging, dash on"
        notes: >
          13 bytes (11 data + 2 padding 0xAA).
          Byte 7 = 0x00 (compare: 0x20 ACC, 0x0A keyfob).
          Byte 8 = 0x60 = 01100000. Bit 5 (B10:5) = 1, bit 6 (B10:6) = 1.
          All DOOR_*_OPEN bits (B10:0,2,4,5) read 0 — doors closed.
          TRUNK_OPEN (B10:7) = 0.
          DOOR_LOCK_RL (1-B10:1) = 1, DOOR_LOCK_RR (1-B10:3) = 1 — but doors are UNLOCKED.

      - ecu_tx: 0x770
        ecu_rx: 0x778
        ecu_name: IGPM
        pid: "22BC04"
        payload: "62BC04B53FF4EA01000042AAAA"
        state: "all doors closed, UNLOCKED, charging, dash on"
        notes: >
          13 bytes (11 data + 2 padding 0xAA).
          DOOR_LOCK_FL (B10:3) = 0, DOOR_LOCK_FR (B10:2) = 0.

      - ecu_tx: 0x770
        ecu_rx: 0x778
        ecu_name: IGPM
