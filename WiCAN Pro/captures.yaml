  - date: "2026-04-14"
    label: "ACC mode (accessory on, parked)"
    notes: >
      Car in accessory mode (ACC), not charging, parked, all doors closed and locked.
      SKM wakeup (2FB108030A0A05 on 0x7A5) was used earlier in this session to bring
      ECUs online during charging — ACC stayed on even after ACC Off and ECU Reset commands.
      User then manually put car in ACC mode. All IGPM, CLU, TPMS, ESC responding.
      IGPM 22BC08-0A return NRC 0x31 (requestOutOfRange) — those DIDs don't exist.
    captures:
      - ecu_tx: 0x770
        ecu_rx: 0x778
        ecu_name: IGPM
        pid: "22BC01"
        payload: "62BC01400000000002"
        notes: "9 bytes."

