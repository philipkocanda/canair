# -----------------------------------------------------------------------------
# SECTION 2: IOControl Commands (Service 0x2F)
# WARNING: These ACTUATE physical hardware. Only test with car stationary,
#          in safe conditions, doors closed where relevant.
# Require extended diagnostic session (10 03) and TesterPresent keepalive.
# -----------------------------------------------------------------------------

iocontrol:

  # ===========================================================================
  # IGPM IOControl (0x770) — SCAN RESULTS FROM 2026-04-15
  # ===========================================================================
  # Full scan of BC00-BC20 performed. WARNING: scan triggered car alarm by
  # actuating trunk unlock (BC09) and door lock/unlock (BC10/BC11).
  # NEVER scan IOControl ranges blindly — test individual commands only.
  # Lock/unlock/trunk tests must be done with the key fob in or near the
  # car to prevent the horn/alarm from triggering.
  #
  # IOControl actuators require extended session (1003) + TesterPresent (3E00)
  # keepalive. Actuator releases when session drops.
  # Use: can-request.py --raw 770:2FBC0103 --hold
  # ===========================================================================

  - ecu:          IGPM
    tx_id:        "0x770"
    prerequisite: ext_sess
    scan_date:    "2026-04-15"
    commands:
      - cmd: "2FBC0103"
        desc: "Head light low beam ON"
        off: "2FBC0100"
        priority: P2
        status: verified
        notes: "Confirmed working 2026-04-15. Positive response 6FBC0103."
      - cmd: "2FBC0203"
        desc: "Head light high beam ON"
        off: "2FBC0200"
        priority: P2
        status: accepted
        notes: "Positive response in scan. Not visually tested."
      - cmd: "2FBC0303"
        desc: "Front fog light ON"
        off: "2FBC0300"
        priority: P2
        status: verified
        notes: "Confirmed 2026-04-15 — nothing visible. Ioniq 2017 base trim has no fog lights (no bulb installed). DID accepted by ECU."
      - cmd: "2FBC0403"
        desc: "Tail/rear light ON"
        off: "2FBC0400"
        priority: P2
        status: verified
        notes: "Confirmed working 2026-04-15. Tail lights on."
      - cmd: "2FBC0503"
        desc: "Red backlight flash (CHMSL?)"
        priority: P3
        status: verified
        notes: "Confirmed 2026-04-15 — nothing visible. May be CHMSL (center high-mount stop lamp) flash, or requires specific conditions."
      - cmd: "2FBC0703"
        desc: "Horn"
        priority: P3
        status: verified
        notes: "CONFIRMED 2026-04-15 — HORN! Not labeled in Soul/e-Niro tables. Activates horn immediately."
      - cmd: "2FBC0803"
        desc: "Rear fog light ON"
        off: "2FBC0800"
        priority: P3
        status: verified
        notes: "Confirmed working 2026-04-15. Rear fog light on."
      - cmd: "2FBC0903"
        desc: "Trunk unlock"
        priority: P1
        status: verified
        notes: "CONFIRMED WORKING 2026-04-15 — triggered car alarm during scan! Use with extreme caution."
      - cmd: "2FBC0A03"
        desc: "Welcome/approach light? (puddle lights or DRL greeting)"
        priority: P3
        status: accepted
        notes: "Positive response in scan. Not visually tested. Likely puddle lights or DRL greeting on unlock — safe to test."
      - cmd: "2FBC0B03"
        desc: "Rear washer ON"
        off: "2FBC0B00"
        priority: P3
        status: rejected
        notes: "NRC 0x31 (requestOutOfRange). Not supported on Ioniq 2017."
      - cmd: "2FBC0C03"
        desc: "Defogger ON"
        off: "2FBC0C00"
        priority: P2
        status: accepted
        notes: "Positive response in scan. Not visually tested."
      - cmd: "2FBC1003"
        desc: "Door LOCK all"
        priority: P1
        status: verified
        notes: "CONFIRMED WORKING 2026-04-15 — triggered car alarm during scan!"
      - cmd: "2FBC1103"
        desc: "Door UNLOCK all"
        priority: P1
        status: verified
        notes: "CONFIRMED WORKING 2026-04-15 — triggered car alarm during scan! Note: uses standard 2F prefix (not 6F as in Kia Soul docs)."
      - cmd: "2FBC1203"
        desc: "Individual door unlock? (driver door only per Soul 6F pattern)"
        priority: P3
        status: accepted
        notes: "Positive response in scan. Soul uses 6F BC 12/13/14 for per-door unlock. May unlock driver door only. Alarm risk — test with keyfob ready."
      - cmd: "2FBC1303"
        desc: "Unknown"
        priority: P3
        status: rejected
        notes: "NRC 0x22 (conditionsNotCorrect). May need ignition on or other precondition."
      - cmd: "2FBC1403"
        desc: "Individual door unlock? (rear door per Soul 6F pattern)"
        priority: P3
        status: accepted
        notes: "Positive response in scan. Part of Soul's per-door unlock sequence (BC12/13/14). Alarm risk — test with keyfob ready."
      - cmd: "2FBC1503"
        desc: "Left turn indicator ON"
        off: "2FBC1500"
        priority: P2
        status: verified
        notes: "Confirmed working 2026-04-15. Left indicator turned on."
      - cmd: "2FBC1603"
        desc: "Right turn indicator ON"
        off: "2FBC1600"
        priority: P2
        status: verified
        notes: "Confirmed working 2026-04-15. Right indicator turned on."
      - cmd: "2FBC1803"
        desc: "DRL (daytime running lights)"
        off: "2FBC1800"
        priority: P2
        status: verified
        notes: "Confirmed working 2026-04-15. DRL turned on — user verified visually."
      - cmd: "2FBC1B03"
        desc: "Reverse light / side marker?"
        priority: P3
        status: accepted
        notes: "Positive response in scan. Not visually tested. Another lighting output in post-turn-signal DID range. Safe to test."
      - cmd: "2FBC1C03"
        desc: "Luggage lamp ON"
        off: "2FBC1C00"
        priority: P3
        status: rejected
        notes: "Response was 3E007E00 (TesterPresent echo, not IOControl response). Likely timing artifact."
      - cmd: "2FBC3F03"
        desc: "Charge cable LOCK"
        priority: P2
        status: untested
        notes: "Not in BC00-BC20 scan range. Still untested."
      - cmd: "2FBC4103"
        desc: "Charge cable UNLOCK"
        priority: P2
        status: untested
        notes: "Not in BC00-BC20 scan range. Still untested."

    rejected_dids:
      - did: "BC00"
        nrc: "0x31"
        desc: "requestOutOfRange — no DRL IOControl"
      - did: "BC06"
        nrc: "0x31"
        desc: "requestOutOfRange"
      - did: "BC0B"
        nrc: "0x31"
        desc: "requestOutOfRange — rear washer not supported"
      - did: "BC0D"
        nrc: "0x31"
        desc: "requestOutOfRange"
      - did: "BC0E"
        nrc: "0x31"
        desc: "requestOutOfRange"
      - did: "BC13"
        nrc: "0x22"
        desc: "conditionsNotCorrect — may need ignition"
      - did: "BC17"
        nrc: "0x31"
        desc: "requestOutOfRange"
      - did: "BC19"
        nrc: "0x31"
        desc: "requestOutOfRange"
      - did: "BC1A"
        nrc: "0x31"
        desc: "requestOutOfRange"

  # ===========================================================================
  # BCM IOControl (0x7A0) — SCAN PARTIAL (B000-B072 done, B073-B0FF incomplete)
  # ===========================================================================
  # BCM IOControl requires extended session (1003) AND SKM ACC+IGN1 power.
  # Scanned 2026-04-15 with returnControlToECU (--append 00, safe).
  # B061 (charge door open from e-Niro) = NRC 0x31, NOT supported on Ioniq.
  #
  # Accepted DIDs (B000-B072): B003, B006, B008, B009, B00A, B00F, B019, B01A,
  #   B025, B028, B029, B030, B038, B039, B03A, B03B, B04D, B057, B059, B05A,
  #   B05B, B05C, B071, B072
  # Rejected (NRC 0x31): everything else in B000-B072 incl. B061
  # B073-B0FF: NOT SCANNED (SKM session dropped, needs re-scan)

  - ecu:          BCM
    tx_id:        "0x7A0"
    prerequisite: ext_sess_skm_acc
    commands:
      # ─── Known/labeled (from e-Niro + confirmed scan) ───
      - cmd: "2FB01903"
        desc: "Room lamp (interior light)"
        off: "2FB01900"
        priority: P2
        status: accepted
        notes: "DID exists on Ioniq. Untested for visible effect."
      - cmd: "2FB01A03"
        desc: "Unknown — adjacent to room lamp"
        off: "2FB01A00"
        priority: P3
        status: accepted
      - cmd: "2FB05703"
        desc: "Unknown — mirror/handle region"
        off: "2FB05700"
        priority: P3
        status: accepted
      - cmd: "2FB05903"
        desc: "Heated door handle ON"
        off: "2FB05900"
        priority: P2
        status: accepted
        notes: "May not exist on Ioniq 2017 base trim (no heated handles)."
      - cmd: "2FB05A03"
        desc: "Heated door handle LED ON"
        off: "2FB05A00"
        priority: P3
        status: accepted
      - cmd: "2FB05B03"
        desc: "Mirrors fold"
        priority: P1
        status: verified
        notes: "Confirmed working on Ioniq 2017."
      - cmd: "2FB05C03"
        desc: "Mirrors unfold"
        priority: P1
        status: verified
        notes: "Confirmed working on Ioniq 2017."
      - cmd: "2FB06103"
        desc: "Charge door open (e-Niro)"
        priority: P1
        status: rejected
        notes: "NRC 0x31 — NOT supported on Ioniq 2017. Tested with and without
                ACC power. Charge port flap may not have a remote-open actuator
                on this model."
      - cmd: "2FB07103"
        desc: "Unknown"
        off: "2FB07100"
        priority: P3
        status: accepted
      - cmd: "2FB07203"
        desc: "Unknown"
        off: "2FB07200"
        priority: P3
        status: accepted
      # ─── Unknown DIDs (accepted in scan, no label) ───
      - cmd: "2FB00303"
        desc: "Unknown — low DID range (status/config?)"
        off: "2FB00300"
        priority: P3
        status: accepted
      - cmd: "2FB00603"
        desc: "Unknown"
        off: "2FB00600"
        priority: P3
        status: accepted
      - cmd: "2FB00803"
        desc: "Unknown"
        off: "2FB00800"
        priority: P3
        status: accepted
      - cmd: "2FB00903"
        desc: "Unknown"
        off: "2FB00900"
