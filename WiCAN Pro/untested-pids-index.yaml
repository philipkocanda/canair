# -----------------------------------------------------------------------------
# SECTION 4: SESSION PLAN
# Recommended order of operations for a testing session.
# -----------------------------------------------------------------------------

session_plan:

  keyfob_wake:
    description: "Car sleeping, wake with keyfob (no ACC)"
    duration_est: "5 min"
    tests:
      - "BMS 0x7E4: scan 22 BC01-BC0B (always-on ECU)"
      - "BMS 0x7E4: scan 22 B002-B005"
      - "BMS 0x7E4: scan 22 E003-E005"
      - "Gateway 0x7E6: test additional PIDs beyond 2180"
      - "LDC 0x7CD: test 2101"
      - "OBC/LDC 0x7E5: test 22E011 (LDC aux battery monitoring)"

  acc_on:
    description: "ACC on via keyfob or SKM wakeup"
    duration_est: "15 min"
    tests:
      - "IGPM 0x770: verify BC03/04 door/lock params (open/close doors)"
      - "IGPM 0x770: decode BC01/02/05/06/07 captured responses"
      - "BCM 0x7A0: scan B001-B012 and C001-C00F"
      - "BCM 0x7A0: test 22B00E charge port flap"
      - "VCU 0x7E2: scan 22 E001-E010"
      - "VCU 0x7E2: decode 2102 (motor/inverter data)"
      - "MCU 0x7E3: scan 22 E001-E010"
      - "MCU 0x7E3: re-decode 2101 (compare with Ioniq 5 22E001 signals)"
      - "HVAC 0x7B3: scan 220100-22010B"
