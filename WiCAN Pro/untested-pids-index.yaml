# =============================================================================
# Ioniq 2017 (28 kWh) — Untested ECU/PID Index
# =============================================================================
#
# Generated: 2026-04-15
#
# This file indexes all ECU/PID combinations that have potential for containing
# useful information and have NOT yet been successfully queried and decoded.
#
# Use with can-request.py:
#   python3 can-request.py --raw <tx_id>:<pid>          # single PID
#   python3 can-request.py --scan --tx <tx_id> --service 22 --range <start>-<end>
#
# Status legend:
#   untested       — never queried on Ioniq 2017
#   captured       — response captured but not decoded
#   partial        — some params decoded, others remain
#   nrc            — returned Negative Response Code (noted which)
#   unverified_id  — ECU arbitration ID itself is unconfirmed for Ioniq 2017
#
# Priority legend:
#   P1 — high value, likely to work (confirmed ECU + cross-platform evidence)
#   P2 — medium value, good chance (confirmed ECU, untested PID range)
#   P3 — speculative (unverified ECU ID or ChatGPT-only source)
#
# Prerequisite legend:
#   acc       — requires ACC/ignition on (keyfob wake insufficient)
#   charging  — requires AC or DC charging active
#   driving   — requires vehicle in motion
#   always    — responds even with keyfob wake
#   ext_sess  — requires extended diagnostic session (10 03)
#   sec_acc   — requires security access (27 01/02)
#
# =============================================================================

# -----------------------------------------------------------------------------
# SECTION 1: READ PIDs (Service 0x21 and 0x22)
# These are safe diagnostic reads — no risk of actuating anything.
# -----------------------------------------------------------------------------

read_pids:

