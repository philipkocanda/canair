# SECTION 3: DISCOVERY SCANS
# Broad range scans to find unknown responding PIDs.
# Run these last, after targeted queries.
# -----------------------------------------------------------------------------

discovery_scans:

  - ecu:          VCU
    tx_id:        "0x7E2"
    scan_cmd:     "--scan --tx 7E2 --service 22 --range E001-E010"
    priority:     P1
    prerequisite: acc
    description:  "VCU 0x22 E0xx powertrain range"

  - ecu:          MCU
    tx_id:        "0x7E3"
    scan_cmd:     "--scan --tx 7E3 --service 22 --range E001-E010"
    priority:     P1
    prerequisite: acc
    description:  "MCU 0x22 E0xx powertrain range"

  - ecu:          BMS
    tx_id:        "0x7E4"
    scan_cmd:     "--scan --tx 7E4 --service 22 --range BC01-BC0B"
    priority:     P1
    prerequisite: always
    description:  "BMS 0x22 BCxx body/comfort range (ChatGPT-sourced)"

  - ecu:          BMS
    tx_id:        "0x7E4"
    scan_cmd:     "--scan --tx 7E4 --service 22 --range B002-B005"
    priority:     P2
    prerequisite: always
    description:  "BMS 0x22 B0xx cluster range"

  - ecu:          BMS
    tx_id:        "0x7E4"
    scan_cmd:     "--scan --tx 7E4 --service 22 --range E003-E005"
    priority:     P2
    prerequisite: always
    description:  "BMS 0x22 E0xx powertrain range (range estimate, time to charge)"

  - ecu:          HVAC
    tx_id:        "0x7B3"
    scan_cmd:     "--scan --tx 7B3 --service 22 --range 0100-010B"
    priority:     P1
    prerequisite: acc
    description:  "HVAC full DID range"

  - ecu:          CLU
    tx_id:        "0x7C6"
    scan_cmd:     "--scan --tx 7C6 --service 22 --range B001-B010"
    priority:     P2
    prerequisite: acc
