  # ===========================================================================
  # BCM/TPMS — Body Control Module (0x7A0) — CONFIRMED WORKING
  # ===========================================================================
  # BCM wakes via SKM ACC+IGN1 (cannot wake independently from deep sleep).
  # Does NOT need extended session for reads (22 B0xx, 22 C0xx).
  # IOControl (2F B0xx) DOES need extended session (1003).
  #
  # READ SCAN COMPLETE (2026-04-15, deep sleep + SKM ACC+IGN1):
  #   22 B001-B00F: 14/15 responding (B00B=status register, B010-B012 rejected)
  #   22 C001-C00F: ALL 15 responding (TPMS config, sensors, pressure, extended)
  #
  # IOCONTROL SCAN PARTIAL (2026-04-15, deep sleep + SKM ACC+IGN1):
  #   2F B000-B072: 24 accepted (safe scan with --append 00)
  #   2F B073-B0FF: incomplete (SKM session dropped mid-scan, needs re-scan)
  #   2F B061: NRC 0x31 (charge door open not supported on Ioniq 2017)

  - ecu:          TPMS
    tx_id:        "0x7A0"
    pid:          "22C00B"
    service:      "0x22"
    status:       partial
    priority:     P1
    prerequisite: acc
    description:  "TPMS — tyre temps unverified, additional undecoded bytes"
    what_to_test:
      - "TYRE_TEMP_FL/FR/RL/RR (B11/15/20/24 - 50 °C) — verify against known temps"
      - "Decode remaining bytes in 22C00B response beyond pressures/temps"
    sources:
      - "ioniq-2017-pids.yaml (temps unverified)"

  - ecu:          BCM
    tx_id:        "0x7A0"
    pid:          "22B00E"
    service:      "0x22"
    status:       verified
    priority:     done
    prerequisite: none
    description:  "Charge port flap status — VERIFIED B10:5 (WiCAN idx)"
    notes: "Verified 2026-04-15. BCM reads work without extended session.
            B10:5 = 1 when charge port open, 0 when closed."
    sources:
      - "ioniq-2017-pids.yaml (verified)"

  - ecu:          BCM
    tx_id:        "0x7A0"
    pid:          "22B00C"
    service:      "0x22"
    status:       captured
    priority:     P2
    prerequisite: skm_acc
    description:  "Preheat schedule — day-of-week bitmask"
    notes: "B3=0x3F (0b00111111) = 6 days set. User has daily 08:00 preheat
            (may have missed one day). Remaining bytes 00 = no charge schedule.
            Preheat TIME is NOT in this DID — may be in B007 or B00D."
    sources:
      - "Captured 2026-04-15"

  - ecu:          BCM
    tx_id:        "0x7A0"
    pid:          "22B00D"
    service:      "0x22"
    status:       captured
    priority:     P2
    prerequisite: skm_acc
    description:  "Preheat timer config — may contain departure time"
    notes: "B3-B4=0xFCFC, B5=0xE0. Relationship to 08:00 (480 min) unclear.
            Change preheat time and re-read to decode."
    sources:
      - "Captured 2026-04-15"

  - ecu:          BCM
    tx_id:        "0x7A0"
    pid:          "22B007"
    service:      "0x22"
    status:       captured
    priority:     P2
    prerequisite: skm_acc
    description:  "BCM data — may contain preheat time"
    notes: "Contains 0x01E0 = 480 decimal = minutes from midnight for 08:00.
            Strong candidate for preheat departure time field."
    sources:
      - "Captured 2026-04-15"

  - ecu:          BCM
    tx_id:        "0x7A0"
    pid:          "22B001-B00A, B00F"
    service:      "0x22"
    status:       captured
    priority:     P3
    prerequisite: skm_acc
    description:  "BCM body data pages — all responding, mostly undecoded"
    notes: "B001 (20B): config flags. B003 (27B): dense bitfields.
            B004: possible voltage/current. B009: repeating FEEE pattern.
            Full payloads in captures.yaml 2026-04-15."
    sources:
      - "Captured 2026-04-15"

  - ecu:          BCM
    tx_id:        "0x7A0"
    pid:          "22C001-C00A"
    service:      "0x22"
    status:       captured
    priority:     P3
    prerequisite: skm_acc
    description:  "TPMS sensor config — per-sensor IDs and calibration"
    notes: "C003-C007: active sensors with ASCII IDs (DO01, NA01, NTPM, DO02, NA02).
            C008-C00A: spare slots (all FF). C001/C002: summary/config."
    sources:
      - "Captured 2026-04-15"

  - ecu:          BCM
    tx_id:        "0x7A0"
    pid:          "22C00C-C00F"
    service:      "0x22"
    status:       captured
    priority:     P3
