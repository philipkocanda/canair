    description:  "VCU live data — partially decoded"
    what_to_test:
      - "CAR_READY (B26:3) — causes OOB on 22-byte response. Niro/Soul profile
         uses PID '21014' (trailing digit = frame count?). Try requesting with
         longer timeout or check if response is longer with ACC on vs keyfob."
      - "PARK_BRAKE (B26:5) — same OOB issue as CAR_READY"
      - "ACCEL_PEDAL_DEPTH (B17, /2 %) — in YAML but unverified"
      - "LDC_INHIBIT (B11:7) — unverified bitfield"
      - "MCU_STATE (B11:6) — unverified, labeled 'power_enable' in Ioniq5"
      - "ECO/Sport/Normal mode — suspected in B10 upper nibble, not decoded"
      - "Regen mode (off/1/2/3) — location unknown, possibly in B10 or B11"
