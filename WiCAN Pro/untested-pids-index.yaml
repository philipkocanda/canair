# -----------------------------------------------------------------------------
# SECTION 2: IOControl Commands (Service 0x2F)
# WARNING: These ACTUATE physical hardware. Only test with car stationary,
#          in safe conditions, doors closed where relevant.
# Require extended diagnostic session (10 03) and TesterPresent keepalive.
# -----------------------------------------------------------------------------

iocontrol:

  # ===========================================================================
  # IGPM IOControl (0x770) — FROM KIA SOUL / e-NIRO, UNTESTED
  # ===========================================================================

  - ecu:          IGPM
    tx_id:        "0x770"
    prerequisite: ext_sess
    commands:
      - cmd: "2FBC0103"
        desc: "Head light low beam ON"
        off: "2FBC0100"
        priority: P2
      - cmd: "2FBC0203"
        desc: "Head light high beam ON"
        off: "2FBC0200"
        priority: P2
      - cmd: "2FBC0303"
        desc: "Front fog light ON"
        off: "2FBC0300"
        priority: P2
      - cmd: "2FBC0403"
        desc: "Rear light ON"
        off: "2FBC0400"
        priority: P2
      - cmd: "2FBC0503"
        desc: "Red backlight flash"
        priority: P3
      - cmd: "2FBC0803"
        desc: "Rear fog light ON"
        off: "2FBC0800"
        priority: P3
      - cmd: "2FBC0903"
        desc: "Trunk unlock"
        priority: P1
      - cmd: "2FBC0B03"
        desc: "Rear washer ON"
        off: "2FBC0B00"
        priority: P3
      - cmd: "2FBC0C03"
        desc: "Defogger ON"
        off: "2FBC0C00"
        priority: P2
      - cmd: "2FBC1003"
        desc: "Door LOCK all"
        priority: P1
      - cmd: "6FBC1103"
        desc: "Door UNLOCK all (note: 0x6F prefix, not 0x2F)"
        priority: P1
      - cmd: "2FBC1503"
        desc: "Left turn indicator ON"
        off: "2FBC1500"
        priority: P2
      - cmd: "2FBC1603"
        desc: "Right turn indicator ON"
        off: "2FBC1600"
        priority: P2
      - cmd: "2FBC1C03"
        desc: "Luggage lamp ON"
        off: "2FBC1C00"
        priority: P3
      - cmd: "2FBC3F03"
        desc: "Charge cable LOCK"
        priority: P2
      - cmd: "2FBC4103"
        desc: "Charge cable UNLOCK"
        priority: P2
    notes: |
      Ioniq AE may use RoutineControl (0x31) instead of IOControl (0x2F).
      If 0x2F returns NRC, try 0x31 with same subfunction bytes.
    sources:
      - "Obsidian: IGPM.md — KIA Soul / e-Niro commands"

  # ===========================================================================
  # BCM IOControl (0x7A0) — FROM e-NIRO, UNTESTED
  # ===========================================================================

  - ecu:          BCM
    tx_id:        "0x7A0"
    prerequisite: ext_sess
    commands:
      - cmd: "2FB06103"
        desc: "Charge door open"
        priority: P1
      - cmd: "2FB05B03"
        desc: "Mirrors fold"
        priority: P2
      - cmd: "2FB05C03"
        desc: "Mirrors unfold"
        priority: P2
      - cmd: "2FB05903"
        desc: "Heated door handle ON"
        off: "2FB05900"
        priority: P2
      - cmd: "2FB05A03"
        desc: "Heated door handle LED ON"
        off: "2FB05A00"
        priority: P3
      - cmd: "2FB01903"
        desc: "Room lamp ON"
        off: "2FB01900"
        priority: P3
    sources:
      - "Obsidian: BCM.md — e-Niro commands"

  # ===========================================================================
  # SKM — Smart Key Module (0x7A5) — UNVERIFIED ECU ID
  # ===========================================================================

  - ecu:          SKM
    tx_id:        "0x7A5"
    prerequisite: always
    commands:
      - cmd: "2FB108030A0A05"
        desc: "ACC relay ON — WAKE UP sleeping ECUs"
        off: "2FB10800"
        priority: P1
        notes: "Critical for remote operations. May need magic byte variants:
                0A050A or 050A0A. ACC On already tested and works!"
      - cmd: "2FB109030A0A05"
        desc: "IGN1 relay ON"
        off: "2FB10900"
        priority: P2
      - cmd: "2FB10A030A0A05"
        desc: "IGN2 relay ON"
        off: "2FB10A00"
        priority: P2
      - cmd: "2FB10B030A0A05"
        desc: "Start relay ON"
        off: "2FB10B00"
        priority: P3
        notes: "CAUTION: activates starter relay. Only test if safe."
    sources:
      - "Obsidian: SKM.md — KIA Soul commands"

  # ===========================================================================
  # PSM — Power Seat Module (0x7A3) — UNVERIFIED ECU ID
  # ===========================================================================

  - ecu:          PSM
    tx_id:        "0x7A3"
    prerequisite: ext_sess
