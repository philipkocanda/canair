      - cmd: "2FB40403"
        desc: "Seat recline back"
        off: "2FB40400"
        priority: P3
      - cmd: "2FB40503"
        desc: "Front seat up"
        off: "2FB40500"
        priority: P3
      - cmd: "2FB40603"
        desc: "Front seat down"
        off: "2FB40600"
        priority: P3
    sources:
      - "Obsidian: PSM.md — e-Niro commands"

  # ===========================================================================
  # VESS — Vehicle Engine Sound System (0x736) — UNVERIFIED ECU ID
  # ===========================================================================

  - ecu:          VESS
    tx_id:        "0x736"
    prerequisite: acc
    commands:
      - cmd: "2F110300010000"
        desc: "Play VESS sound for 5 seconds"
