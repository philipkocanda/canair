        desc: "ACC relay ON — WAKE UP sleeping ECUs"
        off: "2FB10800"
        priority: P1
        status: verified
        notes: "Confirmed 2026-04-15. ACC relay clicks on, infotainment powers up,
                doors unlock. Does NOT latch — relay releases when session drops.
                freezeCurrentState (2FB10802) returns status 6255.
                NRC 0x22 if ACC already on.
