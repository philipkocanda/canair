  - ecu:          BCM
    tx_id:        "0x7A0"
    scan_cmd:     "--scan --tx 7A0 --service 22 --range B001-B012"
    priority:     done
    prerequisite: acc
    description:  "BCM body data range — DONE 2026-04-15. 14/15 responding."

  - ecu:          BCM
    tx_id:        "0x7A0"
    scan_cmd:     "--scan --tx 7A0 --service 22 --range C001-C00F"
    priority:     done
    prerequisite: acc
    description:  "BCM/TPMS comfort range — DONE 2026-04-15. 15/15 responding."

  - ecu:          ESC
    tx_id:        "0x7D1"
    scan_cmd:     "--scan --tx 7D1 --service 22 --range C101-C10F"
    priority:     P2
    prerequisite: acc
    description:  "ESC C1xx range"

  - ecu:          ESC
    tx_id:        "0x7D1"
    scan_cmd:     "--scan --tx 7D1 --service 22 --range 0101-010F"
    priority:     P2
    prerequisite: acc
    description:  "ESC 01xx range (Ioniq 5 uses 0104)"

  - ecu:          "ESC (alt)"
    tx_id:        "0x730"
    scan_cmd:     "--scan --tx 730 --service 22 --range F010-F010"
    priority:     P2
    prerequisite: driving
    description:  "Ioniq 5 ESC address — wheel speeds/steering"

  - ecu:          EPS
    tx_id:        "0x7D4"
    scan_cmd:     "--scan --tx 7D4 --service 22 --range 0101-0105"
    priority:     P2
    prerequisite: acc
    description:  "EPS steering angle range"

  - ecu:          "OBC/LDC"
    tx_id:        "0x7E5"
    scan_cmd:     "--scan --tx 7E5 --service 22 --range E001-E011"
    priority:     P2
    prerequisite: charging
    description:  "OBC/LDC UDS range"

  - ecu:          "OBC (standalone)"
    tx_id:        "0x79C"
    scan_cmd:     "--scan --tx 79C --service 22 --range B101-B107"
    priority:     P3
    prerequisite: charging
    description:  "OBC standalone B1xx range — ECU ID unverified"

  - ecu:          Charging
    tx_id:        "0x744"
    scan_cmd:     "--scan --tx 744 --service 22 --range E001-E004"
    priority:     P2
    prerequisite: charging
    description:  "Charging controller E0xx range"

  - ecu:          "LDC (standalone)"
    tx_id:        "0x7CD"
    scan_cmd:     "--scan --tx 7CD --service 21 --range 01-05"
    priority:     P3
    prerequisite: acc
    description:  "LDC standalone 0x21 range — ECU ID unverified"

  # Broad discovery on unknown ECU IDs
  - ecu:          "Unknown"
    tx_id:        "0x7E0"
    scan_cmd:     "--scan --tx 7E0 --service 22 --range 0101-0105"
    priority:     P3
    prerequisite: acc
    description:  "38kWh profile says VCU is at 0x7E0 — test if anything responds"

  - ecu:          "Unknown"
    tx_id:        "0x7E1"
    scan_cmd:     "--scan --tx 7E1 --service 22 --range 0101-0105"
    priority:     P3
    prerequisite: acc
    description:  "Powertrain address — test if anything responds"

  # ===========================================================================
  # IOControl (0x2F) discovery scans — find which DIDs accept actuator commands
  # Requires --append 03 (ShortTermAdjustment) and --session (extended session)
  # ===========================================================================

  - ecu:          BMS
    tx_id:        "0x7E4"
    scan_cmd:     "--scan --tx 7E4 --service 2F --range E000-E0FF --append 03 --session"
    priority:     P1
    prerequisite: acc
    description:  "BMS IOControl E0xx range — looking for battery fan/EWP control DID"
    notes:        "Kingbolen scanner can activate fan from here. Most likely DID range."

  - ecu:          BMS
    tx_id:        "0x7E4"
    scan_cmd:     "--scan --tx 7E4 --service 2F --range BC00-BCFF --append 03 --session"
    priority:     P2
    prerequisite: acc
    description:  "BMS IOControl BCxx range — body/comfort-style DIDs"

  - ecu:          MCU
    tx_id:        "0x7E3"
    scan_cmd:     "--scan --tx 7E3 --service 2F --range E000-E0FF --append 03 --session"
    priority:     P2
    prerequisite: acc
    description:  "MCU IOControl E0xx range"

  - ecu:          IGPM
    tx_id:        "0x770"
    scan_cmd:     "--scan --tx 770 --service 2F --range BC00-BCFF --append 03 --session"
    priority:     P2
    prerequisite: acc
    description:  "IGPM IOControl full BCxx range — find all supported actuator DIDs"

  - ecu:          BCM
    tx_id:        "0x7A0"
    scan_cmd:     "--scan --tx 7A0 --service 2F --range B073-B0FF --append 00 --session"
    priority:     P2
    prerequisite: skm_acc
    description:  "BCM IOControl B073-B0FF — INCOMPLETE. B000-B072 done (24 accepted).
                   Scan timed out at B072 due to SKM session drop. Re-scan with more
                   aggressive keepalive needed."


# -----------------------------------------------------------------------------
# SECTION 4: SESSION PLAN
# Recommended order of operations for a testing session.
# -----------------------------------------------------------------------------

session_plan:

  keyfob_wake:
    description: "Car sleeping, wake with keyfob (no ACC)"
    duration_est: "5 min"
    tests:
      - "BMS 0x7E4: scan 22 BC01-BC0B (always-on ECU)"
      - "BMS 0x7E4: scan 22 B002-B005"
      - "BMS 0x7E4: scan 22 E003-E005"
      - "Gateway 0x7E6: test additional PIDs beyond 2180"
      - "LDC 0x7CD: test 2101"
      - "OBC/LDC 0x7E5: test 22E011 (LDC aux battery monitoring)"

  acc_on:
    description: "ACC on via keyfob or SKM wakeup"
    duration_est: "15 min"
    tests:
      - "IGPM 0x770: verify BC03/04 door/lock params (open/close doors) — DONE 2026-04-15"
      - "IGPM 0x770: decode BC01/02/05/06/07 captured responses — DONE (BC06=brake/turns)"
      - "BCM 0x7A0: scan B001-B012 and C001-C00F — DONE 2026-04-15 (29/30 responding)"
      - "BCM 0x7A0: test 22B00E charge port flap — DONE (B10:5 verified)"
      - "VCU 0x7E2: scan 22 E001-E010"
      - "VCU 0x7E2: decode 2102 (motor/inverter data)"
      - "MCU 0x7E3: scan 22 E001-E010"
      - "MCU 0x7E3: re-decode 2101 (compare with Ioniq 5 22E001 signals)"
      - "HVAC 0x7B3: scan 220100-22010B"
      - "CLU 0x7C6: scan 22B001-B010"
      - "AVN 0x7C0: probe 2101 + scan 22B001-B010 (NO DATA during deep sleep, retry with ACC)"
      - "AVN 0x7C1: probe as secondary multimedia address"
      - "ESC 0x7D1: scan 22C101-C10F and 220101-010F"
      - "EPS 0x7D4: scan 220101-0105"
      - "0x730: test 22F010 (Ioniq 5 ESC address)"
      - "0x7E0/0x7E1: probe for response (unknown ECUs)"

  acc_on_iocontrol:
    description: "IOControl testing — extended session required"
    duration_est: "10 min"
    prerequisites: "Enter extended diagnostic session first: send 10 03 to target ECU"
    tests:
      - "IGPM 0x770: test door lock/unlock (2F BC 10/11) — DONE 2026-04-15"
      - "IGPM 0x770: test headlights (2F BC 01/02) — DONE 2026-04-15"
      - "IGPM 0x770: test turn indicators (2F BC 15/16) — DONE 2026-04-15"
      - "IGPM 0x770: test trunk unlock (2F BC 09) — DONE 2026-04-15"
      - "BCM 0x7A0: charge door open (2F B0 61) — REJECTED (NRC 0x31, not supported)"
      - "BCM 0x7A0: test mirrors fold/unfold (2F B0 5B/5C) — B05B CONFIRMED"
      - "BCM 0x7A0: scan B073-B0FF IOControl (incomplete, needs re-scan)"
      - "BCM 0x7A0: test accepted unknown DIDs (B019 room lamp, B025-B030, etc.)"
      - "If 0x2F returns NRC, retry same subfunctions with 0x31 (RoutineControl)"

  charging:
    description: "During AC charging session"
    duration_est: "10 min"
    tests:
      - "OBC/LDC 0x7E5: decode 2101/2102 captured data"
      - "OBC/LDC 0x7E5: scan 22 E001-E011"
      - "OBC standalone 0x79C: scan 22 B101-B107"
      - "Charging 0x744: scan 22 E001-E004"
      - "IGPM 0x770: test charge cable lock/unlock (2F BC 3F/41)"

  driving:
    description: "While driving (passenger operates laptop)"
    duration_est: "10 min"
    tests:
      - "VCU 0x7E2: check if 2101 response is longer than 22 bytes while driving"
      - "VCU 0x7E2: verify speed formula (compare with GPS)"
      - "ESC 0x7D1: verify REAL_SPEED_KMH (B12)"
      - "ESC 0x7D1: test 220104 individual wheel speeds"
      - "ESC 0x730: test 22F010 wheel speeds/steering/accel"
      - "BMS 0x7E4: test 2101 — verify 63-byte response while driving"
      - "MCU 0x7E3: capture 2101/2102 while driving (motor under load)"


