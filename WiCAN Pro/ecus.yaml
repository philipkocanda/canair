# Ioniq 2017 EV — ECU address lookup
# TX ID is the OBD-II request arbitration ID; RX ID is TX + 8.
#
# Protocol split:
#   Body/comfort ECUs (IGPM, BCM, SKM, CLU, ESC, EPS, HVAC, PSM, VESS, SAS, etc.) → UDS
#     Identity: 22 F1xx (with Hyundai -1 offset: F187 instead of F188, etc.)
#     Live data: 22 xxxx (ReadDataByIdentifier)
#   Powertrain ECUs (BMS, VCU, MCU, LDC/OBC, Gateway, OBC-746) → KWP2000
#     Identity: 1A xx (ReadEcuIdentification, range 80-9F)
#     Live data: 21 xx (manufacturer-specific, paged: 2101, 2102, etc.)
#     These ECUs do NOT respond to UDS 22 F1xx or 22 Exxx DIDs.
#   Some ECUs (0x783 AMP, 0x7D2 SRS) respond to session control (1001) but have no
#   identity DIDs — security-locked or audio-only modules.
#
# Discovery scan 2026-04-17: full sweep 0x700-0x7EF found 30 alive addresses.
# 16 previously known + 14 newly discovered + 0x7C0 (unknown) + 0x7DF (OBD-II broadcast).
ecus:
  0x770:
    name: IGPM
    description: Integrated Gateway & Power Module
    part_number: "91950G7510"
    mfg_date: "2017-06-06"
    hw_version: "100"
    sw_version: "109"
    boot_sw: "20"
    app_sw: "160205"
    id_protocol: UDS  # F1xx
  0x7A0:
    name: BCM
    description: Body Control Module
    part_number: "95400G7470"
    mfg_date: "2017-05-31"
    id_protocol: UDS  # F1xx
