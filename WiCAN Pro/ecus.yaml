# Ioniq 2017 EV — ECU address lookup
# TX ID is the OBD-II request arbitration ID; RX ID is TX + 8.
#
# Protocol split:
#   Body/comfort ECUs (IGPM, BCM, SKM, CLU, ESC, EPS, HVAC, PSM, VESS, SAS, etc.) → UDS
#     Identity: 22 F1xx (with Hyundai -1 offset: F187 instead of F188, etc.)
#     Live data: 22 xxxx (ReadDataByIdentifier)
#   Powertrain ECUs (BMS, VCU, MCU, LDC/OBC, Gateway, Unknown-746) → KWP2000
#     Identity: 1A xx (ReadEcuIdentification, range 80-9F)
#     Live data: 21 xx (manufacturer-specific, paged: 2101, 2102, etc.)
#     These ECUs do NOT respond to UDS 22 F1xx or 22 Exxx DIDs.
#   Some ECUs (0x783 AMP, 0x7D2 SRS) respond to session control (1001) but have no
#   identity DIDs — security-locked or audio-only modules.
#
# Discovery scan 2026-04-17: full sweep 0x700-0x7EF found 30 alive addresses.
# 16 previously known + 14 newly discovered + 0x7C0 (unknown) + 0x7DF (OBD-II broadcast).
ecus:
  0x770:
    name: IGPM
    description: Integrated Gateway & Power Module
    part_number: "91950G7510"
    mfg_date: "2017-06-06"
    hw_version: "100"
    sw_version: "109"
    boot_sw: "20"
    app_sw: "160205"
    id_protocol: UDS  # F1xx
    notes: >
      IGPM is the CAN gateway. OBD port connects directly to the IGPM, so all diagnostic requests are routed through it.
      It is also the main power distribution module, controlling ignition and accessory power to other ECUs.
  0x7A0:
    name: BCM
    description: Body Control Module
    part_number: "95400G7470"
    mfg_date: "2017-05-31"
    id_protocol: UDS  # F1xx
  0x7A3:
    name: PSM
    description: Power Seat Module
    part_number: "95450G7000"
    mfg_date: "2017-06-01"
    hw_version: "100"
    sw_version: "100"
    boot_sw: "190"
    id_protocol: UDS  # F1xx
  0x7A1:
    name: SWRC-L
    description: Steering Wheel Remote Control (Left)
    part_number: "93570G2110"
    mfg_date: "2017-06-02"
    hw_version: "100"
    sw_version: "100"
    id_protocol: UDS  # F1xx (very chatty — 21 DIDs, echoes part# in many fields)
  0x7A2:
    name: SWRC-R
    description: Steering Wheel Remote Control (Right)
    part_number: "93575G2160"
    mfg_date: "2017-06-05"
    hw_version: "100"
    sw_version: "100"
    id_protocol: UDS  # F1xx (same pattern as SWRC-L)
  0x7A5:
    name: SKM
    alias: SMK  # ECU self-identifies as "SMK"
    description: Smart Key Module
    mfg_date: "2017-06-02"
    diag_address: "190"
    hw_version: "10000"
    sw_version: "10200"
    id_protocol: UDS  # F1xx
  0x736:
    name: VESS
    description: Virtual Engine Sound System
    part_number: "96390G7000"
    mfg_date: "2016-06-08"
    hw_version: "100"
    sw_version: "101"
    boot_sw: "060"
    id_protocol: UDS  # F1xx
  0x725:
    name: WPC
    description: Wireless Phone Charging unit
    part_number: "95560G7000"
    hw_version: "100"
    sw_version: "102"
    boot_sw: "1.6"
    id_protocol: UDS  # F1xx
  0x733:
    name: PLC
    description: PLC Charge Control Module (Power Line Communication for DC CCS fast-charging)
    part_number: "91950G7200"
    mfg_date: "2017-05-21"
    hw_version: "101"
    sw_version: "103"
    app_sw: "1104"
    id_protocol: UDS  # F1xx
  # 0x744 removed — never responded positively. Discovery scan (2026-04-17) returned
  # CAN-level errors, service 21 scan during AC charging (2026-04-18) returned 255 NO DATA.
  # Cross-platform reference only; likely does not exist on Ioniq 28kWh.
  0x746:
    name: Unknown-746
    description: Unknown ECU — KWP2000 only, no OBC evidence
    ecu_id: "1.10"  # KWP2000 1A8C
    sw_id: "Z311"  # KWP2000 1A8D/1A8E
    calibration: "Z311"
    hw_sw: "3.5"  # KWP2000 1A92
    id_protocol: KWP2000  # 1Axx (10/32 responding)
    notes: >
      Previously labelled OBC-746 speculatively (address proximity to 0x744).
      No evidence of OBC function. Only data PID: 21F2 → 00000007 (4 bytes).
      Responds to 1001 with NRC 0x12 but alive. Most identity fields FFFFFFFF.
  0x755:
    name: BSD-L
    description: Blind Spot Detection radar (left)
    part_number: "95821G2000"
    serial: "31114851712211429"
    id_protocol: UDS  # F1xx (many FF-padded fields)
  0x780:
    name: AVN
    description: Audio/Video/Navigation head unit
    serial: "00000076FE0085-003240"
    app_sw: "AE_EV EURSOP 12 017.1"
    id_protocol: UDS  # F1xx (limited — 3 DIDs)
    notes: "Firmware ID 'AE_EV EUR.SOP' matches Ioniq head unit firmware/map updates. Previously misidentified as TCU."
  0x783:
    name: AMP
    description: Audio Amplifier (external - Infinity audio system)
    id_protocol: none  # NRC 0x11 on all UDS F1xx and KWP2000 1Axx
    notes: >
      Identified via Kia e-Niro CAN spreadsheet (exact address match 783/78B).
      No diagnostic identity data — audio-only module.
      Services supported: 10 (session), 14 (clearDTC), 19 (readDTC), 3E (testerPresent).
      All other services (21, 22, 27, 2F) return NRC 0x11 (serviceNotSupported).
      DTCs during charging (2026-04-19, ignition off):
        A919 (status 09), A91A (09), A91B (09), A915 (09),
        A916 (09), A920 (09), A921 (09) — 7 DTCs, all status 0x09.
  0x796:
    name: RCAM
    description: Rear View Camera (parking)
    part_number: "95760G2000"
    mfg_date: "2017-05-30"  # ASCII-encoded in raw field
    hw_version: "100"
    sw_version: "102"
    boot_sw: "CAN_15.11.01"
    id_protocol: UDS  # F1xx
  0x7B3:
    name: HVAC
    alias: DATC  # Digital Automatic Temperature Control
    description: Climate Control
    part_number: "97250-G7060"
    mfg_date: "2017-05-30"
    firmware: "AE_EV DATC(-)1.0"
    fw_version: "1.03"
    id_protocol: UDS  # F1xx
  0x7B6:
    name: GSA
    description: Gear Shift Assembly (gear selector module)
    part_number: "46700-G7100"
    mfg_date: "2016-05-26"
    supplier: "KCI_KOSTAL"
    hw_version: "KOSTAL_HW_G07"
    sw_version: "KOSTAL_SW_G07"
    id_protocol: UDS  # F1xx
  0x7B7:
    name: BSD-R
    description: Blind Spot Detection radar (right)
    part_number: "95811G2000"
    serial: "31114851713802876"
    id_protocol: UDS  # F1xx (many FF-padded fields, same format as BSD-L 0x755)
  0x7C0:
    name: Unknown-7C0
    description: Maybe TCU? (BlueLink) (responds to 1001 session control)
    id_protocol: unknown
    notes: >
      No identity DIDs responded.
      Car has no BlueLink (was never available in Netherlands).
      Module may still exist as dormant platform hardware (UNCONFIRMED).
      Other candidates: head unit sub-module, DAB tuner.
      Dead during AC charging (2026-04-19): 1001, 1003, 3E00, 1A8C all NO DATA.
  0x7C4:
    name: MFC
    description: Multi-Function Camera (ADAS)
    part_number: "95740-G2200"
    boot_sw: "AEE MFC AT EUR LHD 1.00 1.00 95740-G2200 161014"
    id_protocol: UDS  # F1xx (only 1 DID: F100)
  0x7C6:
    name: CLU
    description: Cluster (instrument panel)
    part_number: "94003G7300"
    mfg_date: "2017-06-01"
    hw_version: "100"
    sw_version: "201"
    boot_sw: "625"
    id_protocol: UDS  # F1xx
  0x7D0:
    name: SCC
    description: Smart Cruise Control
    part_number: "96400-G7000"
    boot_sw: "AEev SCC F-CUP 1.00 1.00"
    id_protocol: UDS  # F1xx (3 DIDs)
  0x7D1:
    name: ESC
    alias: ABS
    description: Electronic Stability Control
    serial: "GWLK7F01A986826"
    app_sw: "G7"
    id_protocol: UDS  # F1xx (limited — no part number DID)
  0x7D2:
    name: SRS
    description: Airbag / Supplemental Restraint System
    id_protocol: none  # NRC 0x11 on all UDS F1xx and KWP2000 1Axx
    notes: >
      Identified via Kia e-Niro CAN spreadsheet (exact address match 7D2/7DA).
      Security-locked — no diagnostic identity exposed.
      Dead during AC charging (2026-04-19): 1001, 1003, 3E00, 1A8C all NO DATA.
  0x7D4:
    name: EPS
    alias: MDPS  # Motor-Driven Power Steering
    description: Electric Power Steering
    part_number: "56310G7300"
    mfg_date: "2017-06-01"
    firmware: "MDPS C 1.00/1.03"
    id_protocol: UDS  # F1xx
    notes: Steering column
  0x7D5:
    name: Unknown-7D5
    description: Unknown ECU — adjacent to ESC/EPS in address space
    app_sw: "G7"
    id_protocol: UDS  # F1xx (only 2 DIDs: F18C serial, F101 app SW)
    notes: >
      Previously misidentified as AHB (Active Hydraulic Booster). The only identity data
      is app_sw "G7", which is just the Ioniq Electric vehicle model code (same as ESC 0x7D1),
      not an ECU identifier. No part number, no ECU ID string. Could be AHB, iBAU, or another
      brake/chassis sub-module. Try reading 2101 for brake pressure/pedal data to narrow down.
  0x7E2:
    name: VCU # TODO: Rename to LDC? (check exposed PIDs to confirm)
    description: Vehicle Control Unit
    part_number: "36601-0E250"
    ecu_id: AEVLDC53  # KWP2000 1A8C — oddly reports LDC identifier (!)
    sw_id: "EAEEO5L-NS7-D060"
    calibration: "C5210617"
    vin: "KMHCXXXXXXXXXXXX"
    id_protocol: KWP2000  # 1Axx
  0x7E3:
    name: MCU
    alias: VMCU
    description: Motor Control Unit (inverter)
    part_number: "36600-0E250"
    ecu_id: AEEMCU83  # KWP2000 1A8C
    sw_id: "EAEEHEL-MS2-D000"
    calibration: "00000001"
    id_protocol: KWP2000  # 1Axx
  0x7E4:
    name: BMS
    description: Battery Management System
    ecu_id: "AEEV__ BMS"  # KWP2000 1A90
    fw_version: "VER.2.3"  # KWP2000 1A91
    sw_id: CGBMSE305AE1000A  # KWP2000 1A8C
    calibration: "4604"  # KWP2000 1A8D
    id_protocol: KWP2000  # 1Axx
    notes: "1A80 firmware build date 2008-07-09 (likely platform date, not unit manufacture)"
  0x7E5:
    name: LDC # TODO: Rename to OBC?
    alias: OBC  # Also handles On-Board Charger
    description: Low-voltage DC-DC Converter / OBC
    part_number: "36400-0E150"
    ecu_id: AEEOBC51  # KWP2000 1A8C
    sw_id: "EAEEH5L-OS3-D000"
    calibration: "00000001"
    id_protocol: KWP2000  # 1Axx
  0x7E6:
    name: AAF
    description: Ambient Air Temperature sensor controller (previously misidentified as "CAN Gateway")
    part_number: M3062000307  # KWP2000 1A91 — likely Renesas M16C/M306 MCU part, not a Hyundai part number
    sw_id: EAE16AAFB30001  # KWP2000 1A8D
    firmware: EAEAAFP201  # KWP2000 1A98 — "AAF" is the Hyundai internal module code
    id_protocol: KWP2000  # 1Axx
    notes: >
      Only exposes ambient temperature (PID 2180, 2181). All community projects
      (OVMS, pioniq, EVNotiPi, JejuSoul) use this address solely for external temp.
      Does not wake from CAN bus activity — requires ACC power like other powertrain ECUs.
      The actual CAN gateway function is performed by the IGPM (0x770).
