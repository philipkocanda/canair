    fw_version: "1.03"
    id_protocol: UDS  # F1xx
  0x7C0:
    name: AVN
    description: Audio/Video/Navigation head unit
    notes: "No response to UDS F1xx or KWP2000 1Axx identity DIDs"
  0x7C6:
    name: CLU
    description: Cluster (instrument panel)
    part_number: "94003G7300"
    mfg_date: "2017-06-01"
    hw_version: "100"
