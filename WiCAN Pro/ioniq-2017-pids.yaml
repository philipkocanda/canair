            expression: "B13:4"
            unit: ""
            ha_class: light
            mqtt_topic: high_beam
            min: ""
            max: ""
            source: "Kia Niro EV WiCAN PR#716"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/716
            verified: false
            notes: ""

      22BC06:
        period: 2500
        enabled: true
        parameters:
          BRAKE_LIGHT:
            expression: "B4"
            unit: ""
            ha_class: ""
            mqtt_topic: brake_light
            min: "0"
            max: "255"
            source: "Ioniq 5 OBDb"
            source_links: []
            verified: false
            notes: "Scalar value 0-255. For 0x22 service: B4 = data byte 1 (after 62 BC 06 header). Ioniq 5 confirmed at bix 32, len 8."

  # ─── ESC (Electronic Stability Control) ──────────────────────────────
  ESC:
    tx_id: 0x7D1
    pids:
      22C101:
        period: 2500
        enabled: true
        parameters:
          REAL_SPEED_KMH:
            expression: "B12"
            unit: km/h
            ha_class: speed
            mqtt_topic: real_speed_kmh
            min: "0"
            max: "200"
            source: "Kia Niro EV WiCAN PR#660"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/660
            verified: false
            notes: "Wheel-speed based, may differ from VCU speed. Untested on Ioniq."

  # ─── VCU (Vehicle Control Unit) ──────────────────────────────────────
  VCU:
    tx_id: 0x7E2
    pids:
      2101:
        period: 2500
        enabled: true
        parameters:
          VEHICLE_SPEED:
            expression: "((S20*256)+S19)/100"
            unit: km/h
            ha_class: speed
            mqtt_topic: vehicle_speed
            min: "-255"
            max: "255"
            source: "Original WiCAN config"
            source_links: []
            verified: true
            notes: "Signed 16-bit, divided by 100"

          VEHICLE_SPEED_ALT:
            expression: "[B19:B20]/100"
            unit: km/h
            ha_class: speed
            mqtt_topic: vehicle_speed_alt
            min: ""
            max: ""
            source: "Original WiCAN config"
            source_links: []
            verified: true
            notes: "Alternative unsigned formula — same bytes, different sign handling"

          DEBUG_DRIVE_MODE_FLAGS:
            expression: "B10"
            unit: ""
            ha_class: ""
            mqtt_topic: debug_drive_mode_flags
            min: ""
            max: ""
            source: "Original WiCAN config"
            source_links: []
            verified: true
            notes: "Raw byte — individual bits below"

          DRIVE_MODE_P:
            expression: "B10:0"
            unit: ""
            ha_class: ""
            mqtt_topic: drive_mode_p
            min: ""
            max: ""
            source: "Original WiCAN config"
            source_links: []
