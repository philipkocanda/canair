            min: ""
            max: ""
            source: "Kia Niro EV WiCAN PR#716"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/716
            verified: false
            notes: ""

          SEATBELT_FL:
            expression: "B11:1"
            unit: ""
            ha_class: ""
            mqtt_topic: seatbelt_fl
            min: ""
            max: ""
            source: "Kia Niro EV WiCAN PR#716"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/716
            verified: false
            notes: ""

          SEATBELT_FR:
            expression: "B11:2"
            unit: ""
