# Ioniq 2017 EV — WiCAN Pro PID Definitions
# Source of truth for all OBD-II / UDS PIDs polled by WiCAN.
# Run generate-profile.py to produce WiCAN JSON profiles from this file.
#
# Field reference:
#   expression  — WiCAN formula (B=unsigned byte, S=signed byte, [Bx:By]=multi-byte)
#   unit        — display unit (°C, %, V, A, bar, km/h, km, kW, kWh)
#   ha_class    — Home Assistant device_class for MQTT discovery (battery, temperature, etc.)
#   mqtt_topic  — MQTT topic suffix (auto-prefixed with wican/ioniq/)
#   min/max     — expected value range (for HA/MQTT, empty string if unknown)
#   source      — short description of where the PID/formula was obtained
#   source_links — URLs to source material
#   verified    — true if tested on Ioniq 2017, false if from another vehicle/untested
#   notes       — free-form notes
#   enabled     — include in generated profiles (default true if omitted)

car_model: "Hyundai: Ioniq2017"
init: "ATSP6;ATS0;ATAL;ATST96;"

ecus:

  # ─── TPMS (Tyre Pressure Monitoring System) ───────────────────────────
  TPMS:
    tx_id: 0x7A0
    pids:
      22C00B:
        period: 15000
        enabled: true
        parameters:
          TYRE_PRESSURE_FL:
            expression: "B10/72.52"
            unit: bar
            ha_class: pressure
            mqtt_topic: tyre_pressure_fl
            min: "0"
            max: "5"
            source: "Original WiCAN config + Ioniq forum"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/716
            verified: true
            notes: "72.52 converts raw byte to bar. Alternative: B10/5 gives psi."

          TYRE_PRESSURE_FR:
            expression: "B14/72.52"
            unit: bar
            ha_class: pressure
            mqtt_topic: tyre_pressure_fr
            min: "0"
            max: "5"
            source: "Original WiCAN config"
            source_links: []
            verified: true
            notes: ""

          TYRE_PRESSURE_RL:
            expression: "B19/72.52"
            unit: bar
            ha_class: pressure
            mqtt_topic: tyre_pressure_rl
            min: "0"
            max: "5"
            source: "Original WiCAN config"
            source_links: []
            verified: true
            notes: ""

          TYRE_PRESSURE_RR:
            expression: "B23/72.52"
            unit: bar
            ha_class: pressure
            mqtt_topic: tyre_pressure_rr
            min: "0"
            max: "5"
            source: "Original WiCAN config"
            source_links: []
            verified: true
            notes: ""

          TYRE_TEMP_FL:
            expression: "B11-50"
            unit: "°C"
            ha_class: temperature
            mqtt_topic: tyre_temp_fl
            min: "-50"
            max: "100"
            source: "Kia Niro EV WiCAN PR#716"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/716
            verified: false
            notes: "From Niro EV, untested on Ioniq 2017"

