          CAR_READY:
            expression: "B26:3"
            unit: ""
            ha_class: ""
            mqtt_topic: car_ready
            min: ""
            max: ""
            source: "Kia Niro EV WiCAN PR#716"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/716
            verified: false
            notes: ""

          PARK_BRAKE:
            expression: "B26:5"
            unit: ""
            ha_class: ""
            mqtt_topic: park_brake
            min: ""
            max: ""
            source: "Kia Niro EV WiCAN PR#716"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/716
            verified: false
            notes: ""

          ACCEL_PEDAL_DEPTH:
            expression: "B16/2"
            unit: "%"
            ha_class: ""
            mqtt_topic: accel_pedal_depth
            min: "0"
            max: "100"
            source: "ImHex pattern (@ 0x0E) + JejuSoul Torque Pro CSV"
            source_links:
              - https://docs.google.com/spreadsheets/d/1R2dW_4-ANg04TQdkHH52-8wdYItBkWDfppcsqOc-m1M
            verified: false
            notes: "ImHex offset 0x0E + 2 = B16. Ioniq 5 OBDb confirms at bix 96, len 8, div 2."

      2102:
        period: 5000
        enabled: true
        parameters:
          VCU_MOTOR_RPM:
            expression: "((S7<<8)|B6)"
            unit: RPM
            ha_class: ""
            mqtt_topic: vcu_motor_rpm
            min: ""
            max: ""
            source: "JejuSoul Torque Pro CSV"
            source_links: []
