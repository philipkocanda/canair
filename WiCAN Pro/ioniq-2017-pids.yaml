# Ioniq 2017 EV — WiCAN Pro PID Definitions
# Source of truth for all OBD-II / UDS PIDs polled by WiCAN.
# Run generate-profile.py to produce WiCAN JSON profiles from this file.
#
# Field reference:
#   expression  — WiCAN formula (B=unsigned byte, S=signed byte, [Bx:By]=multi-byte)
#   unit        — display unit (°C, %, V, A, bar, km/h, km, kW, kWh)
#   ha_class    — Home Assistant device_class for MQTT discovery (battery, temperature, etc.)
#   mqtt_topic  — MQTT topic suffix (auto-prefixed with wican/ioniq/)
#   min/max     — expected value range (for HA/MQTT, empty string if unknown)
#   source      — short description of where the PID/formula was obtained
#   source_links — URLs to source material
#   verified    — true if tested on Ioniq 2017, false if from another vehicle/untested
#   notes       — free-form notes
#   enabled     — include in generated profiles (default true if omitted)

car_model: "Hyundai: Ioniq2017"
init: "ATSP6;ATS0;ATAL;ATST96;"

ecus:

  # ─── TPMS (Tyre Pressure Monitoring System) ───────────────────────────
  TPMS:
    tx_id: 0x7A0
    pids:
      22C00B:
        period: 15000
        enabled: true
        parameters:
          TYRE_PRESSURE_FL:
            expression: "B10/72.52"
            unit: bar
            ha_class: pressure
            mqtt_topic: tyre_pressure_fl
            min: "0"
            max: "5"
            source: "Original WiCAN config + Ioniq forum"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/716
            verified: true
            notes: "72.52 converts raw byte to bar. Alternative: B10/5 gives psi."

          TYRE_PRESSURE_FR:
            expression: "B14/72.52"
            unit: bar
            ha_class: pressure
            mqtt_topic: tyre_pressure_fr
            min: "0"
            max: "5"
            source: "Original WiCAN config"
            source_links: []
            verified: true
            notes: ""

          TYRE_PRESSURE_RL:
            expression: "B19/72.52"
            unit: bar
            ha_class: pressure
            mqtt_topic: tyre_pressure_rl
            min: "0"
            max: "5"
            source: "Original WiCAN config"
            source_links: []
            verified: true
            notes: ""

          TYRE_PRESSURE_RR:
            expression: "B23/72.52"
            unit: bar
            ha_class: pressure
            mqtt_topic: tyre_pressure_rr
            min: "0"
            max: "5"
            source: "Original WiCAN config"
            source_links: []
            verified: true
            notes: ""

          TYRE_TEMP_FL:
            expression: "B11-50"
            unit: "°C"
            ha_class: temperature
            mqtt_topic: tyre_temp_fl
            min: "-50"
            max: "100"
            source: "Kia Niro EV WiCAN PR#716"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/716
            verified: false
            notes: "From Niro EV, untested on Ioniq 2017"

          TYRE_TEMP_FR:
            expression: "B15-50"
            unit: "°C"
            ha_class: temperature
            mqtt_topic: tyre_temp_fr
            min: "-50"
            max: "100"
            source: "Kia Niro EV WiCAN PR#716"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/716
            verified: false
            notes: ""

          TYRE_TEMP_RL:
            expression: "B20-50"
            unit: "°C"
            ha_class: temperature
            mqtt_topic: tyre_temp_rl
            min: "-50"
            max: "100"
            source: "Kia Niro EV WiCAN PR#716"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/716
            verified: false
            notes: ""

          TYRE_TEMP_RR:
            expression: "B24-50"
            unit: "°C"
            ha_class: temperature
            mqtt_topic: tyre_temp_rr
            min: "-50"
            max: "100"
            source: "Kia Niro EV WiCAN PR#716"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/716
            verified: false
            notes: ""

  # ─── BCM (Body Control Module) ────────────────────────────────────────
  BCM:
    tx_id: 0x7A0
    pids:
      22B00E:
        period: 5000
        enabled: true
        parameters:
          CHARGE_PORT_OPEN:
            expression: "B10:4"
            unit: ""
            ha_class: opening
            mqtt_topic: charge_port_open
            min: ""
            max: ""
            source: "Kia Niro EV WiCAN PR#716"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/716
            verified: false
            notes: "Bit flag — 1=open, 0=closed. Untested on Ioniq 2017."

  # ─── HVAC (Heating, Ventilation, Air Conditioning) ────────────────────
  HVAC:
    tx_id: 0x7B3
    pids:
      220100:
        period: 5000
        enabled: true
        parameters:
          HVAC_IAT:
            expression: "(B11/2)-40"
            unit: "°C"
            ha_class: temperature
            mqtt_topic: hvac_iat
            min: "-40"
            max: "87"
            source: "Original WiCAN config"
            source_links: []
            verified: true
            notes: "Intake Air Temperature"

          HVAC_AAT:
            expression: "(B12/2)-40"
            unit: "°C"
            ha_class: temperature
            mqtt_topic: hvac_aat
            min: "-40"
            max: "87"
            source: "Original WiCAN config"
            source_links: []
            verified: true
            notes: "Ambient Air Temperature (HVAC sensor)"

          HVAC_EVAPORATOR_TEMP:
            expression: "(B13/2)-40"
            unit: "°C"
            ha_class: temperature
            mqtt_topic: hvac_evaporator_temp
            min: "-40"
            max: "87"
            source: "Original WiCAN config"
            source_links: []
            verified: false
            notes: ""

          HVAC_HUMIDITY_SENSOR_FOR_AUTOMATIC_DEFOGGER:
            expression: "B9/255*100"
            unit: "%"
            ha_class: humidity
            mqtt_topic: hvac_humidity
            min: "0"
            max: "100"
            source: "Original WiCAN config"
            source_links: []
            verified: false
            notes: ""

          HVAC_HUMIDITY_SENSOR_FOR_AUTOMATIC_DEFOGGER_IONIQ5:
            expression: "B34/255*100"
            unit: "%"
            ha_class: humidity
            mqtt_topic: hvac_humidity_ioniq5
            min: "0"
            max: "100"
            source: "Original WiCAN config"
            source_links: []
            verified: false
            notes: "Ioniq 5 byte offset — may not work on Ioniq 2017"

          HVAC_INVERTER_TEMP:
            expression: "(B15/2)-40"
            unit: "°C"
            ha_class: temperature
            mqtt_topic: hvac_inverter_temp
            min: "-40"
            max: "87"
            source: "ImHex pattern (@ 0x0C)"
            source_links: []
            verified: false
            notes: "AC compressor inverter temperature. ImHex 0x0C → WiCAN B15."

  # ─── CLU (Cluster / Instrument Panel) ─────────────────────────────────
  CLU:
    tx_id: 0x7C6
    pids:
      22B002:
        period: 10000
        enabled: true
        parameters:
          ODOMETER:
            expression: "[B12:B14]"
            unit: km
            ha_class: distance
            mqtt_topic: odometer
            min: "0"
            max: ""
            source: "Original WiCAN config"
            source_links: []
            verified: true
            notes: "3-byte odometer value"

  # ─── IGPM (Integrated Gateway Power Module) ──────────────────────────
  IGPM:
    tx_id: 0x770
    pids:
      22BC03:
        period: 2500
        enabled: true
        parameters:
          DOOR_DRV_OPEN:
            expression: "B10:5"
            unit: ""
            ha_class: door
            mqtt_topic: door_drv_open
            min: ""
            max: ""
            source: "Kia Niro EV WiCAN PR#716"
            source_links:
              - https://github.com/meatpiHQ/wican-fw/pull/716
            verified: false
            notes: "Bit flag — 1=open"

          DOOR_PAS_OPEN:
            expression: "B10:4"
            unit: ""
            ha_class: door
            mqtt_topic: door_pas_open
            min: ""
            max: ""
            source: "Kia Niro EV WiCAN PR#716"
            source_links:
