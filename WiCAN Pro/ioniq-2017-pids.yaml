            verified: false
            notes: "Inverted bit"

      22BC04:
        period: 2500
        enabled: true
        parameters:
          DOOR_LOCK_FL:
            expression: "B10:3"
            unit: ""
            ha_class: lock
            mqtt_topic: door_lock_fl
            min: ""
            max: ""
            source: "Kia Niro EV WiCAN PR#716"
            source_links:
