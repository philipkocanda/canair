            min: ""
            max: ""
            source: "Original WiCAN config"
            source_links: []
            verified: true
            notes: ""

          DRIVE_MODE_D:
            expression: "B10:3"
            unit: ""
            ha_class: ""
            mqtt_topic: drive_mode_d
            min: ""
            max: ""
            source: "Original WiCAN config"
            source_links: []
            verified: true
            notes: ""

          DEBUG_VEHICLE_STATE_FLAGS:
            expression: "B11"
            unit: ""
            ha_class: ""
            mqtt_topic: debug_vehicle_state_flags
