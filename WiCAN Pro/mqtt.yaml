mqtt:
  sensor:
    # Battery State of Charge Sensors
    - name: "Ioniq SOC Display"
      state_topic: "wican/ioniq/soc_disp"
      unit_of_measurement: "%"
      device_class: "battery"
      unique_id: "ioniq_soc_disp"
      icon: "mdi:battery"

    - name: "Ioniq SOC BMS"
      state_topic: "wican/ioniq/soc_bms"
      unit_of_measurement: "%"
      device_class: "battery"
      unique_id: "ioniq_soc_bms"
      icon: "mdi:battery"

    - name: "Ioniq SOH"
      state_topic: "wican/ioniq/soh"
      unit_of_measurement: "%"
      unique_id: "ioniq_soh"
      icon: "mdi:battery-heart"

    # Voltage Sensors
    - name: "Ioniq Battery Voltage"
      state_topic: "wican/ioniq/battery_voltage"
      unit_of_measurement: "V"
      device_class: "voltage"
      unique_id: "ioniq_battery_voltage"
      icon: "mdi:flash"

    - name: "Ioniq Max Cell Voltage"
      state_topic: "wican/ioniq/max_cell_voltage"
      unit_of_measurement: "V"
      device_class: "voltage"
      unique_id: "ioniq_max_cell_voltage"
      icon: "mdi:flash"

    - name: "Ioniq Min Cell Voltage"
      state_topic: "wican/ioniq/min_cell_voltage"
      unit_of_measurement: "V"
      device_class: "voltage"
      unique_id: "ioniq_min_cell_voltage"
      icon: "mdi:flash"

    - name: "Ioniq Aux Battery Voltage"
      state_topic: "wican/ioniq/aux_battery_voltage"
      unit_of_measurement: "V"
      device_class: "voltage"
      unique_id: "ioniq_aux_battery_voltage"
      icon: "mdi:car-battery"

    # Current Sensor
    - name: "Ioniq Battery Current"
      state_topic: "wican/ioniq/battery_current"
      unit_of_measurement: "A"
      device_class: "current"
      unique_id: "ioniq_battery_current"
      icon: "mdi:current-dc"

    # Temperature Sensors
    - name: "Ioniq Battery Inlet Temp"
      state_topic: "wican/ioniq/battery_inlet_temp"
      unit_of_measurement: "°C"
      device_class: "temperature"
      unique_id: "ioniq_battery_inlet_temp"
      icon: "mdi:thermometer"

    - name: "Ioniq Battery Max Temp"
      state_topic: "wican/ioniq/battery_max_temp"
      unit_of_measurement: "°C"
      device_class: "temperature"
      unique_id: "ioniq_battery_max_temp"
      icon: "mdi:thermometer-high"

    - name: "Ioniq Battery Min Temp"
      state_topic: "wican/ioniq/battery_min_temp"
      unit_of_measurement: "°C"
      device_class: "temperature"
      unique_id: "ioniq_battery_min_temp"
      icon: "mdi:thermometer-low"

    - name: "Ioniq Module 1 Temp"
      state_topic: "wican/ioniq/module_1_temp"
      unit_of_measurement: "°C"
      device_class: "temperature"
      unique_id: "ioniq_module_1_temp"
      icon: "mdi:thermometer"

    - name: "Ioniq Module 2 Temp"
      state_topic: "wican/ioniq/module_2_temp"
      unit_of_measurement: "°C"
      device_class: "temperature"
      unique_id: "ioniq_module_2_temp"
      icon: "mdi:thermometer"

    - name: "Ioniq Module 3 Temp"
      state_topic: "wican/ioniq/module_3_temp"
      unit_of_measurement: "°C"
      device_class: "temperature"
      unique_id: "ioniq_module_3_temp"
      icon: "mdi:thermometer"

    - name: "Ioniq Module 4 Temp"
      state_topic: "wican/ioniq/module_4_temp"
      unit_of_measurement: "°C"
      device_class: "temperature"
      unique_id: "ioniq_module_4_temp"
      icon: "mdi:thermometer"

    - name: "Ioniq Module 5 Temp"
      state_topic: "wican/ioniq/module_5_temp"
      unit_of_measurement: "°C"
      device_class: "temperature"
      unique_id: "ioniq_module_5_temp"
      icon: "mdi:thermometer"

    - name: "Ioniq Ambient Temp"
      state_topic: "wican/ioniq/ambient_temp"
      unit_of_measurement: "°C"
      device_class: "temperature"
      unique_id: "ioniq_ambient_temp"
      icon: "mdi:thermometer"

    # Distance and Speed Sensors
    - name: "Ioniq Odometer"
      state_topic: "wican/ioniq/odometer"
      unit_of_measurement: "km"
      device_class: "distance"
      unique_id: "ioniq_odometer"
      icon: "mdi:counter"

    - name: "Ioniq Vehicle Speed"
      state_topic: "wican/ioniq/vehicle_speed"
      unit_of_measurement: "km/h"
      device_class: "speed"
      unique_id: "ioniq_vehicle_speed"
      icon: "mdi:speedometer"

    # Fan Status Sensors
    - name: "Ioniq Battery Fan Status"
      state_topic: "wican/ioniq/battery_fan_status"
      unique_id: "ioniq_battery_fan_status"
      icon: "mdi:fan"

    - name: "Ioniq Battery Fan Feedback"
      state_topic: "wican/ioniq/battery_fan_feedback"
      unique_id: "ioniq_battery_fan_feedback"
      icon: "mdi:fan"

    # Cell Number Sensors
    - name: "Ioniq Max Cell Voltage Number"
      state_topic: "wican/ioniq/max_cell_voltage_no"
      unique_id: "ioniq_max_cell_voltage_no"
      icon: "mdi:battery-outline"

    - name: "Ioniq Min Cell Voltage Number"
      state_topic: "wican/ioniq/min_cell_voltage_no"
      unique_id: "ioniq_min_cell_voltage_no"
      icon: "mdi:battery-outline"

    # Debug Sensors
    - name: "Ioniq Debug Drive Mode Flags"
      state_topic: "wican/ioniq/debug_drive_mode_flags"
      unique_id: "ioniq_debug_drive_mode_flags"
      icon: "mdi:car-cog"

    - name: "Ioniq Debug Vehicle State Flags"
      state_topic: "wican/ioniq/debug_vehicle_state_flags"
      unique_id: "ioniq_debug_vehicle_state_flags"
      icon: "mdi:car-info"

    - name: "Ioniq Debug MCU State Flags"
      state_topic: "wican/ioniq/debug_mcu_state_flags"
      unique_id: "ioniq_debug_mcu_state_flags"
      icon: "mdi:chip"

    - name: "Ioniq Debug BMS State Flags"
      state_topic: "wican/ioniq/debug_bms_state_flags"
      unique_id: "ioniq_debug_bms_state_flags"
      icon: "mdi:battery-unknown"

  binary_sensor:
    # Charging Status Binary Sensors
    - name: "Ioniq Charger Connected"
      state_topic: "wican/ioniq/charger_connected"
      device_class: "plug"
      unique_id: "ioniq_charger_connected"
      payload_on: "1"
      payload_off: "0"
      icon: "mdi:power-plug"

    - name: "Ioniq Charging"
      state_topic: "wican/ioniq/charging"
      device_class: "battery_charging"
      unique_id: "ioniq_charging"
      payload_on: "1"
      payload_off: "0"
      icon: "mdi:battery-charging"

    - name: "Ioniq DC Charging"
      state_topic: "wican/ioniq/charging_dc"
      device_class: "plug"
      unique_id: "ioniq_charging_dc"
      payload_on: "1"
      payload_off: "0"
      icon: "mdi:lightning-bolt"
