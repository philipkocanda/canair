# Ioniq 28kWh (AE) — captured UDS response payloads
#
# Each capture is a raw ISO-TP payload as hex, including the UDS response header.
# WiCAN expressions (B0, B1, ...) index into this full payload:
#   Service 0x21 → B0=0x61, B1=PID, data from B2
#   Service 0x22 → B0=0x62, B1-B2=DID, data from B3

sessions:

  - date: "2026-04-15"
    label: "Charging, dash on, doors unlocked — door/lock PID verification"
    notes: >
      AC charging at home. Dashboard on, all doors closed, all doors UNLOCKED.
      Extended diagnostic session (1003) required for IGPM 22BC03/04/06.
      Verification session to confirm door open/lock bit positions.
    captures:
      - ecu: IGPM
        pid: "22BC03"
        payload: "62BC03FDEE3C7300600000AAAA"
        notes: >
          13 bytes (11 data + 2 padding 0xAA).
          Byte 7 = 0x00 (compare: 0x20 ACC, 0x0A keyfob).
          Byte 8 = 0x60 = 01100000. Bit 5 (B10:5) = 1, bit 6 (B10:6) = 1.
          All DOOR_*_OPEN bits (B10:0,2,4,5) read 0 — doors closed.
          TRUNK_OPEN (B10:7) = 0.
          DOOR_LOCK_RL (1-B10:1) = 1, DOOR_LOCK_RR (1-B10:3) = 1 — but doors are UNLOCKED.

      - ecu: IGPM
        pid: "22BC04"
        payload: "62BC04B53FF4EA01000042AAAA"
        notes: >
          13 bytes (11 data + 2 padding 0xAA).
          DOOR_LOCK_FL (B10:3) = 0, DOOR_LOCK_FR (B10:2) = 0.

      - ecu: IGPM
        pid: "22BC06"
        payload: "62BC06B480000000000000AAAA"
        notes: "13 bytes. BRAKE_LIGHT (B7) = 0x00 (not braking)."

  - date: "2026-04-15"
    label: "ACC mode — light/ignition/seatbelt/charge port verification"
    notes: >
      Extended verification session in ACC2 mode. All IGPM reads use extended session (1003).
      BCM (0x7A0) does NOT require extended session. Tested: headlights (off/DRL/low/high),
      turn signals (left/right — hazards did NOT register), brake pedal, seatbelt toggle,
      ignition states (OFF/ACC1/ACC2/Ready), charge port flap (open/close).
    captures:
      # --- Ignition state progression ---
      - ecu: IGPM
        pid: "22BC03"
        payload: "62BC03FDEE3C730000000000AAAA"
        notes: "B7=0x00, B8=0x00 — no ignition flags set."

      - ecu: IGPM
        pid: "22BC03"
        payload: "62BC03FDEE3C730060000000AAAA"
        notes: "B7=0x00, B8=0x60 (bits 5,6). IGNITION_ON (B11:5)=1."

      # --- Light state captures (ACC2 mode) ---
      - ecu: IGPM
        pid: "22BC03"
        payload: "62BC03FDEE3C730A600C00AAAA"
        notes: "B9=0x0C (00001100). B9:2=DRL=1, B9:3=tail=1, B9:4=high=0, B9:5=low=0."

      - ecu: IGPM
        pid: "22BC03"
        payload: "62BC03FDEE3C730A602C00AAAA"
        notes: "B9=0x2C (00101100). B9:2=DRL=1, B9:3=tail=1, B9:4=high=0, B9:5=low=1."

      - ecu: IGPM
        pid: "22BC03"
        payload: "62BC03FDEE3C730A603C00AAAA"
        notes: "B9=0x3C (00111100). B9:2=DRL=1, B9:3=tail=1, B9:4=high=1, B9:5=low=1."

      # --- Seatbelt verification ---
      - ecu: IGPM
        pid: "22BC03"
        payload: "62BC03FDEE3C730A622C00AAAA"
        notes: "B8=0x62 (01100010). SEATBELT_FL (B11:1)=1. Compare 0x60 without seatbelt."

      # --- Ready mode (charger unplugged) ---
      - ecu: IGPM
        pid: "22BC03"
        payload: "62BC03FDEE3C7320600000AAAA"
        notes: "B8=0x60 — same as ACC2, cannot distinguish Ready from ACC2 via ignition bit."

      # --- Door verification captures ---
      - ecu: IGPM
        pid: "22BC03"
        payload: "62BC03FDEE3C7320600000AAAA"
        notes: "DOOR_DRV_OPEN (B10:5)=1. All other door bits 0."

      - ecu: IGPM
        pid: "22BC03"
        payload: "62BC03FDEE3C730A600000AAAA"
        notes: "B10=0x0A (00001010). DOOR_LOCK_RL (B10:1)=1, DOOR_LOCK_RR (B10:3)=1."

      - ecu: IGPM
        pid: "22BC04"
        payload: "62BC04B53FF4EA0D000042AAAA"
        notes: "B10=0x0D. DOOR_LOCK_FL (B10:3)=1, DOOR_LOCK_FR (B10:2)=1."

      - ecu: IGPM
        pid: "22BC03"
        payload: "62BC03FDEE3C732A600000AAAA"
        notes: "B10=0x2A (00101010). DRV_OPEN (bit5)=1, LOCK_RL (bit1)=1, LOCK_RR (bit3)=1. Driver unlocked by opening door."

      - ecu: IGPM
        pid: "22BC04"
        payload: "62BC04B53FF4EA05000042AAAA"
        notes: "B10=0x05 (00000101). LOCK_FL (bit3)=0 (driver unlocked), LOCK_FR (bit2)=1."

      # --- Turn signal captures (BC06) ---
      - ecu: IGPM
        pid: "22BC06"
        payload: "62BC06B480000000000000AAAA"
        notes: "Baseline — all zeros in light/signal bytes."

      - ecu: IGPM
        pid: "22BC06"
        payload: "62BC06B480000001000000AAAA"
        notes: "B8=0x01. LEFT_TURN_SIGNAL (B8:0)=1."

      - ecu: IGPM
        pid: "22BC06"
        payload: "62BC06B480000002000000AAAA"
        notes: "B8=0x02. RIGHT_TURN_SIGNAL (B8:1)=1."

      - ecu: IGPM
        pid: "22BC06"
        payload: "62BC06B48000002D000000AAAA"
        notes: "B7=0x2D (45 decimal). BRAKE_LIGHT scalar — non-zero = brake applied."

      # --- Charge port flap (BCM 0x7A0, no extended session needed) ---
      - ecu: BCM
        pid: "22B00E"
        payload: "62B00E0C00000020000000AAAA"
        notes: "B10=0x20 (bit 5 set). CHARGE_PORT_OPEN (B10:5)=1."

      - ecu: BCM
        pid: "22B00E"
        payload: "62B00E0C00000000000000AAAA"
        notes: "B10=0x00 (bit 5 clear). CHARGE_PORT_OPEN (B10:5)=0."

      # --- IOControl tests (service 0x2F) ---
      - ecu: IGPM
        pid: "2FBC01"
        payload: "6FBC0103"
        notes: |
          Positive response — low beams turned on physically. Actuator holds only
          while extended session (1003) is maintained with TesterPresent (3E00)
          keepalive. Session drop releases the actuator (lights turn off).
          Use: canreq.py --raw 770:2FBC0103 --hold

      # --- IOControl scan BC00-BC20 (service 0x2F, append 03) ---
      - ecu: IGPM
        pid: "2F_SCAN_BC00-BC20"
        response: "see notes"
        notes: |
          WARNING: This scan triggered the car alarm! BC09 (trunk unlock) and
          BC10/BC11 (door lock/unlock) were actuated during the scan.
          NEVER scan IOControl ranges blindly — always list individual commands
          and get explicit approval before sending.

          Accepted DIDs (positive 6F response):
            BC01 — low beam (verified: lights turned on)
            BC02 — high beam
            BC03 — front fog light
            BC04 — tail/rear light
            BC05 — red backlight flash
            BC07 — unknown
            BC08 — rear fog light
            BC09 — trunk unlock (TRIGGERED ALARM)
            BC0A — unknown
            BC0C — rear defogger relay
            BC10 — door LOCK all (TRIGGERED ALARM)
            BC11 — door UNLOCK all (TRIGGERED ALARM)
            BC12 — unknown (unlock variant?)
            BC14 — unknown
            BC15 — left turn indicator
            BC16 — right turn indicator
            BC18 — unknown
            BC1B — unknown

          Rejected DIDs (NRC):
            BC00 — 0x31 (requestOutOfRange)
            BC06 — 0x31
            BC0B — 0x31
            BC0D — 0x31
            BC0E — 0x31
            BC13 — 0x22 (conditionsNotCorrect)
            BC17 — 0x31
            BC19 — 0x31
            BC1A — 0x31

          No DRL-specific DID found. DRLs may activate with BC04 (tail light).

  # =========================================================================
  # 2026-04-15 — Ready mode session: SKM test, IGPM scans, IOControl tests
  # =========================================================================

  - date: "2026-04-15"
    label: "Ready mode — SKM IOControl & IGPM scans"
    state: "Ready mode (ACC on), then off+locked for SKM deep sleep test. Fob nearby."
    captures:

      # SKM IOControl (0x7A5) — Ready mode (ACC already on)
      - ecu: SKM
        pid: "2FB108030A0A05"
        label: "ACC relay ON — car in Ready (ACC already on)"
        response: "NRC 0x22 (conditionsNotCorrect)"
        notes: "ACC already active — IOControl rejects actuating to current state."

      - ecu: SKM
        pid: "2FB10802"
        label: "ACC relay freezeCurrentState — car in Ready"
        payload: "6FB1080262550000AAAAAAAAAA"
        notes: "Status bytes 0x62=01100010, 0x55=01010101. Possibly relay state bitmask."

      # SKM IOControl (0x7A5) — car off, unlocked, light sleep
      - ecu: SKM
        pid: "2FB108030A0A05"
        label: "ACC relay ON — car off, unlocked, light sleep"
        response: "accepted (session held, relay clicking)"
        notes: "ACC relay closed. Infotainment powered on, doors unlocked. Relay released on session drop."

      # SKM IOControl (0x7A5) — car off, LOCKED, deep sleep, fob nearby
      - ecu: SKM
        pid: "2FB108030A0A05"
        label: "ACC relay ON — car off, locked, deep sleep, --wake, fob nearby"
        response: "accepted (session established after 1001 wake)"
        notes: "SKM woke from deep sleep with 1001! ACC relay clicked on, doors unlocked, infotainment booted. Relay released on timeout, car re-locked. CAVEAT: fob was in proximity."

      # SKM IOControl (0x7A5) — car off, LOCKED, deep sleep, fob FAR AWAY
      - ecu: SKM
        pid: "2FB108030A0A05"
        label: "ACC relay ON — car off, locked, deep sleep, --wake, NO FOB"
        response: "NO DATA (all attempts)"
        notes: "Fob inside house (~15m away). 1001 → NO DATA, 1003 → NO DATA, IOControl → NO DATA. SKM completely dead without fob LF field. Confirms fob proximity is REQUIRED."

      # IGPM wake confirmation — no fob, deep sleep
      - ecu: IGPM
        pid: "22BC03"
        label: "IGPM wake test — no fob nearby, deep sleep"
        payload: "62BC03FDEE3C730A000000AAAA"
        notes: "IGPM wakes from 1001 regardless of fob proximity. B7=0x0A (locked state)."

      # IGPM read scan (Service 0x22) — Ready mode
      - ecu: IGPM
        pid: "22BC1D-BC41"
        label: "Read scan — Ready mode"
        scan_results:
          responding:
            - { did: "BC21", response: "7E00" }
            - { did: "BC34", response: "7E00" }
          rejected: "all others (NRC 0x31)"
        notes: "BC33 responded in deep sleep but BC34 in Ready. Timing-sensitive."

      - ecu: IGPM
        pid: "22BC42-BC80"
        label: "Read scan — Ready mode"
        scan_results:
          responding:
            - { did: "BC46", response: "7E00" }
            - { did: "BC59", response: "7E00" }
            - { did: "BC72", response: "7E00" }
          rejected: "all others (NRC 0x31)"
        notes: "Different DIDs vs deep sleep (BC56→BC59, BC77→BC72). Only BC46 consistent."

      # IGPM IOControl existence scan (Service 0x2F, --append 00) — Ready mode
      - ecu: IGPM
        pid: "2FBC1D-BC41 (append 00)"
        label: "IOControl existence scan — Ready mode"
        scan_results:
          responding:
            - { did: "BC21", response: "7E00", notes: "status register" }
            - { did: "BC26→BC25", response: "6FBC2500", notes: "unknown actuator (off-by-one)" }
            - { did: "BC2C→BC2B", response: "6FBC2B00", notes: "rear left brake (known)" }
            - { did: "BC2D→BC2C", response: "6FBC2C00", notes: "rear right brake (known)" }
            - { did: "BC2E→BC2D", response: "6FBC2D00", notes: "CHMSL (confirmed)" }
            - { did: "BC34", response: "7E00", notes: "status register" }
            - { did: "BC41→BC3F", response: "6FBC3F00", notes: "charge cable lock (known)" }
        notes: ""

      - ecu: IGPM
        pid: "2FBC42-BC60 (append 00)"
        label: "IOControl existence scan — Ready mode"
        scan_results:
          responding:
            - { did: "BC42", response: "6FBC4200", notes: "unknown actuator, no visible effect" }
            - { did: "BC43", response: "6FBC4300", notes: "unknown actuator, no visible effect" }
            - { did: "BC44", response: "6FBC4400", notes: "unknown actuator, no visible effect" }
            - { did: "BC46", response: "7E00", notes: "status register" }
            - { did: "BC58", response: "7E00", notes: "status register" }
        notes: ""

      - ecu: IGPM
        pid: "2FBC61-BCFF (append 00)"
        label: "IOControl existence scan — Ready mode"
        scan_results:
          responding:
            - { did: "BC65", response: "7E00" }
            - { did: "BC78", response: "7E00" }
            - { did: "BC91", response: "7E00" }
            - { did: "BCAB", response: "7E00" }
            - { did: "BCC5", response: "7E00" }
            - { did: "BCDF", response: "7E00" }
            - { did: "BCF9", response: "7E00" }
          notes: "All status registers, evenly spaced (~26 apart). No new actuators above BC44."
        notes: ""

      # IOControl actuator tests — Ready mode
      - ecu: IGPM
        pid: "2FBC2503"
        label: "Unknown actuator test — Ready mode"
        response: "accepted"
        notes: "No visible or audible effect."

      - ecu: IGPM
        pid: "2FBC2D03"
        label: "CHMSL test — Ready mode"
        response: "accepted"
        notes: "Center high-mount stop lamp (third brake light) turned on! Confirmed."

      - ecu: IGPM
        pid: "2FBC4203"
        label: "Unknown actuator test — Ready mode"
        response: "accepted"
        notes: "No visible or audible effect."

      - ecu: IGPM
        pid: "2FBC4303"
        label: "Unknown actuator test — Ready mode"
        response: "accepted"
        notes: "No visible or audible effect."

      - ecu: IGPM
        pid: "2FBC4403"
        label: "Unknown actuator test — Ready mode"
        response: "accepted"
        notes: "No visible or audible effect."

  - date: "2026-04-15"
    label: "SKM rapid-fire wake & ECU sweep"
    state: "car off, locked, unplugged, fob ~10m away inside house"
    captures:
      - ecu: SKM
        pid: "1001"
        label: "Rapid-fire wake — cold start #1"
        payload: "5001"
        notes: "SKM alive at attempt 17 of 100. 64ms timeout (ATST10), 150ms intervals. No fob nearby."

      - ecu: SKM
        pid: "1001"
        label: "Rapid-fire wake — cold start #2"
        payload: "5001"
        notes: "SKM alive at attempt 16. After WiCAN reboot + 15s settle."

      - ecu: SKM
        pid: "1001"
        label: "Rapid-fire wake — cold start #3"
        payload: "5001"
        notes: "SKM alive at attempt 2. Full ACC+IGN1 sequence followed."

      - ecu: SKM
        pid: "2FB108030A0A05"
        label: "ACC relay ON — deep sleep, no fob"
        payload: "6FB10803"
        notes: "ACC IOControl accepted without fob. Relay may not fully latch."

      - ecu: SKM
        pid: "2FB109030A0A05"
        label: "IGN1 relay ON — deep sleep, no fob"
        payload: "6FB10903"
        notes: "IGN1 IOControl accepted without fob."

      - ecu: BCM
        pid: "22C00B"
        label: "TPMS read — after SKM ACC+IGN1"
        payload: "62C00BFFFF00C9450200CB43"
        notes: "BCM alive after SKM ACC+IGN1. TPMS data returned. Multi-frame with ATH1 headers."

      - ecu: BCM
        pid: "22B00E"
        label: "Charge port — after SKM ACC+IGN1"
        payload: "62B00E0C00000000000000"
        notes: "Charge port closed. BCM responds without extended session."

      - ecu: CLU
        pid: "1001"
        label: "Brute-force wake attempt"
        response: "NO DATA"
        notes: "50 rapid attempts — CLU dead."

      - ecu: HVAC
        pid: "1001"
        label: "Brute-force wake attempt"
        response: "NO DATA"
        notes: "50 rapid attempts — HVAC dead."

      - ecu: Gateway
        pid: "1001"
        label: "Wake probe"
        response: "NO DATA"
        notes: "GW (0x7E6) dead."

      - ecu: ESC
        pid: "1001"
        label: "Wake probe"
        response: "NO DATA"
        notes: "ESC (0x7D1) dead."

  # ─── 2026-04-15 — BCM read scan (deep sleep, SKM ACC+IGN1 held) ───────────

  - date: "2026-04-15"
    label: "BCM read scan — deep sleep, SKM ACC+IGN1 held"
    state: "Car off, locked, deep sleep. SKM ACC+IGN1 held via IOControl."
    notes: "Method: canreq.py --scan --tx 7A0 --service 22 --range B001-B012 --wake"
    captures:
      # B-range: BCM body data
      - ecu: BCM
        pid: "22B001"
        label: "BCM data page 1"
        payload: "62B00140C0000000010000000000000201000000"
        notes: "20 bytes. Feature/config flags. Mostly zeros."

      - ecu: BCM
        pid: "22B002"
        label: "BCM data page 2"
        payload: "62B002C00000000200AAAAAAAA"
        notes: "13 bytes. Minimal data."

      - ecu: BCM
        pid: "22B003"
        label: "BCM data page 3"
        payload: "62B003BF8B8000973D09B8F9F8F9F73DF800000000000000AAAAAA"
        notes: "27 bytes. Dense bitfields — likely BCM configuration/feature flags."

      - ecu: BCM
        pid: "22B004"
        label: "BCM data page 4"
        payload: "62B0047402990C00008000AAAA"
        notes: "13 bytes. 0x7402990C — could be voltage/current calibration."

      - ecu: BCM
        pid: "22B005"
        label: "BCM data page 5"
        payload: "62B0052000100000000800AAAA"
        notes: "13 bytes."

      - ecu: BCM
        pid: "22B006"
        label: "BCM data page 6"
        payload: "62B0062000000000000000AAAA"
        notes: "13 bytes. Mostly zeros."

      - ecu: BCM
        pid: "22B007"
        label: "BCM data page 7"
        payload: "62B007002001E000000000AAAA"
        notes: "13 bytes. 0x01E0 = 480 decimal (minutes from midnight for 08:00?)."

      - ecu: BCM
        pid: "22B008"
        label: "BCM data page 8"
        payload: "62B00800510C2000880000AAAA"
        notes: "13 bytes."

      - ecu: BCM
        pid: "22B009"
        label: "BCM data page 9"
        payload: "62B009FEEEFEEE00000000AAAA"
        notes: "13 bytes. Repeating pattern FEEE — config word."

      - ecu: BCM
        pid: "22B00A"
        label: "BCM data page A"
        payload: "62B00AE3FEE30000400500AAAA"
        notes: "13 bytes."

      - ecu: BCM
        pid: "22B00B"
        label: "BCM status register"
        payload: "7E00"
        notes: "2 bytes only — status register, same as IGPM BC status DIDs."

      - ecu: BCM
        pid: "22B00C"
        label: "Preheat schedule — day-of-week bitmask"
        payload: "62B00C3F00000000000000AAAA"
        notes: "13 bytes. B3=0x3F (0b00111111) = 6 days set. User has daily preheat
                at 08:00 but may have missed one day. Remaining bytes 00 = no charging
                schedule. Preheat TIME not in this DID — likely in B007 or B00D."

      - ecu: BCM
        pid: "22B00D"
        label: "Preheat timer configuration"
        payload: "62B00DFCFCE00000000000AAAA"
        notes: "13 bytes. B3-B4=0xFCFC, B5=0xE0. May encode preheat departure time.
                0xE0=224 — relationship to 08:00 (480 min) unclear. Need to change
                time and re-read to decode."

      - ecu: BCM
        pid: "22B00E"
        label: "Charge port flap status"
        payload: "62B00E0C00000000000000AAAA"
        notes: "Charge port CLOSED. B3=0x0C. Confirmed: B10:5 in WiCAN = open/closed."

      - ecu: BCM
        pid: "22B00F"
        label: "BCM data page F"
        payload: "62B00FFCFCE00000000000AAAA"
        notes: "Note: scan showed this as 0xB00F responding but NOT B010-B012. Possibly only in ACC/Drive mode?"

      # C-range: TPMS/comfort data
      - ecu: BCM
