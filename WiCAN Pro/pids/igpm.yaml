        Well-documented on e-Niro/Soul — defrosts rear window.

    BC10:
      availability: [sleep, plugged, acc, ign, ready, charging]
      label: Door LOCK all
      verified: true
      on: "2FBC1003"
      off: "2FBC1000"
      notes: >
        Does NOT arm alarm — only locks doors.

    BC11:
      availability: [sleep, plugged, acc, ign, ready, charging]
      label: Door UNLOCK all
      verified: true
      on: "2FBC1103"
      off: "2FBC1100"
      notes: >
        Does NOT disarm alarm — opening door will trigger horn!

    BC12:
      availability: [sleep, plugged, acc, ign, ready, charging]
      label: Individual door unlock (1)
      verified: false
      on: "2FBC1203"
      off: "2FBC1200"
      notes: >
        May trigger alarm. Test with keyfob in hand.
        Soul uses 6F prefix — may unlock driver door only.

    BC13:
