    - type: decode
      target: "22BC03 POWER_MODE"
      status: captured
      priority: P1
      prerequisite: [sleep]
      notes: >
        POWER_MODE (B09) encodes key proximity and/or door lock state.
        0x0A (no key, all 5 doors locked) vs 0x73 (key in car, all 5 doors unlocked)
        during sleep — bits 0,3,4,5,6 differ. Two variables changed simultaneously;
        need isolated tests to determine which bits are key vs lock state.
      what_to_test:
        - "Sleep, no key, locked (baseline: 0x0A)"
        - "Sleep, key in car, unlocked (captured: 0x73)"
        - "Sleep, key in car, locked (isolates key bit)"
        - "Sleep, no key, unlocked (isolates lock bit)"
        - "ACC with/without key"
        - "Ready (always has key)"
      sources:
        - "captures/ — 2026-04-16 (no key, locked)"
        - "live query 2026-04-18 (key in car, unlocked)"
