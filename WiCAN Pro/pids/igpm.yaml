
# ─── IGPM (Integrated Gateway Power Module) ──────────────────────────
IGPM:
  tx_id: 0x770
  session: true  # Requires extended diagnostic session (10 03) before PID queries
  pids:
    22BC03:
      period: 2500
      enabled: true
      parameters:
        DOOR_DRV_OPEN:
          expression: "B10:5"
          ha_class: door
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "Bit flag — 1=open. Verified 2026-04-15."

        DOOR_PAS_OPEN:
          expression: "B10:4"
          ha_class: door
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "Bit flag — 1=open. Verified 2026-04-15."

        DOOR_RL_OPEN:
          expression: "B10:0"
          ha_class: door
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "Bit flag — 1=open. Verified 2026-04-15."

        DOOR_RR_OPEN:
          expression: "B10:2"
          ha_class: door
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "Bit flag — 1=open. Verified 2026-04-15."

        TRUNK_OPEN:
          expression: "B10:7"
          ha_class: door
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "Bit flag — 1=open. Verified 2026-04-15."

        DRL:
          expression: "B12:2"
          ha_class: light
          source: "Decoded from live captures (2026-04-15)"
          source_links: []
          verified: true
          notes: "Daytime Running Lights. Bit flag — 1=on. On in all light modes (DRL, low beam, high beam). Verified 2026-04-15."

        TAIL_LIGHTS:
          expression: "B12:3"
          ha_class: light
          source: "Decoded from live captures (2026-04-15)"
          source_links: []
          verified: true
          notes: "Tail/position lights. Bit flag — 1=on. On in all light modes (DRL, low beam, high beam). Verified 2026-04-15."

        HIGH_BEAM:
          expression: "B12:4"
          ha_class: light
          source: "Decoded from live captures (2026-04-15)"
          source_links: []
          verified: true
          notes: "Bit flag — 1=on. Only set with high beams active. Niro PR had this on BC04 B13:4 — wrong for Ioniq. Verified 2026-04-15."

        LOW_BEAM:
          expression: "B12:5"
          ha_class: light
          source: "Decoded from live captures (2026-04-15)"
          source_links: []
          verified: true
          notes: "Low beam headlights. Bit flag — 1=on. Also set when high beams are on (both low+high active together). Verified 2026-04-15."

        IGNITION_ON:
          expression: "B11:5"
          ha_class: power
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "Activates at ACC2/IGN1. Cannot distinguish ACC2 from Ready — both show bit=1. OFF and ACC1 both show bit=0 (ACC1 may behave differently when not charging). Verified 2026-04-15."

        POWER_MODE:
          expression: "B09"
          display: "f'0x{int(v):02X} {int(v):08b}'"
          ha_class: ""
          min: "0"
          max: "255"
          source: "Reverse engineered from cross-state comparison"
          source_links: []
          verified: false
          notes: >
            Raw power mode byte (IGPM BC03 WiCAN B09). Bitfield with multiple flags.
            Bit 5 (0x20) = ACC. Known values: 0x00 = off/charging, 0x0A = keyfob-wake
            or ACC2+lights (ambiguous — seen in both sleep and ACC2 states), 0x20 = ACC
            via SKM IOControl. Not a clean enum — treat as bitfield. Bit 5 is the only
            reliable ACC indicator. More at-car captures needed to fully map.
            Verified 2026-04-16.

        SEATBELT_FL:
          expression: "B11:1"
          ha_class: ""
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "Driver seatbelt. 1=buckled, 0=unbuckled. Verified 2026-04-15."

        SEATBELT_FR:
          expression: "B11:2"
          ha_class: ""
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: false
          notes: "Passenger seatbelt. Not tested (no passenger available during verification session)."

        DOOR_LOCK_RL:
          expression: "B10:1"
          ha_class: lock
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "1=locked, 0=unlocked. Niro PR used inverted 1-B10:1 but Ioniq raw bit already has correct polarity. Verified 2026-04-15."

        DOOR_LOCK_RR:
          expression: "B10:3"
          ha_class: lock
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "1=locked, 0=unlocked. Niro PR used inverted 1-B10:3 but Ioniq raw bit already has correct polarity. Verified 2026-04-15."

    22BC04:
      period: 2500
      enabled: true
      parameters:
        DOOR_LOCK_FL:
          expression: "B10:3"
          ha_class: lock
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "1=locked, 0=unlocked. Verified 2026-04-15."

        DOOR_LOCK_FR:
          expression: "B10:2"
          ha_class: lock
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "1=locked, 0=unlocked. Verified 2026-04-15."

    22BC06:
      period: 2500
      enabled: true
      parameters:
        BRAKE_LIGHT:
          expression: "B10"
          ha_class: ""
          min: "0"
          max: "255"
          source: "Decoded from live captures (2026-04-15)"
          source_links: []
          verified: true
          notes: "Scalar value. 0x00=off, 0x2D=brake pressed. Ioniq 5 OBDb had this at B4 — wrong for Ioniq 2017. Actual position is B7 (data byte 4). Verified 2026-04-15."

        LEFT_TURN_SIGNAL:
          expression: "B10:0"
          ha_class: ""
          source: "Decoded from live captures (2026-04-15)"
          source_links: []
          verified: true
          notes: "Left turn signal stalk. Bit flag — 1=on, persistent (not blinking state). Hazard lights do NOT register here. Verified 2026-04-15."

        RIGHT_TURN_SIGNAL:
          expression: "B10:1"
          ha_class: ""
          source: "Decoded from live captures (2026-04-15)"
          source_links: []
          verified: true
          notes: "Right turn signal stalk. Bit flag — 1=on, persistent (not blinking state). Hazard lights do NOT register here. Verified 2026-04-15."

    22BC01:
      enabled: false
      notes: >
        9 bytes. B03=0x40 (bit 6 set), B08=0x02 (bit 1 set), rest zeros. Static across
        deep sleep and ACC captures. Possibly immobilizer or key-related configuration flags.
        Sample: 62BC01400000000002.
      parameters: {}

    22BC02:
      enabled: false
      notes: >
        4 data bytes, all zeros in every capture (deep sleep and ACC). May only populate
        during driving (speed pulse, wiper state?). Sample: 62BC0200000000.
      parameters: {}

    22BC05:
      enabled: false
      notes: >
        8 data bytes. B03=0x7F, B04=0x11, B05=0x20, rest zeros. Static across all power
        states. 0x7F11 could be a version or capability register. Purpose unknown.
        Sample: 62BC057F112000000000.
      parameters: {}

    22BC07:
      enabled: false
      notes: >
        8 data bytes. B03-B06=0x0841FBCC (static — possibly anti-theft code or immobilizer
        ID). B09 changes between captures: 0x19 (ACC/deep sleep Apr 14-16) vs 0x11 (deep
        sleep Apr 17). May encode a slow-changing state or counter. Rest static.
        Sample: 62BC070841FBCC00001900AAAA.
      parameters: {}

    22BC08:
      ignored: true
      notes: >
        NRC 0x31 (requestOutOfRange). DID does not exist on Ioniq 2017 IGPM.
        Tested 2026-04-14.
      parameters: {}

    22BC09:
      ignored: true
      notes: >
        NRC 0x31 (requestOutOfRange). DID does not exist on Ioniq 2017 IGPM.
        Tested 2026-04-14.
      parameters: {}

    22BC0A:
      ignored: true
      notes: >
        NRC 0x31 (requestOutOfRange). DID does not exist on Ioniq 2017 IGPM.
        Tested 2026-04-14.
      parameters: {}
