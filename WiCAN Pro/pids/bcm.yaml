  research:
    - type: verify
      target: "22C00B"
      status: pending
      priority: P1
      prerequisite: [acc]
      notes: "Tyre temps (B11/15/20/24 - 50°C) unverified. Additional undecoded bytes beyond pressures/temps."
      what_to_test:
        - "TYRE_TEMP_FL/FR/RL/RR verify against known temps"
        - "Decode remaining 22C00B bytes"
    - type: decode
      target: "22B00C"
      status: captured
      priority: P2
      prerequisite: [acc]
      notes: "Preheat schedule. B3=0x3F (6 days set). Preheat TIME not in this DID — may be in B007 or B00D."
      sources:
        - "Captured 2026-04-15"
    - type: decode
      target: "22B00D"
      status: captured
      priority: P2
      prerequisite: [acc]
      notes: "Preheat timer config. B3-B4=0xFCFC, B5=0xE0. Change preheat time and re-read to decode."
      sources:
        - "Captured 2026-04-15"
    - type: decode
      target: "22B007"
      status: captured
      priority: P2
      prerequisite: [acc]
      notes: "Contains 0x01E0 = 480 = minutes from midnight for 08:00. Strong candidate for preheat departure time."
      sources:
        - "Captured 2026-04-15"
    - type: decode
      target: "22B001-B00A, B00F"
      status: captured
      priority: P3
      prerequisite: [acc]
      notes: "BCM body data pages, all responding, mostly undecoded. B001 config flags (20B), B003 dense bitfields (27B), B004 voltage/current, B009 repeating FEEE."
      sources:
        - "Captured 2026-04-15"
