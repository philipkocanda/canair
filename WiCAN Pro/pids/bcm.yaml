
# ─── BCM (Body Control Module) / TPMS ──────────────────────────────────
# BCM and TPMS share TX ID 0x7A0 (same physical ECU, part 95400G7470).
# TPMS data is accessed via DID 22C00B on the BCM.
BCM:
  tx_id: 0x7A0
  pids:
    22C00B:
      period: 15000
      enabled: true
      parameters:
        TYRE_PRESSURE_FL:
          expression: "B10/72.52"
          unit: bar
          ha_class: pressure
          mqtt_topic: tyre_pressure_fl
          min: "0"
          max: "5"
          source: "Original WiCAN config + Ioniq forum"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "72.52 converts raw byte to bar. Alternative: B10/5 gives psi."

        TYRE_PRESSURE_FR:
          expression: "B14/72.52"
          unit: bar
          ha_class: pressure
          mqtt_topic: tyre_pressure_fr
          min: "0"
          max: "5"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: ""

        TYRE_PRESSURE_RL:
          expression: "B19/72.52"
          unit: bar
          ha_class: pressure
          mqtt_topic: tyre_pressure_rl
          min: "0"
          max: "5"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: ""

        TYRE_PRESSURE_RR:
          expression: "B23/72.52"
          unit: bar
          ha_class: pressure
          mqtt_topic: tyre_pressure_rr
          min: "0"
          max: "5"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: ""

        TYRE_TEMP_FL:
          expression: "B11-50"
          unit: "°C"
          ha_class: temperature
          mqtt_topic: tyre_temp_fl
          min: "-50"
          max: "100"
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: false
          notes: "From Niro EV, untested on Ioniq 2017"

        TYRE_TEMP_FR:
          expression: "B15-50"
          unit: "°C"
          ha_class: temperature
          mqtt_topic: tyre_temp_fr
          min: "-50"
          max: "100"
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: false
          notes: ""

        TYRE_TEMP_RL:
          expression: "B20-50"
          unit: "°C"
          ha_class: temperature
          mqtt_topic: tyre_temp_rl
          min: "-50"
          max: "100"
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: false
          notes: ""

        TYRE_TEMP_RR:
          expression: "B25-50"
          unit: "°C"
          ha_class: temperature
          mqtt_topic: tyre_temp_rr
          min: "-50"
          max: "100"
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: false
          notes: ""
    22B00E:
      period: 5000
      enabled: true
      parameters:
        CHARGE_PORT_OPEN:
          expression: "B10:5"
          unit: ""
          ha_class: opening
          mqtt_topic: charge_port_open
          min: ""
          max: ""
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "Bit flag — 1=open, 0=closed. Niro PR had B10:4 — wrong for Ioniq, actual bit is B10:5. BCM does NOT require extended diagnostic session. Verified 2026-04-15."

    22B007:
      period: 60000
      enabled: false
      parameters:
        PREHEAT_DEPARTURE_TIME:
          expression: "(B07 << 8) | B09"
          unit: "min"
          display: "f'{int(v)//60:02d}:{int(v)%60:02d}'"
          ha_class: ""
          mqtt_topic: preheat_departure_time
          min: "0"
          max: "1439"
          source: "Reverse engineered — 0x01E0 = 480 = 08:00"
          source_links: []
          verified: false
          notes: >
            WIP. Minutes from midnight for departure preheat time. 0x01E0 = 480 = 08:00 matches
            configured preheat schedule. Needs verification by changing departure time and re-reading.
            Multi-frame response (13 bytes) — B08 is PCI byte, so can't use [B07:B09].
            B05=0x00, B06=0x20 purpose unknown.

    22B00C:
      period: 60000
      enabled: false
      parameters:
        PREHEAT_SCHEDULE_DAYS:
          expression: "B05"
          unit: ""
          display: "f'{int(v):07b}'"
          ha_class: ""
          mqtt_topic: preheat_schedule_days
          min: "0"
          max: "127"
          source: "Reverse engineered — 0x3F = 6 days set"
          source_links: []
          verified: false
          notes: >
            WIP. Day-of-week bitmask for preheat schedule. 0x3F = 0b00111111 = 6 days
            (user has daily preheat, one day may be unset or bit 6 = Sunday excluded).
            Bit mapping (Mon=bit0? Sun=bit6?) not yet confirmed. Needs verification by
            toggling individual days.

    22B003:
      period: 10000
      enabled: false
      parameters:
        BCM_12V_BATTERY:
          expression: "B10*0.08"
          unit: "V"
          display: ""
          ha_class: voltage
          mqtt_topic: bcm_12v_battery
          min: "0"
          max: "20"
          source: "Reverse engineered from monitor drift analysis"
          source_links: []
          verified: false
          notes: >
            12V battery voltage measured by BCM. WiCAN B10 (ELM payload index 7) is the
            fastest-drifting byte in 22B003 during deep sleep — decrements ~2 LSB/min under
            parasitic load. Formula v*0.08 estimated: value 149 → 11.92V, consistent with
            a low 12V battery at rest. Needs cross-reference with LDC_OUTPUT_V to confirm
            exact scale factor. Other bytes in B003 (B09, B11-B15, B17) also drift but
            slower — may be additional measurement points (fuse box, BCM rail, etc.).
        BCM_POWER_MODE:
          expression: "B12"
          unit: ""
          display: ""
          ha_class: ""
          mqtt_topic: bcm_power_mode
          min: "0"
          max: "255"
          source: "Reverse engineered from cross-state comparison"
          source_links: []
          verified: false
          notes: >
            WiCAN B12 (ELM payload index 9). Shows ADC-like values (~245-248) during deep
            sleep, oscillating ±1 LSB (typical ADC noise). Earlier captures showed 0x09 and
            0x0A — possibly from a different vehicle state (ACC/IGN on) or a pre-PCI-fix
            byte offset error. Disabled until values are better understood with at-car
            captures across multiple vehicle states.
