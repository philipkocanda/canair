  # ─── IOControl (service 2F) ──────────────────────────────────────────
  # Requires extended session (10 03).
  # CRITICAL: Fob proximity required for relay to physically close.
  # SKM returns positive UDS response even without fob, but relay doesn't latch.
  # ACC does NOT latch — relay stays on only while session is held (TesterPresent).
  # Magic bytes 0A 0A 05 from Kia Soul, confirmed working on Ioniq 2017.
  # Usage: python3 canreq.py --raw 7A5:<on_command> --session
  iocontrol:
    B108:
      availability: []
      label: ACC relay
      verified: true
      on: "2FB108030A0A05"
      off: "2FB10800"
      hold: false
      notes: >
        Requires fob proximity — UDS positive response without fob is misleading
        (relay doesn't physically close). Verify via IGPM BC03 ignition byte.
        ACC ON: dash lights, infotainment, doors unlock. NRC 0x22 if ACC already on.
        freezeCurrentState (02) returns status bytes 6255.

    B109:
      availability: []
      label: IGN1 relay
      verified: false
      on: "2FB109030A0A05"
      off: "2FB10900"
      hold: false
      notes: >
        Ignition 1 — wakes all ECUs including HV system?
    B10A:
      availability: []
      label: IGN2 relay
      verified: false
      on: "2FB10A030A0A05"
      off: "2FB10A00"
      hold: false
      notes: >
        Ignition 2 — purpose unclear on Ioniq EV. From Kia Soul EV.

    B10B:
      availability: []
      label: Start relay
      verified: false
      on: "2FB10B030A0A05"
      off: "2FB10B00"
      hold: false
      notes: >
        Start relay from Kia Soul EV.
  research:
    - type: decode
      target: "22B002"
      status: captured
      priority: P1
      prerequisite: [sleep]
      date: "2026-04-18"
      notes: >
        136 bytes — biggest payload of any ECU. Likely contains key fob presence/RSSI,
        immobilizer state, button presses. Capture with key removed for diff.
      what_to_test:
        - "Key in car vs key removed — diff B002 payload"
        - "Key near vs far — check for RSSI bytes"
        - "During ACC/ready — compare states"
    - type: verify
      target: "2FB109"
      status: pending
      priority: P2
      notes: "IGN1 relay ON — accepted but untested."
    - type: verify
      target: "2FB10A"
      status: pending
      priority: P2
      notes: "IGN2 relay ON — accepted but untested."
    - type: verify
