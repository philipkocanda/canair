  # ─── IOControl (service 2F) ──────────────────────────────────────────
  # Requires extended session (10 03).
  # CRITICAL: Fob proximity required for relay to physically close.
  # SKM returns positive UDS response even without fob, but relay doesn't latch.
  # ACC does NOT latch — relay stays on only while session is held (TesterPresent).
  # Magic bytes 0A 0A 05 from Kia Soul, confirmed working on Ioniq 2017.
  # Usage: python3 canreq.py --raw 7A5:<on_command> --session
  #
  # Scan status (2026-04-18):
  #   B000-B0FF: not scanned (session dropped on B0xx — SKM may sleep mid-scan)
  #   B100-B1FF: 150/256 responding (returnControl 00 probe). Likely diagnostic test
  #     points for factory QA — relay drivers, antenna circuits, LED, buzzer, key slot.
  #     Only B108-B10B are documented individually (relay control with magic bytes).
  #     First 20 B1xx DIDs added for identification testing.
  #     Remaining ~130 DIDs not listed — add individually as identified through testing.
  #
  # ⚠ SAFETY WARNINGS for unknown B1xx DIDs:
  #   HIGH RISK:
  #   - ESCL (steering column lock) — locking without proper key state may require
  #     dealer tools to unlock. Could physically immobilize the car.
  #   - Main B+ relay — cutting main power kills OBD port. WiCAN loses connection,
  #     cannot send OFF command. Need physical car restart.
  #   - Start/motor contactor — engaging HV contactor unexpectedly could confuse BMS
  #     or trigger safety interlocks.
  #   - Immobilizer re-learn — triggering a reset cycle may prevent starting until
  #     dealer re-programs the key.
  #   MEDIUM RISK:
  #   - Door locks — UDS-triggered lock with key inside could lock you out (anti-lockout
  #     logic may not apply to diagnostic commands).
  #   - Alarm/siren/horn — annoying, hard to stop if WiCAN connection drops.
  #   MITIGATION:
  #   - Always have physical key fob in hand.
  #   - Keep activations brief — don't hold 03 on unknown DIDs.
  #   - Test during daytime (horn/siren tolerance).
  #   - Have someone in the car who can press start button or fob.
  #   - Skip B101-B103 until identified — likely most dangerous (power/ESCL/immobilizer).
  #   - Note: B108-B10B proved that UDS positive response ≠ physical actuation without
  #     fob. Same safety MAY apply to other dangerous DIDs, but don't count on it.
  iocontrol:
    B108:
      availability: []
      label: ACC relay
      verified: true
      on: "2FB108030A0A05"
      off: "2FB10800"
      hold: false
      notes: >
        Requires fob proximity — UDS positive response without fob is misleading
        (relay doesn't physically close). Verify via IGPM BC03 ignition byte.
        ACC ON: dash lights, infotainment, doors unlock. NRC 0x22 if ACC already on.
        freezeCurrentState (02) returns status bytes 6255.

    B109:
      availability: []
      label: IGN1 relay
      verified: false
      on: "2FB109030A0A05"
      off: "2FB10900"
      hold: false
      notes: >
        Ignition 1 — wakes all ECUs including HV system?
    B10A:
      availability: []
      label: IGN2 relay
      verified: false
      on: "2FB10A030A0A05"
      off: "2FB10A00"
      hold: false
      notes: >
        Ignition 2 — purpose unclear on Ioniq EV. From Kia Soul EV.

    B10B:
      availability: []
      label: Start relay
      verified: false
      on: "2FB10B030A0A05"
      off: "2FB10B00"
      hold: false
      notes: >
        Start relay from Kia Soul EV.

    B101:
      availability: []
      label: "⚠ DO NOT TEST — likely B+ relay or ESCL"
      verified: false
      on: "2FB10103"
      off: "2FB10100"
      notes: >
        DANGER: Likely main power relay or ESCL (steering column lock). Activating
        ESCL via raw UDS can corrupt its internal state machine, causing it to refuse
        to unlock. Known to have bricked a Renault Zoe ESCL via DDT4All — required
        dealer replacement of ESCL+SKM+BCM (cryptographically paired). Do not test
        until positively identified through non-destructive means.
    B102:
      availability: []
      label: "⚠ DO NOT TEST — likely ESCL or immobilizer"
      verified: false
      on: "2FB10203"
      off: "2FB10200"
      notes: >
        DANGER: See B101 notes. Likely ESCL lock/unlock or immobilizer control.
        ESCL has wear counter and error state that is unrecoverable without dealer tools.
