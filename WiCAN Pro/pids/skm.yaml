
# ─── SKM (Smart Key Module) ────────────────────────────────────────────
# Self-identifies as "SMK". Wakes from at least two or more CAN requests, slow to wake (>1s).
# Likely responsible for key fob detection, immobilizer, and remote functions.
# Falls asleep after ~60s of bus inactivity.
