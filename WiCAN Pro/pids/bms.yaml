
# ─── BMS (Battery Management System) ─────────────────────────────────
BMS:
  tx_id: 0x7E4
  pids:
    2101:
      period: 2500
      enabled: true
      parameters:
        SOC_BMS:
          expression: "B09/2"
          unit: "%"
          ha_class: battery
          mqtt_topic: soc_bms
          min: "0"
          max: "100"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "BMS state of charge (raw, not display-adjusted)"

        BATTERY_POWER:
          expression: "(([B18:B19]/10) * (((S15 << 8) | S17)/10)) / 1000"
          unit: kW
          ha_class: power
          mqtt_topic: battery_power
          min: ""
          max: ""
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "Computed from voltage * current. Negative = charging."

        BATTERY_VOLTAGE:
          expression: "[B18:B19]/10"
          unit: V
          ha_class: voltage
          mqtt_topic: battery_voltage
          min: "0"
          max: ""
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: ""

        BATTERY_CURRENT:
          expression: "((S15 << 8) | S17)/10"
          unit: A
          ha_class: current
          mqtt_topic: battery_current
          min: "-200"
          max: "200"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "Signed — negative = charging"

        MAX_CELL_VOLTAGE:
          expression: "B30*0.02"
          unit: V
          ha_class: voltage
          mqtt_topic: max_cell_voltage
          min: "0"
          max: "10"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: ""

        MIN_CELL_VOLTAGE:
          expression: "B33*0.02"
          unit: V
          ha_class: voltage
          mqtt_topic: min_cell_voltage
          min: "0"
          max: "10"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: ""

        AUX_BATTERY_VOLTAGE:
          expression: "B37*0.1"
          unit: V
          ha_class: voltage
          mqtt_topic: aux_battery_voltage
          min: "0"
          max: "128"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "12V auxiliary battery"

        CHARGER_CONNECTED:
