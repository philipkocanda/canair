        CUMULATIVE_ENERGY_CHARGED:
          expression: "((B47<<24)|(B49<<16)|(B50<<8)|B51)/10"
          unit: Wh
          ha_class: energy
          mqtt_topic: cumulative_energy_charged
          min: "0"
          max: ""
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "Lifetime cumulative, unit is Wh not kWh"

        CUMULATIVE_ENERGY_DISCHARGED:
          expression: "((B52<<24)|(B53<<16)|(B54<<8)|B55)/10"
          unit: Wh
          ha_class: energy
          mqtt_topic: cumulative_energy_discharged
          min: "0"
          max: ""
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "Lifetime cumulative, unit is Wh not kWh"

        CUMULATIVE_CURRENT_CHARGED:
          expression: "((B32<<24)|(B33<<16)|(B34<<8)|B35)/10"
          unit: Ah
          ha_class: ""
          mqtt_topic: cumulative_current_charged
          min: "0"
          max: ""
          source: "ImHex pattern (u32 @ 0x20)"
          source_links: []
          verified: false
          notes: "ImHex offset 0x20 → WiCAN B32. Raw capture: 313775 → 31377.5 Ah. Matches ImHex comment exactly."

        CUMULATIVE_CURRENT_DISCHARGED:
          expression: "((B36<<24)|(B37<<16)|(B38<<8)|B39)/10"
          unit: Ah
          ha_class: ""
          mqtt_topic: cumulative_current_discharged
          min: "0"
          max: ""
          source: "ImHex pattern (u32 @ 0x24)"
          source_links: []
          verified: false
          notes: "ImHex offset 0x24 → WiCAN B36. Raw capture: 313313 → 31331.3 Ah."

        OPERATING_TIME:
          expression: "[B57:B60]/3600"
          unit: "h"
          ha_class: duration
          mqtt_topic: operating_time
          min: "0"
          max: "1000000"
          source: "CSS Electronics DBC (OperatingTime m257 : 399|32@0+, scale 1/3600) + live verification"
          source_links:
            - "CSS Electronics/ev-data-pack-v10/electric_cars/dbc_files/can1-hyundai-kia-uds-v2.4.dbc"
          verified: true
          notes: "32-bit unsigned, ISO-TP bytes 48-51 (WiCAN B57-B60). Raw value is seconds, /3600 converts to hours. Live-verified 2026-04-14: 5902h. Was B57 (single byte = MSB of u32, always 0x01 = 1)."

