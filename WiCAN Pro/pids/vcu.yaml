
# ─── VCU (Vehicle Control Unit) ──────────────────────────────────────
VCU:
  tx_id: 0x7E2
  pids:
    2101:
      period: 2500
      enabled: true
      parameters:
        VEHICLE_SPEED:
          expression: "((S20*256)+S19)/100"
          unit: km/h
          ha_class: speed
          min: "-255"
          max: "255"
          verified: true
          notes: "Signed 16-bit, divided by 100"

        VEHICLE_SPEED_ALT:
          expression: "[B19:B20]/100"
          unit: km/h
          ha_class: speed
          verified: true
          notes: "Alternative unsigned formula — same bytes, different sign handling"

        DEBUG_DRIVE_MODE_FLAGS:
          expression: "B10"
          unit: ""
          verified: true
          notes: "Raw byte — individual bits below"

        DRIVE_MODE_P:
          expression: "B10:0"
          unit: ""
          verified: true
          notes: ""

        DRIVE_MODE_R:
          expression: "B10:1"
          unit: ""
          verified: true
          notes: ""

        DRIVE_MODE_N:
          expression: "B10:2"
          unit: ""
          verified: true
          notes: ""

        DRIVE_MODE_D:
          expression: "B10:3"
          unit: ""
          verified: true
          notes: ""

        DEBUG_VEHICLE_STATE_FLAGS:
          expression: "B11"
          unit: ""
          verified: true
          notes: "Raw byte — individual bits below"

        VEHICLE_STATE_BRAKE_LAMP:
          expression: "B11:0"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_NOT_BRAKING:
          expression: "B11:1"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_START_KEY:
          expression: "B11:2"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_EV_READY:
          expression: "B11:3"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_VCU_READY:
          expression: "B11:4"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_MAIN_RELAY_OFF:
          expression: "B11:5"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_POWER_ENABLE:
          expression: "B11:6"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_LDC_INHIBIT:
          expression: "B11:7"
          unit: ""
          verified: false
          notes: ""

        DEBUG_MCU_STATE_FLAGS:
          expression: "B12"
          unit: ""
          source: "AutoPID config (on device)"
          verified: true
          notes: "Present in AutoPID but not in vehicle profile"

        CAR_READY:
          expression: "B26:3"
          unit: ""
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: false
          notes: ""

        PARK_BRAKE:
          expression: "B26:5"
          unit: ""
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: false
          notes: ""

        ACCEL_PEDAL_DEPTH:
          expression: "B16/2"
          unit: "%"
          min: "0"
          max: "100"
          source: "ImHex pattern (@ 0x0E) + JejuSoul Torque Pro CSV"
          source_links:
            - https://docs.google.com/spreadsheets/d/1R2dW_4-ANg04TQdkHH52-8wdYItBkWDfppcsqOc-m1M
          verified: false
          notes: "ImHex offset 0x0E + 2 = B16. Ioniq 5 OBDb confirms at bix 96, len 8, div 2."

    2102:
      period: 5000
      enabled: true
      parameters:
        VCU_MOTOR_RPM:
          expression: "((S7<<8)|B6)"
          unit: RPM
          source: "JejuSoul Torque Pro CSV"
          verified: false
          notes: "Torque letters e=B4,f=B5 → ISO-TP 4,5 → WiCAN B6,B7. Signed 16-bit."

        VCU_INVERTER_INPUT_VOLTAGE:
          expression: "B10*2"
          unit: V
          ha_class: voltage
          min: "0"
          source: "JejuSoul Torque Pro CSV"
          verified: false
          notes: "Torque letter I=B8 → ISO-TP 8 → WiCAN B10."

        VCU_HEAT_SINK_TEMP:
          expression: "B16-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "215"
          source: "JejuSoul Torque Pro CSV"
          verified: false
          notes: "Torque letter o=B14 → ISO-TP 14 → WiCAN B16."

        VCU_MCU_TEMP:
          expression: "B22-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "215"
          source: "JejuSoul Torque Pro CSV"
          verified: false
          notes: "Torque letter u=B20 → ISO-TP 20 → WiCAN B22."
