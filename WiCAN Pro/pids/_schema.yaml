# PID Definition Schema
# Validates per-ECU YAML files in this directory.
# Run: python3 validate-pids.py
#
# Each ECU file (e.g. bcm.yaml) must have this top-level structure:
#   ECU_NAME:
#     tx_id: 0xNNN          # hex CAN arbitration ID
#     session: bool          # optional — requires extended diagnostic session (10 03)
#     identity:              # optional — ECU identity from F1xx DIDs
#       part_number: str     # from F187/F188 (HK DID)
#       description: str     # human-readable module name
#       firmware: str        # firmware version
#       software: str        # software ID string
#       serial: str          # from F18C/F18B (cal date / serial)
#     pids:
#       PID_CODE:            # e.g. 22C00B, 2101
#         period: N          # polling interval in ms (optional, default 5000)
#         enabled: bool      # include in profiles (optional, default true)
#         ignored: bool      # hide from queries/profiles (optional, default false)
#                            # Use for DIDs that returned NRC or contain no useful data.
#                            # Ignored PIDs are still documented but excluded from
#                            # build_ecu_index, generate-profile, and query commands.
#         notes: str         # optional — PID-level notes
#         parameters:
#           PARAM_NAME:
#             expression: str     # required — WiCAN formula
#             unit: str           # optional — display unit
#             ...                 # see optional_param_fields below
#
# _meta.yaml must have:
#   car_model: str
#   init: str              # AT command init string

required_ecu_fields:
  - tx_id
  - pids

optional_ecu_fields:
  - session
  - identity
  - iocontrol       # IOControl (service 2F) commands — see iocontrol_fields below

required_pid_fields: []

optional_pid_fields:
  - period
  - enabled
  - ignored
  - notes
  - parameters

required_param_fields:
  - expression

optional_param_fields:
  - unit
  - ha_class
  - mqtt_topic
  - min
  - max
  - source
  - source_links
  - verified
  - notes
  - enabled
  - display

required_meta_fields:
  - car_model
  - init

# IOControl section (service 0x2F) — per-ECU actuator commands.
# Lives under ECU_NAME.iocontrol alongside ECU_NAME.pids.
# Format:
#   iocontrol:
#     DID_HEX:                         # e.g. BC01, B05B
#       label: str                     # Human-readable name (required)
#       verified: bool                 # Tested on this car? (same as PID parameters)
#       on: str                        # Full hex command for ON (e.g. "2FBC0103")
#       off: str                       # Full hex command for OFF (e.g. "2FBC0100")
#       notes: str                     # Additional context (use > for multiline)
#       session: bool                  # Requires extended session (default: true)
#       hold: bool                     # Needs --hold to keep active (default: true)
#
# Control type suffixes (appended to 2F<DID>):
#   03 = shortTermAdjustment (ON)
#   00 = returnControl (OFF / release)
#
# Usage with canreq.py:
#   python3 canreq.py --raw <TX_ID>:<on_command> --hold
#   e.g.: python3 canreq.py --raw 770:2FBC0103 --hold
iocontrol_fields:
  - label
  - verified
  - "on"
  - "off"
  - notes
  - session
  - hold
