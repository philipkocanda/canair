
# ─── HVAC (Heating, Ventilation, Air Conditioning) ────────────────────
HVAC:
  tx_id: 0x7B3
  identity:
    part_number: "97250-G7060"
    description: "CONTROL ASS'Y-DATC"
    firmware: "1.03"
    software: "AE_EV DATC(-)1.0"
    serial: "1705304705"
  pids:
    220100:
      period: 5000
      enabled: true
      parameters:
        HVAC_IAT:
          expression: "(B11/2)-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "87"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "Intake Air Temperature"

        HVAC_AAT:
          expression: "(B12/2)-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "87"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "Ambient Air Temperature (HVAC sensor)"

        HVAC_EVAPORATOR_TEMP:
          expression: "(B13/2)-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "87"
          source: "Original WiCAN config"
          source_links: []
          verified: false
          notes: ""

        HVAC_HUMIDITY_SENSOR_FOR_AUTOMATIC_DEFOGGER:
          expression: "B9/255*100"
          unit: "%"
          ha_class: humidity
          min: "0"
          max: "100"
          source: "Original WiCAN config"
          source_links: []
          verified: false
          notes: "Static value, cannot be correct"

        HVAC_HUMIDITY_SENSOR_FOR_AUTOMATIC_DEFOGGER_IONIQ5:
          expression: "B34/255*100"
          unit: "%"
          ha_class: humidity
          min: "0"
          max: "100"
          source: "Original WiCAN config"
          source_links: []
          verified: false
          notes: "Ioniq 5 byte offset — may not work on Ioniq 2017"

        HVAC_INVERTER_TEMP:
          expression: "(B15/2)-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "87"
          source: "ImHex pattern (@ 0x0C)"
          source_links: []
          verified: false
          notes: "AC compressor inverter temperature. ImHex 0x0C → WiCAN B15."
