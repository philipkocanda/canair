  research:
    - type: iocontrol_scan
      target: "2F F000-F0FF"
      status: done
      date: "2026-04-19"
      priority: P1
      prerequisite: [acc, charging]
      result: >
        13 DIDs respond to ReturnControlToECU (00): F011, F013-F018, F022-F027.
        F012 accepts ShortTermAdjustment (03) but rejects ReturnControlToECU (00).
        All return 6F{DID}0000 (5 bytes). Gaps at F012 (exists for 03 but not 00),
        F019-F021. ShortTermAdjustment (03) accepted but requires value bytes —
        NRC 0x13 without them. Ranges E0xx, B0xx, C0xx, 01xx, F1xx, 00xx all
        NRC 0x31 (empty).
      notes: >
        Two groups: F011-F018 (7 DIDs, gap at F012) and F022-F027 (6 DIDs).
        F028-F0FF not yet scanned. Value byte format unknown — need to test
        with TUI v-key (ShortTermAdjustment with user-provided values).
    - type: verify
      target: "220100"
      status: pending
      priority: P1
      prerequisite: [acc]
      notes: "HVAC_INVERTER_TEMP (B15, (x/2)-40) unverified. Additional undecoded bytes: driver vent temp (B28), driver legs vent temp (B29), evaporator temp alt (B31), unknown temps (B32-34). Vehicle speed at bix 232 (byte 29) per Ioniq 5."
      what_to_test:
        - "HVAC_INVERTER_TEMP (B15, (x/2)-40)"
        - "Driver vent temp (B28), legs vent temp (B29)"
        - "Vehicle speed at bix 232"
      sources:
        - "OBDb Ioniq 5 — 220100 signals"
    - type: scan
      target: "22 0100-010B"
      status: done
      priority: P1
      prerequisite: [acc]
      notes: >
        Scanned 2026-04-19. Service 0x21 for 0101-010B: all NRC 0x11.
        Service 0x22 for 0101-010B: only 0102 responds (already known),
        0101 and 0103-010B all NRC 0x31. HVAC ECU only has 220100 and
        220102 in the 01xx range. ChatGPT suggestions for 0105-010B were
        incorrect for Ioniq 2017.
