# No live data DIDs discovered yet. Try 2101 for brake pressure/pedal data.
#
# Identity (2026-04-17, ready mode):
#   F18C (serial): 17060100003900000000 (mfg date 2017-06-01, serial 0039)
#   F101 (app SW): G7
#
# Probing (2026-04-19):
#   Dead during AC charging — does not respond to 1001, 1003, 3E00, 1A8C, or 22 F100-F1FF.
#   Requires ACC/ignition power. Scan service 22 F100-F1FF returned 256 NO DATA.
#   KWP2000 1A8C also NO DATA (not a KWP2000 ECU — only UDS).
Unknown-7D5:
  tx_id: 0x7D5
