# WiCAN Pro local configuration
# Copy this file to config.yaml and adjust to match your network.
#
# Addresses can be IPs or hostnames. The CLI --wican flag accepts any key
# defined here, or an arbitrary URL/IP.

wican_addresses:
  # Direct connection to WiCAN AP (factory default)
  ap: "192.168.80.1"
  # Example: device on your home LAN
  home: "192.168.1.100"
  # Example: device reachable via VPN/tunnel
  vpn: "10.0.0.100"

default_wican: ap
