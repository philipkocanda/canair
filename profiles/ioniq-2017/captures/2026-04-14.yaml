        pid: "2180"
        payload: "6180C366C000225100000000001D67004435000085130098980000"
        notes: "27 bytes. Ambient temp (B18-80)/2 = (0x67-80)/2 = 11.5°C."

      # ECUs that did not respond during charging:
      #
      # 0x7C6 (CLU) 22B002  — NO DATA (cluster likely off, ignition required)
      # 0x7A0 (TPMS) 22C00B — empty response (TPMS needs driving/wheel movement)
      # 0x770 (IGPM) 22BC03 — empty response (ignition required?)
      # 0x770 (IGPM) 22BC04 — empty response (ignition required?)
      # 0x7A0 (BCM) 22B00E  — NO DATA (ignition required?)
      # 0x7D1 (ESC) 22C101  — empty response (ignition required?)

  - date: "2026-04-14"
    label: "ACC mode (accessory on, parked)"
    notes: >
      Car in accessory mode (ACC), not charging, parked, all doors closed and locked.
      SKM wakeup (2FB108030A0A05 on 0x7A5) was used earlier in this session to bring
      ECUs online during charging — ACC stayed on even after ACC Off and ECU Reset commands.
      User then manually put car in ACC mode. All IGPM, CLU, TPMS, ESC responding.
      IGPM 22BC08-0A return NRC 0x31 (requestOutOfRange) — those DIDs don't exist.
    captures:
      - ecu: '0x778'
        pid: "22BC01"
        payload: "62BC01400000000002"
        notes: "9 bytes."

      - ecu: '0x778'
        pid: "22BC02"
        payload: "62BC0200000000"
        notes: "7 bytes. All zeros."

      - ecu: '0x778'
        pid: "22BC03"
        payload: "62BC03FDEE3C7320600000"
        notes: >
          11 bytes. Door/trunk/seatbelt/ignition status.
          All doors closed+locked, trunk closed, ACC on.
          Compare with SKM-wakeup capture: byte 7 changed 00->20 (bit 5 = ACC),
          byte 8 changed 00->60 (bits 5+6), byte 9 changed 0C->00.

      - ecu: '0x778'
        pid: "22BC04"
        payload: "62BC04B53FF4EA01000042"
        notes: >
          11 bytes. Door lock status.
          Compare with SKM-wakeup: byte 7 changed 00->01.
          Byte 10 = 0x42 (same in both captures).

      - ecu: '0x778'
        pid: "22BC05"
        payload: "62BC057F112000000000"
        notes: "11 bytes. Unknown function."

      - ecu: '0x778'
        pid: "22BC06"
        payload: "62BC06B4800000000000"
        notes: "11 bytes. Lighting/brake status? Byte 3 = 0xB4, byte 4 = 0x80."

      - ecu: '0x778'
        pid: "22BC07"
        payload: "62BC070841FBCC00001900"
        notes: "11 bytes. Unknown function."

      - ecu: '0x7CE'
        pid: "22B002"
        payload: "62B002E0000000008E01119F00000000000000"
        notes: "18 bytes. Odometer at byte 9-11: 0x008E01 = needs verification. Responded in ACC (failed during charging)."

      - ecu: '0x7A8'
        pid: "22C00B"
        payload: "62C00BFFFF0000C9430100CB430100CF440100CB440100"
        notes: >
          23 bytes. Tyre pressures and temps. FL: 0xC9=201/72.52=2.77bar, temp 0x43=67-50=17°C.
          FR: 0xCB=203/72.52=2.80bar, temp 0x43=17°C.
          RL: 0xCF=207/72.52=2.85bar, temp 0x44=18°C.
          RR: 0xCB=203/72.52=2.80bar, temp 0x44=18°C.
          Responded in ACC (failed during charging).

      - ecu: '0x7D9'
        pid: "22C101"
        payload: "62C1015BD7E760FFFF00FF01C4FF0000000000FF80FF0030F4000000FFFF801407FB07FCFFFF0000FFFFFF0000000000"
        notes: "42 bytes. First capture of ESC. Responded in ACC (failed during charging). Contains wheel speed and stability data — undecoded."

      # SKM wakeup sequence used earlier in this session:
      #
      # 1. ATSH7A5 / ATFCSH7A5 (set headers for SKM)
      # 2. 1003 (extended diagnostic session) → positive response 5003
      # 3. 2FB108030A0A05 (ACC On) → 7F2F78 (pending) then positive
      # 4. ACC turned on dashboard lights and woke IGPM
      # 5. 2FB10800 (ACC Off) → positive response 6FB10800, but lights stayed on
      # 6. 1101 (ECU hard reset) → positive 510100FE, lights still on
      # 7. ACC could not be turned off via CAN — stayed on until user intervened

  - date: "2026-04-14"
    label: "Keyfob wake (locked, no ignition)"
    notes: >
      Car fully asleep, then manual keyfob lock/unlock/lock. No charging, no ignition.
      Only IGPM responds — BMS, VCU, SKM, CLU, TPMS all return NO DATA.
      SKM wakeup (1003, 2FB108030A0A05) also returns NO DATA — SKM is only powered
      during charging or ACC/IGN mode. IGPM stays awake ~10 min after keyfob activity.
      22BC01 returned NO DATA (may need longer wake time or different power state).
    captures:
      - ecu: '0x778'
        pid: "22BC03"
        payload: "62BC03FDEE3C730A000000"
        notes: >
          11 bytes. Doors closed, locked, no ignition.
          Byte 7 = 0x0A (00001010) — compare: 0x00 during charging-only, 0x20 in ACC mode.
          Bits 1+3 set = keyfob-wake state. Bit 5 clear = no ACC.

      - ecu: '0x778'
        pid: "22BC04"
        payload: "62BC04B53FF4EA0C00000200"
        notes: >
          11 bytes. Door lock status.
          Byte 7 = 0x0C — compare: 0x00 during charging, 0x01 in ACC mode.
          Byte 10 = 0x02 — compare: 0x00 during charging, 0x42 in ACC mode.

      - ecu: '0x778'
        pid: "22BC06"
        payload: "62BC06B4800000000000"
        notes: "11 bytes. Same as ACC mode capture — no change."

      # ECUs that did NOT respond (car asleep, keyfob wake only):
      # 0x7A5 (SKM) 1003 → NO DATA (not powered in this state)
      # 0x7A5 (SKM) 2FB108030A0A05 → NO DATA
      # 0x7E4 (BMS) 2101 → NO DATA
      # 0x770 (IGPM) 22BC01 → NO DATA
