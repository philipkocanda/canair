  label: BCM 22B003/22B004 live voltage monitoring
  notes: >-
    Observed 22B003 and 22B004 changing every few seconds in monitor mode. 22B003 contains slowly decrementing ADC-like values u2014 likely 12V battery voltage measurements across multiple points (battery terminals, fuse box, BCM internal rail). B07 drifts fastest (~2 LSB/min), B10/B12/B14 follow. Static bytes (B03-B06, B08, B15) may be config/thresholds. 22B004 has a single bit (B09 bit 6) toggling 0x00u21940x40 every ~12-15s u2014 periodic heartbeat/watchdog flag. Rest of B004 is static. BCM likely uses these readings to decide when to activate the LDC (DC-DC converter) to top up the 12V from the HV traction battery.
