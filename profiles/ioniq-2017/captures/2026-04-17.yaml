  vehicle_states:
  - ready
  notes: >
    Powertrain ECUs (BMS, VCU, MCU, LDC, Gateway) don't support UDS F1xx identity DIDs
    but respond to KWP2000 ReadEcuIdentification service 1A. Scanned 1A80-1A9F on each.
    Key discovery: these ECUs use KWP2000, not UDS, for identification.
    CarScanner uses the same service 1A approach.
  captures:
    # ── BMS 0x7E4 ──
