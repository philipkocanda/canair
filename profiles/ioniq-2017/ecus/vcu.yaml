# ─── VCU (Vehicle Control Unit) ──────────────────────────────────────
#
# Sometimes referred to as VMCU, though the distinction is vague..
#
# The VCU is the logical brain of the EV powertrain:
# - Torque requests (accelerator input, cruise control)
# - Drive mode logic
# - Regen braking strength (0-1-2-3) and brake blending
# - Coordination between motor, inverter, battery, and safety systems
# - Suspected: preconditioning, charge timer, charge power limit settings (station/portable).
#
# The Vehicle Control Unit (VCU) and Motor Control Unit (MCU)
# are both part of the Electronic Powertrain Control Unit (EPCU) physical housing.
#
# KWP2000 diagnostic sessions (service 0x10) — probed 2026-07-22, car in READY:
# see the structured `sessions:` field at the end of this ECU block.
# Only 0x81 is accepted; 21xx reads work in the default session too — no session
# unlocks extra data. Payload sizes are session-independent: 2101=22B, 2102=23B;
# 2103/2104/2105 → NRC 0x12 (do not exist).
#
VCU:
  tx_id: 0x7E2
  identity:
    alias: VLDC  # KWP2000 ecu_id module code (VCU with integrated LDC)
    description: Vehicle Control Unit (integrated LDC)
    part_number: "36601-0E250"
    ecu_id: AEVLDC53  # KWP2000 1A8C — "VLDC": VCU with the LDC integrated (standalone at 0x7CD on Kia Soul)
    sw_id: "EAEEO5L-NS7-D060"
    calibration: "C5210617"
    vin: "KMHCXXXXXXXXXXXX"
    id_protocol: KWP2000  # 1Axx
  vehicle_states:
    - ready
    - charging
  pids:
    2101:
      status: active
      period: 2500
      vehicle_states:
        - ready
        - charging
      parameters:
        VCU_VEHICLE_SPEED:
          expression: "((S20*256)+B19)/60"
          unit: km/h
          ha_class: speed
          min: "0"
          max: "255"
          verified: false
          notes: >
            16-bit: high byte S20 (signed, for reverse/regen roll-back), low byte B19 (unsigned), divided by 60.
            2026-07-20: divisor corrected to /60 (was *1.609344/100). The ITStromer community PID sheet gives
            "Real Vehicle Speed = ((Signed(o)*256)+n)/60" (o=B20, n=B19) — /60 yields km/h directly, matching
            the dashboard within ~1.5% (83/96/109 cluster vs 82.6/94.2/110.3 decoded). The earlier mph theory
            (*1.609/100) read ~4-5% low — a contrived fit; /60 is the internal vehicle speed (≈ dash).
            Reads exactly 0 at park (B19=B20=0 in all parked frames; B19 is a smooth 16-bit low byte while
            accelerating). Original ((S20*256)+S19)/100 also had the low byte read *signed* (corrupting B19≥0x80).
            WARNING: do NOT use B21 as the low byte — B21 is a separate signal, non-zero/jittery at standstill.
            NOTE: a distinct wheel-speed source exists at ESC 0x7D1 22C101 REAL_SPEED_KMH (B12).

        ACCEL_PEDAL_DEPTH:
          expression: "B18/2"
          unit: "%"
          ha_class: ""
          min: "0"
          max: "100"
          source: "ITStromer community PID sheet (Accel Pedal Depth = m/2)"
          verified: false
          notes: >
            Accelerator pedal position. 2026-07-20: from the ITStromer community sheet, confirmed by its
            controlled test (0% pedal → B18=0; pedal to floor → B18=0xC8=200 → 100%). Our captures: 0% at
            rest, 0-56% while driving, up to 86% with pedal pressed in Park. ISO-TP byte 0x0e.

        ACCEL_PEDAL_RELATED:
          expression: "B17"
          unit: ""
          min: "0"
          max: "255"
          source: "ITStromer community PID sheet (Accel Pedal Related = l)"
          verified: false
          notes: "Raw accelerator-related sensor (APS). Tracks pedal (0-254). ISO-TP byte 0x0d."

        DEBUG_DRIVE_MODE_FLAGS:
          expression: "B10"
          unit: ""
          verified: true
          notes: "Raw byte — individual bits below"

        DRIVE_MODE_P:
          expression: "B10:0"
          unit: ""
          verified: true
          notes: ""

        DRIVE_MODE_R:
          expression: "B10:1"
          unit: ""
          verified: true
          notes: ""

        DRIVE_MODE_N:
          expression: "B10:2"
          unit: ""
          verified: true
          notes: ""

        DRIVE_MODE_D:
          expression: "B10:3"
          unit: ""
          verified: true
          notes: ""

        DEBUG_VEHICLE_STATE_FLAGS:
          expression: "B11"
          unit: ""
          verified: false
          notes: "Raw byte — individual bits below"

        VEHICLE_STATE_BRAKE_LAMP:
          expression: "B11:0"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_NOT_BRAKING:
          expression: "B11:1"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_START_KEY:
          expression: "B11:2"
          unit: ""
          verified: false
          notes: ""

        VEHICLE_STATE_EV_READY:
          expression: "B11:3"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_VCU_READY:
          expression: "B11:4"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_MAIN_RELAY_ON:
          expression: "1-B11:5"
          unit: ""
          verified: false
          notes: "Inverted from MAIN_RELAY_OFF bit. 1=relay closed (normal Ready/charging), 0=relay open (car off)."

        VEHICLE_STATE_POWER_ENABLE:
          expression: "B11:6"
          unit: ""
          verified: false
          notes: ""

        VEHICLE_STATE_LDC_ENABLED:
          expression: "1-B11:7"
          unit: ""
          verified: false
          notes: "Inverted from LDC_INHIBIT bit. 1=LDC active, 0=inhibited."

        VCU_STATE_FLAGS_RAW:
          expression: "B12"
          unit: ""
          verified: false
          notes: >
            To investigate

        DEBUG_GEAR_STATE_FLAGS:
          expression: "B26"
          unit: ""
          verified: true
          source: "canair historical analysis 2026-07-23"
          notes: >
            Raw B26 gear/shifter bitfield — a second copy of the gear state that parallels B10
            (DEBUG_DRIVE_MODE_FLAGS) in a different byte. Across 773 captures B26 takes only two
            values: 0x20 (Park) and 0x08 (Drive). Bit 3 (0x08) tracks Drive (r=+0.984 vs DRIVE_MODE_D),
            bit 5 (0x20) tracks Park (r=+1.000 vs DRIVE_MODE_P). Bits 0,1,2,4,6,7 are constant 0 in all
            captured data (R/N almost never sampled, so any R/N bits are unconfirmed). See the individual
            bits below.

        GEAR_DRIVE:
          expression: "B26:3"
          unit: ""
          source: "canair historical analysis 2026-07-23 (was mislabeled CAR_READY, Kia Niro PR#716)"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: >
            Gear = Drive. RENAMED from CAR_READY 2026-07-23: B26:3 is NOT car-ready (DISPROVEN — read 0 in
            full READY when the car was definitely ready; VEHICLE_STATE_EV_READY B11:3 already covers ready).
            B26:3 correlates r=+0.984 with DRIVE_MODE_D (B10:3) across 773 captures — it is the drive-gear
            bit mirrored into B26. Niro's CAR_READY offset does not transfer to the Ioniq.

        GEAR_PARK:
          expression: "B26:5"
          unit: ""
          source: "canair historical analysis 2026-07-23 (was mislabeled PARK_BRAKE, Kia Niro PR#716)"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: >
            Gear = Park. RENAMED from PARK_BRAKE 2026-07-23: B26:5 correlates r=+1.000 with DRIVE_MODE_P
            (B10:0) across 773 captures — it is the park-gear bit mirrored into B26, NOT the electronic
            park brake (EPB). The earlier PARK_BRAKE guess (Niro PR#716) coincidentally matched because the
            EPB is typically engaged whenever the car is in Park; the true signal is gear=P.

        VCU_UNKNOWN:
          expression: "B20/2"
          unit: "%"
          min: "0"
          max: "100"
          enabled: false
          source: "ImHex pattern (@ 0x0E) + JejuSoul Torque Pro CSV"
          source_links:
            - https://docs.google.com/spreadsheets/d/1R2dW_4-ANg04TQdkHH52-8wdYItBkWDfppcsqOc-m1M
          verified: false
          notes: >
            DISABLED 2026-07-20 (excluded from public profile): B20 is the HIGH byte of VEHICLE_SPEED
            ((S20*256)+B19) — so B20/2 is just half the speed high byte, not an independent signal, and it
            exceeds its 100% max (observed 127.5%). Ioniq5 OBDb suggested bix 96 = B18, but that never
            validated either ("fixed at 17% during charging", implausible). Kept for research only.
        VCU_INVERTER_ENABLED:
          expression: B23:2
          unit: ""
          source: canair historical analysis 2026-07-23
          verified: true
          notes: >
            Inverter/HV-power-active flag. B23 = 0x34 (52) when EV_READY/driving, 0x00 when charging/sleep (r=+0.997 vs VEHICLE_STATE_EV_READY across 776 captures). 0x34 = bit2|bit4|bit5 set; bit2 chosen as the boolean. Redundant with VEHICLE_STATE_EV_READY (B11:3) but sourced from a different byte — useful as a cross-check. Raw byte B23 itself only ever 0 or 52.
        VCU_POWER_STATE:
          expression: B25
          unit: ""
          min: "0"
          max: "255"
          source: canair historical analysis 2026-07-23
          verified: true
          notes: >
            VCU/EPCU power-mode enum. B25 = 4 when EV ready/driving, 7 when charging/sleep/off (r=-1.000 vs VEHICLE_STATE_EV_READY and VEHICLE_STATE_POWER_ENABLE across 773 captures; only value seen besides a single transient 6). 4=Ready(HV up, drive-capable), 7=Standby(HV down, charge/off). Complements the B11 state bitfield from an independent byte.

    2102:
      status: active
      period: 5000
      vehicle_states:
        - ready
        - charging
      parameters:
        VCU_INVERTER_INPUT_VOLTAGE:
          expression: "B17*2"
          unit: V
          ha_class: voltage
          min: "0"
          max: "450"
          source: "Kia Soul EV VMCU CSV (Inverter Input Voltage = f*2)"
          verified: true
          notes: >
            HV DC-link (= battery pack) voltage. 2026-07-20: identified via Kia Soul EV VMCU
            reference (0x7E2, "Inverter Input Voltage = f*2"). Old guess B10*2 gave ~2V (B10=0x01, wrong).
            B17*2 reads 364–382V in ready/driving across 1317 captures (range 28–412V over all states),
            matching BMS pack voltage (~369V) and LDC HV input (~353V) — the inverter DC-link is the pack.
            Cross-validated while charging (2026-07-20, SOC 94%): B17*2 = 396V vs BMS pack 396.4V — spot on.
            NOTE: Soul's letter positions do NOT transfer directly (its f = our B17, its e = our B18);
            the Ioniq VCU 2102 field order differs from the Soul VMCU.

        VCU_AUX_BATTERY_VOLTAGE:
          expression: "B18/10"
          unit: V
          ha_class: voltage
          min: "0"
          max: "16"
          enabled: false
          source: "Kia Soul EV VMCU CSV (Aux Battery Voltage = e/10)"
          verified: false
          notes: >
            DISABLED 2026-07-20: B18/10 does NOT match the 12V aux battery. Charging cross-check (SOC 94%) read
            14.8V while the actual 12V bus was 12.8V per BOTH BMS AUX_BATTERY_VOLTAGE (12.80V) and LDC_OUTPUT_V
            (12.81V). It tracked plausibly (~12.3-13.6V) in READY but reads ~2V high under charge — likely an LDC
            output target/command rather than the battery terminal. Use BMS AUX_BATTERY_VOLTAGE or LDC_OUTPUT_V
            for the real 12V. Kept for research trail; excluded from profile.

        VCU_TORQUE_REQUEST:
          expression: "[S12:S13]"
          unit: ""
          min: "-32768"
          max: "32767"
          enabled: false
          source: "Phase 1 variance/correlation analysis (2026-07-20); Kia Soul EV VMCU torque fields"
          source_links: []
          verified: false
          notes: >
            DISPROVEN 2026-07-23 — this candidate was an ARTIFACT of mislabeled captures. In genuine 6102
            responses B12 and B13 are constant 0x00 (n=1652), including at speed during the 2026-07-19 drive,
            so [S12:S13] is always 0. The dramatic "0 at park, ±31000 while driving" signal came entirely from
            22 captures at 16:13–16:14 on 2026-07-19 that were actually VCU 2101 responses (they begin 61 01,
            not 61 02) misfiled under 2102; reading 2101's accelerator-echo/speed bytes as a signed 16-bit
            produced the ±30000 garbage (and simultaneously made INVERTER_INPUT_VOLTAGE read 0/252 and the
            structural bytes B4/B5/B9/B10/B11 flip to their 2101 values 0xFF/0xE0/09/28/5A in those rows).
            ACTION: purge/relabel those 22 frames from the 2102 dataset (canlib.captures.delete_capture) and
            re-capture a clean synced VCU 2101+2102 drive. VCU-level torque request, if exposed at all, is not
            at B12:B13. Actual motor torque lives in MCU 2102 (MCU_MOTOR_TORQUE). Do not publish.

        VCU_DCLINK_VOLTAGE_COARSE:
          expression: "B25*2.56"
          unit: V
          ha_class: voltage
          min: "0"
          max: "450"
          enabled: false
          source: "canair historical analysis 2026-07-23"
          verified: false
          notes: >
            Coarse (8-bit, ~2.56 V/LSB) copy of the HV DC-link voltage. B25 correlates r=+0.950 with the
            verified INVERTER_INPUT_VOLTAGE (B17*2) across 1672 captures; B25*2.56 tracks B17*2 with a median
            residual of ~1V (larger stdev only across the mislabeled 16:13 shutdown frames, see VCU_TORQUE_REQUEST).
            Redundant with the full-resolution B17*2 — kept disabled as a research note / integrity cross-check.
            The remaining dynamic 2102 bytes (B14~149, B27~57, B20~58 are near-constant config/status; B19/B21/
            B23/B26 are max-entropy fast signals — motor phase currents / resolver angle per the Soul VMCU sheet —
            that alias at the 5s poll rate and need a synced high-rate VCU+MCU drive capture to resolve).

    21F2:
      status: static
      period: 0
      vehicle_states:
        - charging
      notes: >
        69 bytes. Discovered during charging PID scan (2026-04-18).
        Raw payload: 61F2FF000000084566003FC6AE1101877F00000000000000000000000000...
        Undecoded — needs analysis.

        2026-07-19: charge timer schedule and precondition timestamp? -> no change
        2026-07-19: charger power limit setting? -> no change

  research:
    - type: verify
      target: "2101"
      status: pending
      priority: P1
      vehicle_states:
        - acc
      notes: >
        Several unverified params: CAR_READY (B26:3) causes OOB on 22-byte response, PARK_BRAKE (B26:5) same issue, ACCEL_PEDAL_DEPTH (B17), LDC_INHIBIT (B11:7),
        MCU_STATE (B11:6).
        DRIVE MODE / REGEN: 2026-07-21 stationary test (READY, in D) cycled Normal(regen1) -> Sport(regen2) ->
        ECO(regen1) -> Normal(regen1) -> regen0 while polling VCU/MCU/BCM/IGPM. RESULT: NOT found. Across the
        whole window VCU 2101 B10 (DEBUG_DRIVE_MODE_FLAGS) stays flat at 0x28 (D) — the "ECO/Sport/Normal in B10
        upper nibble" hypothesis is DISPROVEN (upper nibble constant). No other byte on any polled PID (VCU
        2101/2102, MCU 2101/2102/2103, BCM 22B0xx/BCxx, IGPM 22BCxx) steps through the 5-state sequence; every
        varying byte is analog noise (currents/voltages/temps/counters). HYPOTHESIS (untested): modes may only
        re-map torque/regen response, which would be invisible when parked with pedal at 0. Next: (1) scan VCU 22 E006/E007 (see
        scan entry below — Ioniq 5 exposes drive mode / regen level there); (2) re-capture WHILE DRIVING,
        holding one mode per labelled session, or --monitor a single PID fast while cycling modes.
      what_to_test:
        - "CAR_READY (B26:3) — RESOLVED 2026-07-23: RENAMED to GEAR_DRIVE. B26:3 is the drive-gear bit (r=+0.984 vs DRIVE_MODE_D), not car-ready. Now verified:true."
        - "PARK_BRAKE (B26:5) — RESOLVED 2026-07-23: RENAMED to GEAR_PARK. B26:5 is the park-gear bit (r=+1.000 vs DRIVE_MODE_P), not EPB (it just co-occurs with EPB in Park). Now verified:true."
        - "B23 / B25 — RESOLVED 2026-07-23: added VCU_INVERTER_ENABLED (B23:2; B23=0x34 ready / 0 charge, r=+0.997 vs EV_READY) and VCU_POWER_STATE (B25=4 ready / 7 standby, r=-1.000 vs EV_READY). Both verified:true, independent-byte cross-checks of the B11 state bitfield."
        - "ECO/Sport/Normal mode — NOT in B10 upper nibble (disproven 2026-07-21 stationary); try 22 E006 or capture while driving"
        - "Regen mode (off/1/2/3) — not in any 2101/2102 byte stationary; try 22 E007 or capture while coasting/braking (regen torque only appears in motion)"
        - "B14 / B21 (still unmapped, dynamic) — 2026-07-23: B14 sits ~82 at pedal=0 and swings both above (232) and below (11) with pedal (r~0.30, noisy); B21 is high at rest (108-158), low while moving (r=-0.46 vs speed) but jumps to ~248 at sustained high speed. Both are fast-cycling (currents/angle/power) that alias at the 2.5s poll — need a high-rate --monitor capture to resolve. B22 is constant 119 (0x77) in ready/drive (not a temp)."
        - "ACCEL_PEDAL — Kia Soul VMCU has 'Accel Pedal Related=i' + 'Accel Pedal Depth=j/2' (%). In our 2101, B17 and B18 are 0 when truly parked (P) and active while driving — strong candidates. Press pedal while stationary in Ready to confirm which is depth (÷2 for %) and the raw-related byte."
      sources:
        - "canair historical analysis 2026-07-23 — B23/B25/B26 state & gear bits"
        - "Kia Niro PR — CAR_READY/PARK_BRAKE (offset disproven, bits are gear state)"
        - "Kia Soul EV VMCU CSV — accel pedal (i, j/2), drive-mode/state bits"
        - "Obsidian: VCU.md"
    - type: decode
      target: "2102"
      status: captured
      priority: P1
      vehicle_states:
        - ready
        - charging
      notes: >
        27 bytes. 2026-07-20 (Kia Soul EV VMCU cross-ref, 0x7E2): mapped INVERTER_INPUT_VOLTAGE=B17*2
        (verified vs BMS pack ~369V) and AUX_BATTERY_VOLTAGE=B18/10 (~12–13.6V). KEY FINDING: the Ioniq
        redistributes the Soul VMCU payload — motor RPM/torque/heat-sink & MCU temp/phase currents are NOT
        in VCU 2102 (candidate temp bytes are constant across cold/hot sessions; no byte tracks speed like RPM).
        Those live in the separate MCU ECU (0x7E3). Soul letter positions also don't transfer 1:1
        (Soul e/f = our B18/B17, transposed). Disabled the old bogus params (MOTOR_RPM/HEAT_SINK/MCU_TEMP).
        2026-07-23 (canair historical byte analysis, 1674 captures): (1) DATA-INTEGRITY BUG — 22 captures at
        16:13–16:14 on 2026-07-19 filed under 2102 are actually VCU 2101 responses (begin 61 01). They are the
        SOLE source of the VCU_TORQUE_REQUEST "±31k while driving" signal, which is now DISPROVEN — in real 6102
        frames B12=B13=0x00 always (even at speed). Purge/relabel those frames. (2) B25 is a coarse 8-bit copy
        of the HV DC-link voltage (B25*2.56 ≈ B17*2, r=+0.950) → added disabled VCU_DCLINK_VOLTAGE_COARSE.
        (3) Constants in ready/drive: B4/B5=0xF8, B6/B7=0, B9=1, B10=1, B11=0, B14~149, B20~58, B27~57, B22 low,
        B28-B31=0 (their "other" values only appear in the mislabeled 2101 frames). (4) Still-unmapped fast
        signals B19/B21/B23/B26 are max-entropy (all 256 values) — likely motor phase currents / resolver offset
        / angle per the Soul VMCU sheet (Int16 phase-current & resolver fields), aliasing at the 5s poll.
      what_to_test:
        - "Re-map motor RPM/torque/temps under MCU 0x7E3 2101/2102 using the Soul VMCU scalings as a guide"
        - "Confirm B17 HV voltage with a same-instant BMS read while driving"
        - "VCU_TORQUE_REQUEST [S12:S13] — DISPROVEN 2026-07-23 (B12:B13=0 in genuine 6102; ±31k was mislabeled 2101 frames). Purge the 22 misfiled 16:13-16:14 captures, then re-capture a clean high-rate synced VCU 2101+2102 drive if a VCU torque signal is still wanted."
        - "B19/B21/B23/B26 (max-entropy fast bytes) — try Int16 phase-current / resolver-offset reads per the Soul VMCU sheet (Int16(v:u) phase-current RMS, Int16(ad:ac) resolver offset) against a synced high-rate MCU motor-current/RPM capture; single-byte + 5s-poll cannot resolve them (weak r<0.33 vs speed/torque)."
        - "EWP (electric water pump) speed / target RPM — Soul VMCU exposes these (g,h); look for a 0..190 byte that spins up under load/charge (EPCU coolant loop exists even though the 28 kWh battery is air-cooled). B14~149/B20~58/B27~57 are near-constant here → not EWP-varying in this data."
        - "Coolant/EPCU temperature(s) — B20/B27 are ~57-58 raw in BOTH cold April park and warm July drive (flat), so NOT (value-40) temps in this data; confirm against a genuinely cold cold-soak vs hot fast-DC-charge contrast."
      sources:
        - "Kia Soul EV VMCU CSV — 0x7E2 (Inverter f*2, Aux e/10, temps w/x/y-40, RPM/torque 16-bit)"
        - "Obsidian: VCU.md — 23 bytes captured 2025-08-07"
        - "38kWh profile — B20*3.97+2.3 speed formula"

    - type: scan
      target: "22 E001-E010"
      status: nrc
      priority: P1
      vehicle_states:
        - acc
      notes: >
        Ioniq 5 cross-ref: E001 vehicle speed, E002 motor RPM, E004 accel pedal/speed HD/aux voltage, E005 disconnector, E006 drive mode, E007 regen level, E008 torque request, E009 actual regen torque, E00A odometer, E00B motor temp, E00C inverter cooling temp, E010 gear state."
        2026-07-19: 22E001 -> NRC 0x12 (subFunctionNotSupported)
        2026-07-21: now the PRIMARY lead for drive mode / regen level — E006 (drive mode) and E007 (regen level)
        would directly answer the 2101 verify entry, since a stationary 2101/2102/MCU/BCM/IGPM sweep found no
        such byte. E001 NRC'd; retry the full E000-E010 range with extended session (10 03) + wake, ideally
        while driving so any live values are non-zero.

      date: "2026-07-22"
      result: >
        Re-scanned E001-E010 with ignition ON (battery 14.4V) 2026-07-22: all 16 -> NRC (0 timeouts,
        ECU alive). Same NRC 0x12 pattern as MCU. CONFIRMED DEAD END for service-22 E0xx on this
        KWP2000 VCU — E0xx DIDs are a UDS-era Ioniq-5 construct absent here. The drive-mode / regen
        data must be found in the service-21 (21xx) range instead; sweep 21 00-FF for hidden pages.
      sources:
        - "OBDb Ioniq 5"
        - "ChatGPT"
    - type: verify
      target: "2101 speed"
      status: pending
      priority: P1
      vehicle_states:
        - ready
      notes: >
        2026-07-20: RESOLVED unit = MPH (not km/h) and low byte = B19 (unsigned), high byte = S20 (signed).
        Expression ((S20*256)+B19)*1.609344/100 reads 0 at park (verified live) and ~+4% under dashboard.
        An interim revision wrongly used B21 as low byte → non-zero jittery speed while parked (B21 is a
        separate signal, 67–150 at standstill); reverted to B19. STILL PENDING: GPS + multi-point
        confirmation across full speed range. Also capture ESC 22C101 REAL_SPEED_KMH (B12)
        while driving to verify it as the true dashboard speed source.
    - type: scan
      target: "0x7E1 22 0101-0105"
      status: nrc
      priority: P3
      vehicle_states:
        - acc
      notes: "Powertrain address — test if anything responds."
    - type: scan
      target: 21 00-FF
      status: done
      priority: P2
      vehicle_states:
        - ready
      date: "2026-07-22"
      result: "Exhaustive service-21 LID sweep (ignition on): only 01/02/F2 respond (= known 2101/2102/21F2), all 253 others NRC. No hidden pages. Drive-mode/regen not exposed as a separate VCU service-21 page — must be bytes within 2101/2102 (or 21F2)."
      notes: Hidden-page hunt. Redirects the drive-mode/regen search back into the known 2101/2102 payloads.
    - type: decode
      target: "2101"
      status: done
      priority: P3
      vehicle_states:
        - ready
      notes: "VCU 2101 B13/B15 = accelerator/torque REQUEST echo (driver demand), essentially redundant with ACCEL_PEDAL_DEPTH so not worth a separate param. From 2026-07-22 drive: B13 and B15 both correlate ~0.99 with ACCEL_PEDAL_DEPTH; B13 = 2xB15 exactly; linear fit B13 = 0.263*pedal + 6.4 (residual std 0.44); both FLOOR at their idle value (B13=6, B15=3) during braking/regen (never go negative), confirming it is a >=0 request signal, not actual bidirectional motor torque (which lives in MCU 2102). Neighbouring unmapped B14/B21 are uncorrelated with speed/pedal (noise/other). Actual motor torque + regen must be read from MCU 2102 (MCU_MOTOR_TORQUE) — VCU 2101 does not expose signed motor torque."

