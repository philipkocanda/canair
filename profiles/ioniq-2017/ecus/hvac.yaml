# ─── HVAC (Heating, Ventilation, Air Conditioning) ────────────────────
HVAC:
  tx_id: 0x7B3
  identity:
    alias: DATC  # Digital Automatic Temperature Control
    description: Climate Control
    part_number: "97250-G7060"
    mfg_date: "2017-05-30"
    firmware: "AE_EV DATC(-)1.0"
    fw_version: "1.03"
    id_protocol: UDS  # F1xx
    software: "AE_EV DATC(-)1.0"
    serial: "1705304705"
    notes: >
      Climate control unit (DATC — Digital Automatic Temperature Control).
      Exposes climate/compressor live data via service 22 (e.g. 220102).
  vehicle_states:
    - acc
    - acc2
    - ready
  scan_log: # HVAC
    - service: 0x31
      range: "E000-E0FF"
      date: 2026-04-20
      hits: 0
      probes: 256
      vehicle_states:
        - sleep
      notes: "256 errors — likely no service 31 support without ignition"
  # ─── 2026-07-22 read-DID (service 22) sweep, car in READY (parked) ───
  # Goal: find live-data DIDs on ECUs previously only identity-scanned.
  # Ranges tried per ECU noted below. All responses were NRC (alive, no such DID)
  # unless a hit is listed. Powertrain 22-DID probes are logged in each ECU's research:.
  pids:
    220100:
      status: active
      period: 5000
      vehicle_states:
        - acc
        - acc2
        - ready
      notes: >
        41-byte ELM response (39 data bytes). Live HVAC sensor/actuator data.
        Monitored 2026-04-17 with HVAC on/off, fan speed changes, temp changes,
        A/C toggle, recirculation, defrost, rear defogger. Set temp, fan speed,
        mode, and recirc did NOT appear — this DID is purely sensor/actuator
        status. Settings likely in a different DID (01Ax range or undiscovered).
        Static bytes: ELM[3]=0x7E, ELM[4]=0x50, ELM[5]=0x07, ELM[6]=0xC8
        (purpose unknown — possibly sensor IDs or config flags).
        2026-07-23 (230 captures): remaining unmapped bytes are mostly constants/padding —
        B5=0x7E, B6=0x50, B7=0x07, B9=0xC8, FF-padding tail B10/B18/B19/B21/B23/B25-B31,
        near-constant flags B39/B41/B43 (~0xFF), B42 (0/1), B45/B46/B47 (~0), B49 (single
        sample). Only 3 varying bytes: B14 (0-59, weak corr, likely valve/PWM position),
        B34 (HVAC_HEAT_DEMAND), B35 (86-255, noisy, r=-0.80 vs blower feedback; likely fast
        actuator current/position). B34/B35 kept as leads; rest are documented constants.
      parameters:
        HVAC_INTERIOR_TEMP:
          expression: "(B11/2)-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "87"
          source: "Original WiCAN config"
          verified: true
          notes: >
            Interior Air Temperature (not "intake"!). Confirmed: drops from 27°C to 18.5°C
            when AC blows cold air, slowly recovers. Tracks cabin temp well.

        HVAC_AAT:
          expression: "(B12/2)-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "87"
          source: "Original WiCAN config"
          verified: true
          notes: "Ambient Air Temperature (HVAC sensor). Stable at ~18.5°C during session."

        HVAC_EVAPORATOR_TEMP:
          expression: "(B13/2)-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "87"
          source: "Original WiCAN config"
          verified: true
          notes: >
            Confirmed: 21.5°C at rest, drops to ~5°C with compressor running,
            recovers when compressor cycles off. Clear thermal lag vs IAT.

        HVAC_BLOWER_FAN_DUTY:
          expression: "B15"
          unit: ""
          min: "0"
          max: "255"
          source: "Monitor session 2026-04-17"
          verified: true
          notes: >
            NOT inverter temp — this is blower fan PWM duty cycle.
            0x10=16 at idle/off, spikes to 0x45/0xB6/0xEF during fan
            activity. 0xEF=239 is max fan. Previously misidentified as
            HVAC_INVERTER_TEMP with formula (x/2)-40.

        HVAC_BLOWER_FAN_FEEDBACK:
          expression: "B17"
          unit: ""
          min: "0"
          max: "255"
          source: "Monitor session 2026-04-17"
          verified: false
          notes: >
            Mirrors B15 (blower duty) almost exactly. Could be commanded
            vs actual, or feedback from fan speed sensor.

        HVAC_BLOWER_FAN_DUTY_3:
          expression: "B20"
          unit: ""
          min: "0"
          max: "255"
          source: "Monitor session 2026-04-17"
          verified: false
          enabled: false
          notes: >
            Third fan-related byte, same pattern as B15/B17. Possibly
            redundant — disabled by default.

        HVAC_COMPRESSOR_TRANSITION:
          expression: "B22"
          unit: ""
          min: "0"
          max: "255"
          source: "Monitor session 2026-04-17"
          verified: false
          notes: >
            Spikes during AC compressor on/off transitions (0x90, 0xB1,
            0xD0), settles to 0x10 when steady. Possibly compressor
            request signal or clutch duty cycle.

        HVAC_DUCT_TEMP_1:
          expression: "(B36/2)-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "87"
          source: "Monitor session 2026-04-17"
          verified: true
          notes: >
            Slow thermal drift (0x26=−21→0x1F→0x24). Could be duct outlet
            temp or heater core temp. Needs verification with heat mode.

        HVAC_DUCT_TEMP_2:
          expression: "(B37/2)-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "87"
          source: "Monitor session 2026-04-17"
          verified: true
          notes: >
            Big swings (0xEF=79.5→0x56=3→recovery). Drops sharply with
            compressor — likely vent air temp close to evaporator.

        HVAC_VENT_OUTLET_TEMP:
          expression: "(B38/2)-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "87"
          enabled: false
          source: "Monitor session 2026-04-17"
          verified: false
          notes: >
            DISABLED 2026-07-20: across all 143 220100 captures B38 only ever yields -40 or -32 (i.e. B38 =
            0x00/0xFF/0x10 padding in the FF-filled tail region B30-B44). Never a plausible vent temp. Bogus
            byte. (The earlier "tracks evaporator" note was a coincidence on one session.) Kept for research trail.

        HVAC_FAN_SPEED_LEVEL:
          expression: "B33"
          unit: ""
          min: "0"
          max: "255"
          enabled: false
          source: "Fan speed test 2026-04-19"
          verified: false
          notes: >
            DISABLED 2026-07-20: B33 is constant 0xFF (255) across ALL 143 220100 captures — including a
            confirmed fan-only speed-2 charge. It sits in the FF-padding tail (B30-B44) and is NOT the fan
            level. The 2026-04-19 note (fan 1=0x26 ... 2=0x29) must have referenced a different byte/state and
            does not reproduce. Use HVAC_BLOWER_FAN_DUTY (B15) for blower activity. Kept for research trail.

        HVAC_AC_COMPRESSOR_ON:
          expression: "B44"
          unit: ""
          min: "0"
          max: "255"
          enabled: false
          source: "Monitor session 2026-04-17"
          verified: false
          notes: >
            DISABLED 2026-07-20: B44 is constant 0xFF (255) across ALL 143 220100 captures (FF-padding tail).
            Not a compressor flag. Use HVAC_COMPRESSOR_ON (220102 B17) which reads a clean 0/1 for the
            actual compressor state. Kept for research trail.
        HVAC_HEAT_DEMAND:
          expression: B34
          min: "0"
          max: "100"
          source: coverage analysis 2026-07-23
          verified: false
          notes: >
            Control value, raw 0-73. r=-0.74 vs HVAC_AAT, r=-0.60 vs interior temp,
            r=+0.49 vs blower duty: rises when cabin is cold. Likely heat-demand
            percent or blend-door heat target (not a raw temperature). By state:
            AC ~31-39, PTC-heating 8-59. Verify: vary heat setpoint.
          enabled: true
        HVAC_ACTUATOR_B14:
          expression: B14
          min: "0"
          max: "59"
          source: coverage analysis 2026-07-23
          verified: false
          notes: >
            Raw 0-59 (distinct=31), weak correlations. Likely valve/PWM/blend-door
            position. Verify: actuate mode/temp doors.
          enabled: true
        HVAC_ACTUATOR_B35:
          expression: B35
          min: "86"
          max: "255"
          source: coverage analysis 2026-07-23
          verified: false
          notes: >
            Raw 86-255 (distinct=38), noisy. r=-0.80 vs
            HVAC_BLOWER_FAN_FEEDBACK/DUTY_3. Likely fast actuator current/position
            feedback, not a clean scalar. Verify live.
          enabled: true
    220102:
      status: active
      period: 5000
      vehicle_states: []
      notes: >
        20-byte ELM response (17 data bytes). Secondary HVAC temps.
        Monitored 2026-04-17. B10/B11 are temps that rise with heating.
      parameters:
        HVAC_HEAT_EXCHANGER_TEMP:
          expression: "(B10/2)-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "87"
          source: "Monitor session 2026-04-17"
          verified: false
          notes: >
            0x78=20°C at rest, rises to 0x97=35.5°C with HVAC activity.
            Likely heater coolant or heat exchanger temperature.

        HVAC_HEAT_EXCHANGER_TEMP_2:
          expression: "(B11/2)-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "87"
          source: "Monitor session 2026-04-17"
          verified: false
          notes: >
            Follows B10 with lag. 0x77=19.5°C at rest, rises to 0x80=24°C.
            Secondary heat exchanger or return line temperature.

        HVAC_COMPRESSOR_ON:
          expression: "B17"
          unit: ""
          min: "0"
          max: "1"
          source: "Monitor session 2026-04-17; verified 2026-07-22 (heat-pump vs PTC)"
          verified: true
          notes: >
            Binary compressor on/off STATUS flag (0/1) — a status byte, not a physical relay
            (renamed from HVAC_COMPRESSOR_RELAY 2026-07-22). distinct=2 across 196 captures (=1 ~21%).
            Verified live 2026-07-22: reads 1 while the e-compressor runs (heat-pump heating, ~1.5kW HV
            draw) and 0 during PTC-only heating and idle. Cleaner than the 220100 FF-junk
            HVAC_AC_COMPRESSOR_ON. (Nuance: should also read 1 during A/C cooling — untested today;
            if it's actually heat-pump-mode-only, cooling would show 0.)

        HVAC_HEATER_MODE_FLAG:
          expression: "B18"
          unit: ""
          min: "0"
          max: "1"
          source: "Monitor session 2026-04-17"
          verified: false
          notes: "0x00/0x01 toggle. Possibly heater vs cooler mode flag."

        HVAC_UNKNOWN_TEMP:
          expression: "B19"
          unit: "°C"
          ha_class: temperature
          min: "0"
          max: "80"
          source: "Monitor session 2026-04-17; reclassified 2026-07-20"
          verified: false
          notes: >
            RENAMED from HVAC_COMPRESSOR_LOAD 2026-07-20 — it is a TEMPERATURE, not a load. Evidence across
            108 220102 captures: B19 reads 20-37 even with the compressor OFF (relay B17=0), so it cannot be
            a load; and it correlates r=0.96 with HEAT_EXCHANGER_TEMP (B10). Raw byte ≈ °C directly (no /2-40
            offset), reading a few degrees above the heat exchanger — consistent with the user's report of
            ~40°C after AC off for hours on a hot day. Exact sensor identity unconfirmed (heater-core / mix /
            in-cabin area), hence the neutral name. Was wrongly attributed to "compressor/PTC load".
        HVAC_HEATER_MODE_FLAG_MIRROR:
          expression: B12
          source: coverage analysis 2026-07-23
          verified: false
          notes: >
            B12==B13==B15==B18 (HEATER_MODE_FLAG) exactly across 197 captures —
            redundant status mirror (r=0.924 vs HVAC_COMPRESSOR_ON B17, differ in 5
            samples). Documents B12/B13/B15. 220102 constants: B5=0xFF B6=0x80
            B7/B9/B14=0x00 B20-B23=0x00 padding.
          enabled: true
          min: "0"
          max: "1"
    2201A0:
      status: active
      period: 5000
      vehicle_states:
        - acc
        - acc2
        - ready
      notes: >
        62 bytes. Primary HVAC control/status DID. Contains set temperature,
        HVAC on/off flags, heating mode, and defrost flags. Also contains
        actuator target values (ELM[3-9]) that track requested heat output,
        and mirrored values at ELM[43-45]. ELM[24]=0x28 is a constant (not
        set temp). Fan speed byte and HVAC mode selector not yet identified.
        2026-07-23 (277 captures, full-length 62B): most unmapped bytes are actuator data
        (door target/feedback/motor drive) needing physical actuation to label. Confirmed:
        B9==B10 exactly (paired driver/pax target), B19≈B20 (paired). Target cluster
        B5/B7/B9(=B10)/B11 (36-221). Feedback cluster B13/B14/B15/B17 (~104-143); B17
        mode-dependent (r=-0.63 vs HVAC_COOLING_MODE, likely mode/recirc door). High-churn
        B47/B50/B52/B66 (distinct 58-88) = fast motor-drive/RPM-like (cf. 01A1). Constants:
        B54=B55=0x00, tail B69/B70/B71=0x00; low-activity flags B26/B29/B37/B38/B46/B53/B61-B63.
      parameters:
        HVAC_SET_TEMP_DRIVER:
          expression: "B44"
          unit: "°C"
          display: "f'{v} °C'"
          min: "15"
          max: "32"
          source: "Monitor session 2026-04-17"
          verified: true
          notes: >
            Set temperature (driver side). Direct °C value: 0x14=20°C,
            0x1E=30°C, 0x0F=15°C — all match user input exactly.

        HVAC_SET_TEMP_PASSENGER:
          expression: "B45"
          unit: "°C"
          display: "f'{v} °C'"
          min: "15"
          max: "32"
          source: "Monitor session 2026-04-17"
          verified: true
          notes: >
            Set temperature (passenger side or redundancy). Always matches
            B44 in single-zone Ioniq. Dual-zone mirror.

        HVAC_ON_FLAG:
          expression: "B23"
          unit: ""
          display: "f'{'ON' if v else 'OFF'}'"
          min: "0"
          max: "1"
          source: "Monitor session 2026-04-17"
          verified: true
          notes: >
            HVAC system running flag. 1 when HVAC is on, 0 when off.

        HVAC_STARTUP_FLAG:
          expression: "B22"
          unit: ""
          min: "0"
          max: "1"
          source: "Monitor session 2026-04-17"
          verified: false
          notes: >
            Transient flag: briefly 1 at HVAC turn-on, then returns to 0.
            Possibly a startup/initialization signal.

        HVAC_COOLING_MODE:
          expression: "B25"
          unit: ""
          min: "0"
          max: "1"
          source: "Monitor session 2026-04-17"
          verified: false
          notes: >
            Mode flag: 1 during normal/cooling operation, 0 during PTC
            heater mode. May indicate A/C compressor vs resistive heating.

        HVAC_PTC_HEATER_FLAG:
          expression: "B06"
          unit: ""
          min: "0"
          max: "2"
          source: "Monitor session 2026-04-17"
          verified: false
          notes: >
            0x00 normal, 0x02 during PTC heater activation. Correlates
            with high heat output values in ELM[3,5-8].

        HVAC_MAX_FAN_FLAG:
          expression: "B57"
          unit: ""
          min: "0"
          max: "255"
          source: "Fan speed test 2026-04-19"
          verified: false
          notes: >
            MAX fan indicator. 0x00 at fan speeds 1-4, 0xAE (174) at MAX.
            Only way to distinguish fan 4 from MAX (220100 B33 is identical
            for both at 0x2D).
            2026-07-20 CAVEAT: B57 is OUT-OF-BOUNDS in all 193 stored 2201A0 captures (all truncated to
            40 bytes; B57 needs the full 62-byte response). Unverifiable from history. The companion April
            claim (220100 B33=0x2D) is provably wrong — B33 is constant 0xFF across 143 captures — so this
            mapping is suspect. Live 62B read today = 0 (fan-only speed 2). Downgraded to unverified; re-test
            with MAX fan on and full-length capture.

        HVAC_DEFROST_FLAGS:
          expression: "(B58 << 8) | B59"
          unit: ""
          display: "f'0x{v:04X}'"
          min: "0"
          max: "65535"
          source: "Monitor session 2026-04-17"
          verified: false
          notes: >
            0x0000 = off, 0xFFEF appeared during defrost/defog period
            (17:46:16-17:47:26). Likely bitfield for front defrost,
            rear defogger, and possibly recirculation. Need more targeted
            testing to decode individual bits.
            2026-07-20 CAVEAT: B58/B59 are OUT-OF-BOUNDS in all stored 2201A0 captures (truncated to 40B);
            only readable on the full 62-byte response. Verify against a full-length capture.
        HVAC_ACTUATOR_TARGET_1:
          expression: B5
          min: "0"
          max: "255"
          source: coverage analysis 2026-07-23
          verified: false
          notes: >
            Actuator target, raw 27-209 (distinct=51). ELM[3-9] target cluster.
            Verify: sweep temp/mode to identify which door.
          enabled: true
        HVAC_ACTUATOR_TARGET_2:
          expression: B7
          min: "0"
          max: "255"
          source: coverage analysis 2026-07-23
          verified: false
          notes: "Actuator target, raw 0-219 (distinct=58). ELM[3-9] target cluster."
          enabled: true
        HVAC_ACTUATOR_TARGET_3:
          expression: B9
          min: "0"
          max: "255"
          source: coverage analysis 2026-07-23
          verified: false
          notes: "Actuator target, raw 36-218 (distinct=57). B9==B10 exactly (paired driver/pax). ELM[3-9] target cluster."
          enabled: true
        HVAC_ACTUATOR_TARGET_4:
          expression: B11
          min: "0"
          max: "255"
          source: coverage analysis 2026-07-23
          verified: false
          notes: "Actuator target, raw 39-221 (distinct=56). ELM[3-9] target cluster."
          enabled: true
        HVAC_MODE_DOOR_FEEDBACK:
          expression: B17
          min: "0"
          max: "255"
          source: coverage analysis 2026-07-23
          verified: false
          notes: >
            Position feedback, steady ~104-125. Mode-dependent: r=-0.63 vs
            HVAC_COOLING_MODE. Likely mode/recirc door feedback. Verify: cycle
            face/feet/defrost and recirc.
          enabled: true
        HVAC_DOOR_FEEDBACK_B13:
          expression: B13
          min: "0"
          max: "255"
          source: coverage analysis 2026-07-23
          verified: false
          notes: >
            Position feedback cluster, steady ~114-143. Verify: actuate doors.
          enabled: true
        HVAC_DOOR_FEEDBACK_B15:
          expression: B15
          min: "0"
          max: "255"
          source: coverage analysis 2026-07-23
          verified: false
          notes: "Position feedback cluster, steady ~104-134."
          enabled: true
        HVAC_MOTOR_DRIVE_B47:
          expression: B47
          min: "0"
          max: "255"
          source: coverage analysis 2026-07-23
          verified: false
          notes: "High-churn (distinct=70, 0-253) — fast motor-drive/RPM-like (cf. 01A1)."
          enabled: true
        HVAC_MOTOR_DRIVE_B50:
          expression: B50
          min: "0"
          max: "255"
          source: coverage analysis 2026-07-23
          verified: false
          notes: "High-churn (distinct=88, 0-242) — fast motor-drive/RPM-like."
          enabled: true

    2201A1:
      status: draft
      vehicle_states:
        - acc
        - acc2
        - ready
      notes: >
        62 bytes. Actuator control data. First 10 bytes very active during
        HVAC operation (RPM-like 16-bit values). ELM[9-10] = 01 01 when on,
        00 00 when off. ELM[13-14]: 00 78 at rest, 01 3C during PTC heater.
        B22 mirrors 2201A0 B07 exactly (target value, drifts over time).
        B68: coarse fan step — 0x05 at fan 1-2, 0x0A at fan 4/MAX.
      parameters: {}

    2201A2:
      status: draft
      notes: "55 bytes. Similar structure to 01A1."
      vehicle_states:
        - acc
        - acc2
        - ready
      parameters: {}

    2201A3:
      status: draft
      vehicle_states:
        - acc
        - acc2
        - ready
      notes: >
        55 bytes. Dynamic during HVAC operation (NOT static as initially
        thought from cold-read). Contains compressor RPM data, PTC heater
        info (ELM[12] shows 0x39/0x3A during PTC activation). 01A3-01A6
        may still share structure but diverge under load.
      parameters: {}

    2201A4:
      status: draft
      notes: "55 bytes. Identical to 01A3."
      vehicle_states:
        - acc
        - acc2
        - ready
      parameters: {}

    2201A5:
      status: draft
      notes: "55 bytes. Identical to 01A3."
      vehicle_states:
        - acc
        - acc2
        - ready
      parameters: {}

    2201A6:
      status: draft
      notes: "55 bytes. Identical to 01A3."
      vehicle_states:
        - acc
        - acc2
        - ready
      parameters: {}
