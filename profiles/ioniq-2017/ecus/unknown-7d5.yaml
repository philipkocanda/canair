# ─── Unknown-7D5 ──────────────────────────────────────────────────────
# Unknown ECU at 0x7D5, adjacent to ESC (0x7D1) and EPS (0x7D4).
# Only 2 UDS identity DIDs respond: F18C (serial) and F101 (app SW "G7").
# "G7" is the Ioniq Electric vehicle model code, not an ECU identifier.
#
# Identity (2026-04-17, ready mode):
#   F18C (serial): 17060100003900000000 (mfg date 2017-06-01, serial 0039)
#   F101 (app SW): G7
#
# Probing (2026-04-19):
#   Dead during AC charging — does not respond to 1001, 1003, 3E00, 1A8C, or 22 F100-F1FF.
#   Requires ACC/ignition power. Scan service 22 F100-F1FF returned 256 NO DATA.
#   KWP2000 1A8C also NO DATA (not a KWP2000 ECU — only UDS).
#
# Live data (2026-07-22, READY): FIRST live-data DID found — 22C101 responds (27 bytes).
#   This is the SAME DID that ESC (0x7D1) exposes (REAL_SPEED_KMH etc.), and 7D5 shares
#   ESC's "G7" app SW and sits in the ESC/EPS chassis address block — strong evidence 7D5
#   is a chassis/brake sub-module (candidate: AHB Active Hydraulic Booster / iBAU integrated
#   brake actuator). 01xx, B0xx, C001-C010, D0xx and service 21 all NRC — only C101 responds.
Unknown-7D5:
  tx_id: 0x7D5
  identity:
    description: Unknown ECU — adjacent to ESC/EPS in address space
    app_sw: "G7"
    id_protocol: UDS  # F1xx (only 2 DIDs: F18C serial, F101 app SW)
    notes: >
      Previously misidentified as AHB (Active Hydraulic Booster). The only identity data
      is app_sw "G7", which is just the Ioniq Electric vehicle model code (same as ESC 0x7D1),
      not an ECU identifier. No part number, no ECU ID string. Could be AHB, iBAU, or another
      brake/chassis sub-module. 2026-07-22 (READY): found its first live-data DID — 22C101
      (27 B), the same DID ESC 0x7D1 exposes. Combined with the shared "G7" app SW and the
      ESC/EPS-adjacent address, this reinforces the chassis/brake sub-module hypothesis.
      See this file's pids: 22C101. 01xx/B0xx/C0xx/D0xx/service-21 all NRC.
  vehicle_states:
    - acc
    - acc2
    - ready
  scan_log: # Unknown-7D5 (candidate AHB/iBAU brake module)
    - service: 0x22
      range: "0101-010F,B001-B010,C101-C10F,C001-C010,D001-D010"
      date: 2026-07-22
      hits: "C101"
      vehicle_states:
        - ready
      notes: "FIRST live-data DID found — C101 (27 B), same DID as ESC. Registered in this file's pids:. All other ranges NRC."
  pids:
    22C101:
      status: draft
      period: 2500
      vehicle_states:
        - ready
      parameters:
        UNKNOWN_7D5_C101:
          expression: ""
          unit: ""
          ha_class: ""
          min: ""
          max: ""
          source: "DID scan 2026-07-22 (READY)"
          source_links: []
          verified: false
          notes: >
            27 bytes: 62C101FB180000BD0DFFF4FCFD020001FFFFFFFFFF000026180004.
            First live-data DID ever found on 0x7D5 (same DID index as ESC 22C101).
            Signed-looking words (FFF4, FCFD) — likely brake pressure / pedal / accel or a
            chassis sensor. Captured at standstill in READY; needs a driving/braking capture
            to decode. Compare byte layout against ESC 0x7D1 22C101 (42 bytes).
  research:
    - type: decode
      target: "22C101"
      status: captured
      priority: P2
      vehicle_states:
        - acc
      notes: >
        2026-07-22: 7D5's only live-data DID (27 B). Identify whether 7D5 is AHB/iBAU brake
        module. Compare structure to ESC 22C101; capture while braking/driving for contrast.
      what_to_test:
        - "Decode 27-byte C101 payload; find brake-pressure / pedal / accel signals"
        - "Diff against ESC 0x7D1 22C101 to see if 7D5 mirrors a subset"
      sources:
        - "captures/ — 2026-07-22 (READY)"
