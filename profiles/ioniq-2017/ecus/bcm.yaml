# ─── BCM (Body Control Module) / TPMS ──────────────────────────────────
# BCM and TPMS share TX ID 0x7A0 (same physical ECU, part 95400G7470).
# TPMS data is accessed via DID 22C00B on the BCM.
BCM:
  tx_id: 0x7A0
  identity:
    description: Body Control Module
    part_number: "95400G7470"
    mfg_date: "2017-05-31"
    id_protocol: UDS  # F1xx
  availability: [sleep, plugged, acc, acc2, ready, charging]  # Wakes from CAN bus activity
  scan_log: # BCM
    - service: 0x31
      range: "0000-FFFF"
      date: 2026-04-20
      hits: "~71+ (screen only, not in log — connection dropped)"
      probes: 49813  # cut off at 0xC8D2 — WiCAN sleep/disconnect
      state: asleep
      notes: >
        BCM supports service 31 (sub-fn 03 requestRoutineResults).
        Two clusters of positive responses seen on screen (not saved to log — connection dropped):
          Cluster A: 0x95CE–0x97C2 (~40 hits, stride 0x0D)
          Cluster B: 0xC726–0xC8B8 (~32 hits, stride 0x0D)
        All responses are 2 bytes (just positive ack, no result data — routine exists but no
        result available, likely needs startRoutine first or ignition on).
        Notable: RID 0x12A1 returned NRC 0x22 (conditionsNotCorrect).
        Remaining range 0xC8D3-0xFFFF not yet scanned.
        TODO: Resume scan from 0xC8D3. Also re-scan 0x95CE-0xC8D2 to capture hits to log.
  pids:
    22C00B:
      period: 15000
      enabled: true
      availability: [sleep, plugged, acc, acc2, ready, charging]
      parameters:
        TYRE_PRESSURE_FL:
          expression: "B10/72.52"
          unit: bar
          ha_class: pressure
          min: "0"
          max: "5"
          source: "Original WiCAN config + Ioniq forum"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "72.52 converts raw byte to bar. Alternative: B10/5 gives psi."

        TYRE_PRESSURE_FR:
          expression: "B14/72.52"
          unit: bar
          ha_class: pressure
          min: "0"
          max: "5"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: ""

        TYRE_PRESSURE_RL:
          expression: "B19/72.52"
          unit: bar
          ha_class: pressure
          min: "0"
          max: "5"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: ""

        TYRE_PRESSURE_RR:
          expression: "B23/72.52"
          unit: bar
          ha_class: pressure
          min: "0"
          max: "5"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: ""

        TYRE_TEMP_FL:
          expression: "B11-50"
          unit: "°C"
          ha_class: temperature
          min: "-50"
          max: "100"
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "From Niro EV, untested on Ioniq 2017"

        TYRE_TEMP_FR:
          expression: "B15-50"
          unit: "°C"
          ha_class: temperature
          min: "-50"
          max: "100"
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: ""

        TYRE_TEMP_RL:
          expression: "B20-50"
          unit: "°C"
          ha_class: temperature
          min: "-50"
          max: "100"
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: ""

        TYRE_TEMP_RR:
          expression: "B25-50"
          unit: "°C"
          ha_class: temperature
          min: "-50"
          max: "100"
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: ""
    22B00D:
      enabled: false
      availability: [sleep, plugged, acc, acc2, ready, charging]
      notes: >
        13 bytes. Previously guessed as preheat timer config, but LIKELY INCORRECT:
        B03-B05=0xFCFCE0 are constant across all captures; the only bytes that vary are
        B07 (0x00->0x03) and B08 (0x00->0x10). Any relationship to the departure time
        (480 min = 08:00 guessed in B007) is likewise unverified. Re-capture after changing
        preheat settings to see whether any byte tracks. Sample: 62B00DFCFCE00000000000AAAA.
      parameters: {}

    22B00E:
      period: 5000
      enabled: true
      availability: [sleep, plugged, acc, acc2, ready, charging]
      parameters:
        CHARGE_PORT_OPEN:
          expression: "B10:5"
          unit: ""
          ha_class: opening
          min: ""
          max: ""
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "Bit flag — 1=open, 0=closed. Niro PR had B10:4 — wrong for Ioniq, actual bit is B10:5. BCM does NOT require extended diagnostic session. Verified 2026-04-15."

    22B00F:
      enabled: false
      availability: [acc, acc2, ready, charging]
      notes: >
        13 bytes. Identical payload to B00D (0xFCFC E0...) — possibly mirrored register
        or preheat config overflow. B010+ did not respond in DID scan. 
        Does not respond when vehicle is asleep.
        Sample: 62B00FFCFCE00000000000AAAA.
      parameters: {}

    22B004:
      enabled: false
      availability: [sleep, plugged, acc, acc2, ready, charging]
      notes: >
        13 bytes. B11:6 = door lock state (1=locked, 0=unlocked) — confirmed via
        fob lock/unlock test (0x40↔0x00 transition correlates with B005/B006 changes).
        B05=0x74, B06=0x02, B07=0x99, B09=0x0C.
      parameters:
        BCM_DOORS_LOCKED:
          expression: "B11:6"
          unit: ""
          ha_class: ""
          mqtt_topic: bcm_doors_locked
          min: "0"
          max: "1"
          source: "Fob lock/unlock test 2026-04-18"
          source_links: []
          verified: false
          notes: >
            Needs further testing to confirm

    22B005:
      enabled: false
      availability: [sleep, plugged, acc, acc2, ready, charging]
      notes: >
        13 bytes. B10 changes A0↔AC during fob lock/unlock (bits 2,3 = 0x0C).
        Correlated with B004 lock state and B006 indicator flash.
        B05=0x20, B07=0x10, B12=0x08.
      parameters:
        BCM_B005_UNLOCK_BITS:
          expression: "B12"
          unit: ""
          ha_class: ""
          min: "0"
          max: "255"
          source: "Fob lock/unlock test 2026-04-18"
          source_links: []
          verified: false
          notes: >
            Correlated with B004 lock state. Bits 2,3 (0x0C) set during unlock.
            Possibly courtesy lamp or interior lighting trigger. Base value 0xA0.

    22B006:
      enabled: false
      availability: [sleep, plugged, acc, acc2, ready, charging]
      notes: >
        13 bytes. B12 changes 00↔04 during fob lock/unlock (bit 2).
        Correlated with B004 lock state and B005 unlock bits.
        B05=0x20, rest normally zeros.
      parameters:
        BCM_B006_UNLOCK_BITS:
          expression: "B12"
          unit: ""
          ha_class: ""
          min: "0"
          max: "255"
          source: "Fob lock/unlock test 2026-04-18"
          source_links: []
          verified: false
          notes: >
            Correlated with B004 lock state. Bit 2 (0x04) set during unlock.
            Possibly turn signal confirmation flash.

    22B007:
      period: 60000
      enabled: false
      availability: [sleep, plugged, acc, acc2, ready, charging]
      parameters:
        PREHEAT_DEPARTURE_TIME:
          expression: (B07 << 8) | B09
          unit: "min"
          display: "f'{int(v)//60:02d}:{int(v)%60:02d}'"
          ha_class: ""
          min: "0"
          max: "1439"
          source: Unverified pattern-match (0x01E0=480=08:00); likely incorrect, value is constant across all captures
          source_links: []
          verified: false
          notes: >
            LIKELY INCORRECT / UNVERIFIED. Decodes to a constant 480 across all 25 captures (2026-04-15, spanning sleep/ACC/charging) and was never observed to change. 0x01E0=480=08:00 was pattern-matched, not confirmed by changing the departure time. The bytes that DO vary between captures (payload B08/B09 area) are not the ones this reads; 0x01E0 sits among static BCM config registers (cf. B008/B009), so it is probably a fixed config/format constant, not the live preheat time. Re-capture after actually changing the departure setting to see which bytes move.
    22B008:
      enabled: false
      availability: [sleep, plugged, acc, acc2, ready, charging]
      notes: >
        13 bytes. Static across deep sleep and ACC captures — configuration register.
        B03=0x00, B04=0x51, B05=0x0C, B06=0x20, B07=0x00, B08=0x88.
        Sample: 62B00800510C2000880000AAAA.
      parameters: {}

    22B009:
      enabled: false
      availability: [sleep, plugged, acc, acc2, ready, charging]
      notes: >
        13 bytes. Repeating 0xFEEE pattern (B03-B06) — possibly sensor addresses or
        calibration references. Rest zeros. Static. Sample: 62B009FEEEFEEE00000000AAAA.
      parameters: {}

    22B00A:
      enabled: false
      availability: [sleep, plugged, acc, acc2, ready, charging]
      notes: >
        13 bytes. B03=0xE3, B04=0xFE, B05=0xE3, B07=0x40, B08=0x05. Purpose unknown.
        Static across captures. Sample: 62B00AE3FEE30000400500AAAA.
      parameters: {}

    22B00B:
      enabled: false
      availability: [acc, acc2, ready, charging]
      notes: >
        NRC 0x31 (requestOutOfRange) in deep sleep. Only 2-byte response (7E00) on some
        attempts — may be a status register that requires ACC/IGN on.
      parameters: {}

    22B00C:
      period: 60000
      enabled: false
      availability: [sleep, plugged, acc, acc2, ready, charging]
      parameters:
        PREHEAT_SCHEDULE_DAYS:
          expression: B05
          unit: ""
          display: "f'{int(v):07b}'"
          ha_class: ""
          min: "0"
          max: "127"
          source: Unverified pattern-match (0x3F=6 days); likely incorrect, value is constant across all captures
          source_links: []
          verified: false
          notes: >
            LIKELY INCORRECT / UNVERIFIED. Constant 0x3F (=63) across all 23 captures and never observed to change. 0x3F=0b111111 was pattern-matched to '6 days set' but never confirmed by toggling days, and the bit mapping is unknown. Probably a static config/format byte, not the live schedule. Re-capture after changing schedule days to confirm which bytes move.
    22B001:
      enabled: false
      availability: [sleep, plugged, acc, acc2, ready, charging]
      notes: >
        20 bytes. Mostly zeros with config-like flags. Returns NO DATA on first attempt
        after wake, then responds on retry. B20 changes with power state: 0x02 (ACC, Apr 14)
        → 0x01 (ACC2+charging, Apr 19). Possibly BCM power mode sub-state.
        Sample (ACC2+charging): 62B00140C0000000010000000000000201000000.
      parameters: {}

    22B002:
      enabled: false
      availability: [sleep, plugged, acc, acc2, ready, charging]
      notes: >
        13 bytes. Sparse data with 0xAA padding. Purpose unknown.
        Sample: 62B002C00000000200AAAAAAAA.
      parameters: {}

    22B003:
      period: 10000
      enabled: false
      availability: [sleep, plugged, acc, acc2, ready, charging]
      parameters:
        BCM_12V_BATTERY:
          expression: "B10*0.08"
          unit: "V"
          display: ""
          ha_class: voltage
          min: "0"
          max: "20"
          source: "Reverse engineered from monitor drift analysis"
          source_links: []
          verified: true
          notes: >
            12V battery voltage measured by BCM. Formula v*0.08 estimated: value 149 → 11.92V, cross-referenced
            against WiCAN onboard voltage sensor reading 12.1V at same time (value ~149).
            Approximate — needs multimeter reference to confirm exact scale.
        BCM_POWER_MODE:
          expression: "B12"
          unit: ""
          display: ""
          ha_class: ""
          min: "0"
          max: "255"
          source: "Reverse engineered from cross-state comparison"
          source_links: []
          verified: false
          notes: >
            WiCAN B12 (ELM payload index 9). Shows ADC-like values (~245-248) during deep
            sleep, oscillating ±1 LSB (typical ADC noise). Earlier captures showed 0x09 and
            0x0A — possibly from a different vehicle state (ACC/IGN on) or a pre-PCI-fix
            byte offset error. Disabled until values are better understood with at-car
            captures across multiple vehicle states.

