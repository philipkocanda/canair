# ─── PSM (Power Seat Module) ──────────────────────────────────────────
# From e-Niro — confirmed on Ioniq 2017 (Premium trim has power seats).
# Likely requires ACC/IGN on. Actuators are continuous motors — hold command
# active for desired duration, send OFF to stop.
PSM:
  tx_id: 0x7A3
  identity:
    description: Power Seat Module
    part_number: "95450G7000"
    mfg_date: "2017-06-01"
    hw_version: "100"
    sw_version: "100"
    boot_sw: "190"
    id_protocol: UDS  # F1xx
    notes: >
      Power Seat Module. No readable live-data DIDs (seat position not exposed
      via OBD); seat actuators are driven via IOControl (service 2F) — continuous
      motors, send OFF to stop.
  vehicle_states:
    - plugged
    - acc
    - acc2
    - ready
    - charging
  scan_log: # PSM (power seat)
    - service: 0x22
      range: "0101-010F,B001-B010,C001-C010,D001-D010"
      date: 2026-07-22
      hits: 0
      vehicle_states:
        - ready
      notes: "Also service 21 01-0F: all NRC. No live-data DIDs (seat position not exposed via OBD read)."
  pids: {}

  # ─── IOControl (service 2F) ──────────────────────────────────────────
  # Continuous motors: send ON, wait desired duration, send OFF.
  # Usage: canair io PSM --did <DID>
  iocontrol:
    B401:
      vehicle_states: []
      label: Seat slide forward
      verified: true
      true: "2FB40103"
      false: "2FB40100"
      notes: >
        Continuous motor — send OFF to stop.

    B402:
      vehicle_states: []
      label: Seat slide backward
      verified: true
      true: "2FB40203"
      false: "2FB40200"
      notes: >
        Continuous motor — send OFF to stop.

    B403:
      vehicle_states: []
      label: Seat recline upright
      verified: true
      true: "2FB40303"
      false: "2FB40300"
      notes: >
        Continuous motor — send OFF to stop.

    B404:
      vehicle_states: []
      label: Seat recline backward
      verified: true
      true: "2FB40403"
      false: "2FB40400"
      notes: >
        Continuous motor — send OFF to stop.

    B405:
      vehicle_states: []
      label: Seat front height up
      verified: true
      true: "2FB40503"
      false: "2FB40500"
      notes: >
        Continuous motor — send OFF to stop.

    B406:
      vehicle_states: []
      label: Seat front height down
      verified: true
      true: "2FB40603"
      false: "2FB40600"
      notes: >
        Continuous motor — send OFF to stop.

    B407:
      vehicle_states: []
      label: Seat rear height up
      verified: true
      true: "2FB40703"
      false: "2FB40700"
      notes: >
        Continuous motor — send OFF to stop.

    B408:
      vehicle_states: []
      label: Seat rear height down
      verified: true
      true: "2FB40803"
      false: "2FB40800"
      notes: >
        Continuous motor — send OFF to stop.
