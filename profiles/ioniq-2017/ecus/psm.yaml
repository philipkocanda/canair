# ─── PSM (Power Seat Module) ──────────────────────────────────────────
# From e-Niro — untested on Ioniq 2017 (Premium trim has power seats).
# Likely requires ACC/IGN on. Actuators are continuous motors — hold command
# active for desired duration, send OFF to stop.
PSM:
  tx_id: 0x7A3
  identity:
    description: Power Seat Module
    part_number: "95450G7000"
    mfg_date: "2017-06-01"
    hw_version: "100"
    sw_version: "100"
    boot_sw: "190"
    id_protocol: UDS  # F1xx
  availability: [plugged, acc, acc2, ready, charging]
  scan_log: # PSM (power seat)
    - service: 0x22
      range: "0101-010F,B001-B010,C001-C010,D001-D010"
      date: 2026-07-22
      hits: 0
      state: ready
      notes: "Also service 21 01-0F: all NRC. No live-data DIDs (seat position not exposed via OBD read)."
  pids: {}

  # ─── IOControl (service 2F) ──────────────────────────────────────────
  # All from e-Niro — untested on Ioniq 2017.
  # Continuous motors: send ON, wait desired duration, send OFF.
  # Usage: python3 canreq.py --raw 7A3:<on_command> --hold
  iocontrol:
    B401:
      availability: []
      label: Seat slide forward
      verified: true
      on: "2FB40103"
      off: "2FB40100"
      notes: >
        Continuous motor — send OFF to stop.

    B402:
      availability: []
      label: Seat slide backward
      verified: true
      on: "2FB40203"
      off: "2FB40200"
      notes: >
        Continuous motor — send OFF to stop.

    B403:
      availability: []
      label: Seat recline upright
      verified: true
      on: "2FB40303"
      off: "2FB40300"
      notes: >
        Continuous motor — send OFF to stop.

    B404:
      availability: []
      label: Seat recline backward
      verified: true
      on: "2FB40403"
      off: "2FB40400"
      notes: >
        Continuous motor — send OFF to stop.

    B405:
      availability: []
      label: Seat front height up
      verified: true
      on: "2FB40503"
      off: "2FB40500"
      notes: >
        Continuous motor — send OFF to stop.

    B406:
      availability: []
      label: Seat front height down
      verified: true
      on: "2FB40603"
      off: "2FB40600"
      notes: >
        Continuous motor — send OFF to stop.

    B407:
      availability: []
      label: Seat rear height up
      verified: true
      on: "2FB40703"
      off: "2FB40700"
      notes: >
        Continuous motor — send OFF to stop.

    B408:
      availability: []
      label: Seat rear height down
      verified: true
      on: "2FB40803"
      off: "2FB40800"
      notes: >
        Continuous motor — send OFF to stop.
