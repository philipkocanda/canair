# ─── CLU (Cluster / Instrument Panel) ─────────────────────────────────
CLU:
  tx_id: 0x7C6
  identity:
    description: Cluster (instrument panel)
    part_number: "94003G7300"
    mfg_date: "2017-06-01"
    hw_version: "100"
    sw_version: "201"
    boot_sw: "625"
    id_protocol: UDS  # F1xx
  vehicle_states:
    - acc
    - acc2
    - ready
  pids:
    22B002:
      period: 10000
      vehicle_states:
        - acc
        - acc2
        - ready
      parameters:
        ODOMETER:
          expression: "[B12:B14]"
          unit: km
          ha_class: distance
          min: "0"
          max: ""
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "3-byte odometer value"
    22B001:
      status: draft
      period: 10000
      vehicle_states: []
      parameters:
        CLU_B001_UNKNOWN:
          expression: ""
          unit: ""
          ha_class: ""
          min: ""
          max: ""
          source: "DID scan 2026-04-17"
          source_links: []
          verified: false
          notes: "13 bytes, all zeros when stationary. Purpose unknown. Payload: 62B00100000000000000000000"
    22B003:
      status: draft
      period: 10000
      vehicle_states: []
      parameters:
        CLU_B003_UNKNOWN:
          expression: ""
          unit: ""
          ha_class: ""
          min: ""
          max: ""
          source: "DID scan 2026-04-17"
          source_links: []
          verified: false
          notes: "13 bytes. B3=0x88, B7=0x01, rest zeros. Purpose unknown. Payload: 62B00388000000010000000000"
  research:
    - type: verify
      target: "22B002"
      status: done
      priority: P1
      vehicle_states:
        - acc
      notes: >
        Odometer (ODOMETER = [B12:B14]) confirmed = 72982 km in READY (2026-07-22).
        NEGATIVE result on the e-Niro extras: 22B002 returns only 15 bytes on the Ioniq
        (62 B0 02 E0 00 00 00 00 AD 01 1D 16 00 00 00), so there is no room for the
        imperial odometer / range / time-driven / speed-limit / cruise fields the e-Niro
        exposes at higher offsets — they are simply not present in this DID on this car.
        A full CLU B001-B010 scan (2026-07-22, READY) found only B001 (8B, zeros),
        B002 (odometer) and B003 (8B, 88..01); B004+ do not respond.
      what_to_test:
        - "Imperial odometer / range / speed-limit / cruise — ABSENT (15-byte response, confirmed 2026-07-22)"
      sources:
        - "OBDb Ioniq 5 — 22B002"
        - "e-Niro reference sheet"
    - type: scan
      target: "22 B001-B010"
      status: done
      priority: P2
      vehicle_states:
        - acc
      notes: "CLU cluster range scan."
    - type: scan
      target: "0x7C0/0x7C1 probes"
      status: nrc
      priority: P2
      vehicle_states:
        - acc
      notes: "Head unit — NO DATA during deep sleep (probed 2026-04-16). May be on M-CAN bus. Retry with ACC on: scan 21 01-05, 22 B001-B010."
      sources:
        - "Hyundai/Kia convention: 0x7C0 = AVN"
