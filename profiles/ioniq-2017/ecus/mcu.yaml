# ─── MCU (Motor Control Unit) ─────────────────────────────────────────
#
# This is the power electronics + control for the traction motor.
#
# Responsibilities:
# - Inverter switching (DC → 3-phase AC)
# - Motor torque/current control loops
# - Rotor position handling
# - Thermal protection of motor/inverter
#
# The Vehicle Control Unit (VCU) and Motor Control Unit (MCU)
# are both part of the Electronic Powertrain Control Unit (EPCU) physical housing.
#
# Full service 21 scan (01-FF) during AC charging (2026-04-18):
#   0x01 (34 bytes), 0x02 (62 bytes), 0x03 (27 bytes, all zeros), 0xF2 (69 bytes).
#
# KWP2000 diagnostic sessions (service 0x10) — probed 2026-07-22, car in READY:
# see the structured `sessions:` field at the end of this ECU block.
# Only 0x81 is accepted; 21xx reads work in the default session too — no session
# unlocks extra data. Payload sizes are session-independent: 2101=30B, 2102=56B,
# 2103=27B; 2104/2105 → NRC 0x12 (do not exist).
MCU:
  tx_id: 0x7E3
  identity:
    alias: VMCU # aka HPCU (Hybrid Power Control Unit - legacy term but may help to know)
    description: Motor Control Unit (inverter)
    part_number: "36600-0E250"
    ecu_id: AEEMCU83  # KWP2000 1A8C
    sw_id: "EAEEHEL-MS2-D000"
    calibration: "00000001"
    id_protocol: KWP2000  # 1Axx
    notes: >
      Motor Control Unit — inverter / power electronics and control loops for
      the traction motor. Shares the EPCU (Electronic Powertrain Control Unit)
      physical housing with the VCU.
  vehicle_states:
    - ready
    - charging
  pids:
    2101:
      status: draft
      period: 5000
      vehicle_states:
        - charging
      notes: >
        34 bytes. Captured but not decoded.
        Raw payload (charging): 6101000003FF083801268D7F390000000A00460253044F397A007A000CFF...
      parameters:
        MCU_INVERTER_TEMP:
          expression: B22
          unit: °C
          min: "0"
          max: "150"
          source: cross-ECU + multi-state analysis 2026-07-23
          verified: false
          notes: >
            Inverter/motor temperature, raw byte = °C (no -40 offset; -40 would
            give -24 °C while charging). r=+0.84 vs MCU 2102 motor RPM
            (2026-07-22 drive), confirmed thermal by state contrast: charging
            (motor idle) 16-26, READY parked 41-49, driving 7-104. Sensor
            (inverter/motor/heat-sink) unconfirmed. Neighbour B25 also thermal-ish
            but spikes to 249.
          enabled: true
        MCU_HV_VOLTAGE:
          expression: B13*2.56
          unit: V
          min: "0"
          max: "500"
          source: canair investigate/hunt 2026-07-22 drive
          verified: false
          notes: >
            HV DC-link voltage at the motor inverter (coarse, ~2.56 V/LSB). B13*2.56 = 353-399 V over the drive — the correct HKMC HV pack range (nominal ~360, sag under load, rise on regen). r=+0.994 vs VCU:2102 coarse DC-link byte and r=+0.79 vs the verified VCU INVERTER_INPUT_VOLTAGE (B17*2); the moderate fine-voltage r reflects coarse 8-bit quantisation over a gentle drive's narrow voltage span. Exact scale approximate; verify against BMS BATTERY_VOLTAGE in a co-polled charge/drive with wider voltage swing.

    2102:
      status: active
      period: 5000
      vehicle_states:
        - charging
      notes: >
        62 bytes. Layout (WiCAN B / ISO-TP): B10:B11 RPM (verified), B12:B13 & B14:B15 the two
        signed-16 torque fields (command/estimated), B17:B18 phase-current RMS candidate, B20/B21
        temperatures. Static calibration block ~B27-B33 (raw 7D D6 CD AB C2 CD …): per-unit resolver
        + U/V phase current-sensor offsets (Soul VMCU: Int16 "Resolver Offset" / "U/V Phase Current
        Sensor Offset"). Constant across captures; same bytes recur in 21F2 by the "EHEL-MS2" cal ID
        → calibration data, not mapped as parameters. Tail B54+ is zero padding.
        2026-07-23 load-vs-temperature analysis (574 captures, 477 driving): the B18-B21 cluster splits.
        Slow temps — B20 (MCU_TEMP_1) and B18 (MCU_TEMP_3): load-decoupled (r≈0 vs |torque|),
        autocorrelation >0.93, step ~0.1/sample. B20 hottest during charging (22 °C, motor idle) →
        inverter/power-stage; B18 coolest charging (8 °C), warms with driving → motor/coolant. Load-tracking
        — B21 (was MCU_TEMP_2) and B19 (was MCU_INVERTER_TEMP): step with instantaneous torque
        (r(Δbyte,Δ|torque|)=0.90, 0.79), not temps. B21 = inverter-load/current scalar (r=0.875 vs |torque|,
        0.859 vs phase current); B19 = IGBT junction-temp estimate or current (ambiguous). Both demoted
        enabled:false. B22-B51 static/near-static (incl. B22:B23=0xF7FF/0xF8FF); B52 dynamic (233 distinct,
        no signal correlation) = alive-counter/checksum.
      parameters:
        MCU_MOTOR_RPM:
          expression: "[S10:S11]"
          unit: RPM
          ha_class: ""
          min: "-10500"
          max: "10500"
          source: "Kia Soul EV VMCU CSV (Motor Actual Speed RPM) + physical validation"
          source_links: []
          verified: true
          notes: >
            Signed 16-bit big-endian at B10:B11 (ISO-TP 0x07:0x08). 2026-07-20: verified against
            VCU vehicle speed across 179 driving samples — rpm/speed ratio = 62.8 (median), matching the
            physical single-speed reduction (gear 7.412 × 205/55R16 tyre ≈ 61.8 rpm per km/h). Reads 0 at
            park (live READY capture) and peaks ~6650 at 107 km/h; slightly negative during regen/rock-back.
            Old expr ((S7<<8)|B6) read B6/B7 (0xFF 0xFF) = -1 — wrong bytes.

        MCU_MOTOR_TORQUE:
          expression: "[S12:S13]/100"
          unit: Nm
          ha_class: ""
          min: "-300"
          max: "300"
          source: "ITStromer community PID sheet (Motor Torque Command / Estimated Torque)"
          source_links: []
          verified: false
          notes: >
            Motor torque, signed 16-bit big-endian at B12:B13 (ISO-TP 0x09:0x0A), the pair right after
            MCU_MOTOR_RPM [S10:S11]. 2026-07-20 fix: previous ((S12*256)+B11)/10 reused B11 (the RPM low
            byte) and its ÷10 scale gave ±3226 Nm across all captures — 10× the motor's ~295 Nm limit.
            [S12:S13]/100 reads −249..+324 Nm (cruise small +ve, hard accel ~+300, regen ~−250) — physical.
            Scale/bytes inferred from range; not yet correlated with pedal/accel, so still unverified.
            2026-07-23 cross-signal analysis (canair decode --corr): r=+0.600 vs d(MCU_MOTOR_RPM)/dt over 477
            driving captures — torque tracks angular acceleration (τ≈J·dω/dt), the expected physical relation,
            corroborating this as a genuine torque byte. Full verification still needs a pedal-synced drive.

        MCU_MOTOR_TORQUE_2:
          expression: "[S14:S15]/100"
          unit: Nm
          ha_class: ""
          min: "-300"
          max: "300"
          enabled: false
          source: "Kia Soul EV VMCU CSV (Torque Command vs Estimated Torque — two signed-16 torque fields)"
          source_links: []
          verified: false
          notes: >
            UNVERIFIED CANDIDATE. Second signed-16-bit big-endian pair at B14:B15 (ISO-TP 0x0B:0x0C), immediately after MCU_MOTOR_TORQUE [S12:S13]. The Soul VMCU exposes BOTH a Motor Torque Command AND an Estimated Motor Torque as separate signed-16 fields; [S12:S13] and [S14:S15] are the two zero/near-zero-at-park pairs here. 2026-07-23 cross-signal analysis (canair decode --corr): r=+0.969 vs MCU_MOTOR_TORQUE and r=+0.566 vs d(MCU_MOTOR_RPM)/dt over 477 driving captures (torque tracks angular acceleration, physically correct; the near-but-not-unity coupling to [S12:S13] is consistent with command-vs-estimated). Park ~0.27-0.40 Nm idle bias. Which is command vs estimated (and exact scale) still unconfirmed - kept enabled:false until a pedal-synced drive resolves command vs estimated and pins the scale.
        MCU_PHASE_CURRENT_RMS:
          expression: "[B17:B18]/10"
          unit: A
          ha_class: current
          min: "0"
          max: "600"
          enabled: false
          source: "Kia Soul EV VMCU CSV (Motor Phase Current RMS = Int16, 0..5000)"
          source_links: []
          verified: false
          notes: >
            UNVERIFIED CANDIDATE (Phase 1, 2026-07-20) — needs Phase 2 validation. Unsigned 16-bit
            big-endian at B17:B18 (ISO-TP 0x0D:0x0E). Always ≥0 (0..2069 raw), reads ~0 at park and rises
            with acceleration (r=+0.44 vs dRPM across 255 driving samples) — the classic phase-current RMS
            signature. Matches the Soul VMCU "Motor Phase Current RMS" field. The /10 scale (→ 0..~207 A) is
            a guess to land in a plausible range for a ~120 kW motor; raw 2069 as amps would be too high.
            Scale and exact bytes need confirmation against torque/accel under load — enabled:false meanwhile.

        MCU_TEMP_1:
          expression: "S20"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "150"
          source: "ITStromer community PID sheet (temp?)"
          verified: false
          notes: >
            Candidate motor/inverter temperature (community sheet 'temp?', Signed byte). 2026-07-20: reads
            13°C at park (~ambient 18°C, cold-soaked), 10-22°C range — plausible but barely warmed on a short
            cool drive. ISO-TP 0x10.
            2026-07-23 (477 driving samples): genuine slow temperature — r=-0.10 vs |torque|,
            autocorrelation 0.933, step 0.13/sample. Per-state: hottest charging (mean 22.0,
            motor idle), 11.6 parked, 13.8 driving → heats with inverter/charger power stage.
            Likely inverter/power-module (heatsink or coolant) temp. Slow temps are B20 (here)
            and B18 (MCU_TEMP_3); B19/B21 are load-tracking, not temps.

        MCU_TEMP_2:
          expression: "B21"
          unit: ""
          ha_class: ""
          min: "0"
          max: "255"
          enabled: false
          source: "RE 2026-07-23 load-vs-temp classification (driving captures)"
          verified: false
          notes: >
            Reclassified 2026-07-23 — not a temperature. Raw byte B21 (ISO-TP 0x11). Over 477
            driving samples it tracks load: r=+0.875 vs |torque|, r=+0.859 vs phase current
            ([B17:B18]), r(Δbyte,Δ|torque|)=+0.90 — steps within one 5s sample (phaseI 786→19 A
            drops B21 22→17 next frame). Autocorrelation 0.49 → fast, not thermal. Likely inverter
            load/current scalar (2nd phase-current or modulation-depth/power); small cold-park
            baseline ~12.6. Kept enabled:false pending scale + quantity.
        MCU_INVERTER_TEMP:
          expression: B19
          unit: °C
          min: "-40"
          max: "150"
          enabled: false
          source: RE 2026-07-22 MT->KW drive analysis; revised 2026-07-23 (full driving corpus)
          verified: false
          notes: >
            Ambiguous (revised 2026-07-23). Raw byte B19 (ISO-TP 0x0F), between
            MCU_PHASE_CURRENT_RMS ([B17:B18]) and MCU_TEMP_1 (B20). The 2026-07-22 single-drive
            read called it a slow inverter temp, but the 477-sample corpus shows it also tracks
            load: r=+0.456 vs |torque|, r(Δbyte,Δ|torque|)=+0.79 (mean |Δ|=1.87/sample), unlike
            the genuine temps B18/B20 (r(Δ,Δload)≈0, |Δ|≈0.1). Keeps a temp-like baseline:
            parked 8.7, charging 20.1, driving 21.2. Either an IGBT junction-temp estimate (low
            die thermal mass) or a current-derived quantity. enabled:false pending scan-tool
            cross-check. Slow temps are B20 and B18 (MCU_TEMP_3).
        MCU_ROTOR_ANGLE:
          expression: B9
          unit: ""
          min: "0"
          max: "255"
          source: RE 2026-07-22 MT->KW drive analysis
          verified: false
          notes: >
            Candidate, unverified — raw byte B9 (ISO-TP 0x06), before MCU_MOTOR_RPM (B10:B11).
            Likely motor rotor/resolver electrical angle (0-255 = 0-360°, B9*360/255) or the
            fractional low byte of motor speed. B9==0 at all 18 standstill (RPM=0) samples,
            spreads ~uniformly 26-253 (mean 127) when |RPM|>500 — aliased fast-rotating quantity
            at 2s intervals. Kept raw until a high-rate capture at fixed low RPM shows linear ramp
            (angle) vs uniform (speed fraction). |RPM| corr 0.42 is the shared zero-anchor.
        MCU_TEMP_3:
          expression: S18
          unit: °C
          min: "-40"
          max: "150"
          source: RE 2026-07-23 load-vs-temp classification (driving+charging captures)
          verified: false
          notes: >
            Temperature candidate at B18 (ISO-TP 0x0E), between MCU_PHASE_CURRENT_RMS ([B17:B18])
            and MCU_INVERTER_TEMP (B19). Slow temperature by dynamics (477 driving samples): r=+0.06
            vs phase current, +0.06 vs |torque|, autocorrelation 0.975, step 0.11/sample. Per-state:
            parked 5.4, charging 8.0 (motor idle), driving 16.3. Raw = °C (cold-park ≈ ambient).
            Likely motor winding/stator or coolant-inlet temp. Verify: scan-tool motor temp + long warm drive.

    2103:
      status: draft
      period: 0
      vehicle_states:
        - charging
      notes: >
        27 bytes, all zeros during AC charging.
        Raw payload: 610300000000000000000000000000000000000000000000000000
        May contain data during driving. Discovered 2026-04-18.
      parameters: {}

    21F2:
      status: static
      period: 0
      vehicle_states:
        - charging
      notes: >
        69 bytes. Discovered during charging PID scan (2026-04-18).
        Raw payload: 61F2FFFFFF3FF6FFF8FF7DD60900000000000000000003050000EE04CDABC2CD4C00F0F32B002A041D002900000012000F001100C1CD967393222D4548454C2D4D53320000
        Undecoded — needs analysis.
        2026-07-19: Contains a part of the ECU sw_id string ("-EHEL-MS2"), so likely to be static.
      parameters: {}
  research:
    - type: decode
      target: "2102"
      status: captured
      priority: P1
      vehicle_states:
        - charging
      notes: >
        62 bytes. 2026-07-20 (Phase 1): MOTOR_RPM verified at [S10:S11]. Added UNVERIFIED candidates from
        variance + park/drive + dRPM-correlation over 332 captures: MCU_MOTOR_TORQUE_2 [S14:S15]/100 (second
        signed-16 torque, ≈0 at park), MCU_PHASE_CURRENT_RMS [B17:B18]/10 (always ≥0, r=+0.44 vs dRPM). Temps
        B20/B21 still barely-warmed candidates. Calibration block B27–B33 documented as static (resolver +
        U/V phase offsets). STILL OPEN (Phase 2): confirm which torque is command vs estimated, phase-current
        scale, disambiguate the 3rd temperature (B22/B25 track RPM, 52..248 raw — offset/scale unclear), and
        identify the highly-dynamic B52 (card=180). Needs a warm, dense, synced VCU+MCU drive capture.
      what_to_test:
        - "Torque: MCU_MOTOR_TORQUE [S12:S13] vs MCU_MOTOR_TORQUE_2 [S14:S15] — which is command vs estimated? Both ≈0 at park; correlate against pedal + dRPM incl. regen/braking (signed must go negative)."
        - "Phase current: [B17:B18] scale — /10→A guess; confirm 0 at park, rises with |torque|, peak vs motor spec."
        - "Temps: B20/B21 raw °C vs value−40; warm the inverter to separate motor/inverter/heat-sink. Check B22/B25 as a 3rd temp or a different quantity."
        - "B52 (TAQ, card=180) — identify this fast-changing signal."
        - >
          CAPTURE METHOD: WebSocket polling is sequential over one connection and the stored
          timestamp is per-cycle (not per-PID acquisition), so VCU 2101 and MCU 2102 are skewed
          ~0.3-3s and cannot be tightly synced across ECUs. Mitigation: poll ONLY the two PIDs,
          dense + back-to-back:  canair query "query VCU:2101" "query MCU:2102" --monitor 1
          --keep-all --save --wican vpn  (drive with hard launches, lift-off/regen, and braking;
          run long enough to warm the inverter for the temp mapping). NOTE: torque RPM are BOTH in
          MCU 2102, so torque needs no cross-ECU sync - just finer dRPM (dense sampling) + regen data.
      sources:
        - "Kia Soul EV VMCU CSV — RPM/torque (signed 16-bit), phase current + resolver offsets (Int16)"
        - "Obsidian: MCU.md"
    - type: decode
      target: "2101"
      status: captured
      priority: P1
      vehicle_states:
        - ready
      notes: >
        34 bytes. 2026-07-20: live READY capture at ~18°C ambient did NOT yield clean temps —
        candidate bytes are bimodal/constant (B10 = 4 or 56, B15 ≈ constant 57, B13 tight ~150),
        i.e. status/calibration, not motor/inverter/heat-sink temps. The July drive was short and cool,
        so components barely warmed. Re-attempt temp mapping (Soul motor/MCU/heat-sink = val-40) after a
        longer drive that heats the inverter, comparing cold-soak vs warm bytes. Also search for HV DC-link
        voltage here (VCU 2102 has B17*2; MCU may carry its own).
        2026-07-23: MCU_INVERTER_TEMP = B22 (raw = °C, no -40 offset). r=+0.84 vs MCU 2102
        motor RPM, confirmed thermal by state contrast: charging 16-26 °C (motor idle),
        READY parked 41-49, driving 7-104. Neighbour B25 thermal-ish but spikes to 249.
        Open: which temp (inverter/motor/heat-sink); pin B25; HV DC-link voltage not located.
      sources:
        - "Kia Soul EV VMCU CSV — temps (w/x/y - 40)"
        - "Obsidian: MCU.md"
        - "OBDb Ioniq 5 MCU 22E001"
    - type: decode
      target: "2103"
      status: captured
      priority: P2
      vehicle_states:
        - charging
      date: "2026-04-18"
      notes: "27 bytes, all zeros during charging. May contain data while driving."
    - type: decode
      target: "21F2"
      status: captured
      priority: P2
      vehicle_states:
        - charging
      date: "2026-04-18"
      notes: "69 bytes. Discovered during charging scan. Undecoded."
    - type: scan
      target: "22 E001-E010"
      status: done
      priority: P1
      vehicle_states:
        - acc
      date: "2026-07-22"
      notes: "Ioniq 5 cross-ref: E001 ignition voltage/motor RPM/torque/phase current/temps, E009 electric water pump/oil pump."
      result: >
        Re-scanned E001-E010 with ignition ON (battery 14.4V) 2026-07-22: all 16 -> NRC 0x12
        (subFunctionNotSupported), 0 timeouts (ECU alive, rejecting). CONFIRMED DEAD END: this
        KWP2000 MCU does not implement service-22 read-did with E0xx DIDs (a UDS-era Ioniq-5
        construct). Hidden MCU pages, if any, live in the service-21 (21xx) range, not 22 E0xx.
        Pivot: sweep 21 00-FF for undocumented pages instead.
      sources:
        - "OBDb Ioniq 5"
      updated: "2026-07-23"
    - type: iocontrol_scan
      target: "2F E000-E0FF"
      status: pending
      priority: P2
      vehicle_states:
        - acc
      notes: "MCU IOControl E0xx range."
    - type: scan
      target: 21 00-FF
      status: done
      priority: P2
      vehicle_states:
        - ready
      date: "2026-07-22"
      result: "Exhaustive service-21 LID sweep (ignition on): only 01/02/03/F2 respond (= known 2101/2102/2103/21F2), all 252 others NRC. No hidden pages. MCU service-21 space fully mapped."
      notes: Hidden-page hunt. Confirms the E0xx (service-22) dead end has no service-21 analogue beyond known pages.
    - type: decode
      target: "2102"
      status: captured
      priority: P2
      vehicle_states:
        - ready
      notes: "MCU 2102 B9 (ISO-TP 0x06, immediately before MCU_MOTOR_RPM B10:B11) = candidate motor rotor/resolver electrical ANGLE or motor-speed sub-count/fraction. Signature from 2026-07-22 drive: B9==0 at ALL 18 standstill (RPM=0) samples, and spreads ~uniformly 26-253 (mean 127~=255/2) whenever |RPM|>500 — the classic aliased-angle pattern for a fast-rotating quantity sampled at asynchronous 2s intervals. Weak |RPM| corr (0.42) is just the shared zero-anchor. Cannot distinguish absolute rotor angle (0-255 = 0-360 elec deg) vs RPM fractional low byte without high-rate capture. TO TEST: log B9 with 1001-style fast polling or a SavvyCAN sniff at fixed low RPM to see if it ramps linearly (angle) or stays uniform (fraction)."
    - type: decode
      target: "2102"
      status: done
      priority: P3
      vehicle_states:
        - ready
      notes: MCU 2102 B52/B53 tail bytes = message alive-counter / checksum, NOT a physical signal. B52 (ISO-TP 0x2E) is chaotic full-range 0-253 with ZERO correlation to RPM/torque/phase-current (r~0.01); B53 sits ~constant 0x31-0x33. Ruled out as a signal during 2026-07-22 drive analysis — do not chase. The remaining B27-B47 block is the known static calibration region (constant across the drive).
    - type: decode
      target: "2102"
      status: captured
      priority: P2
      vehicle_states: [ready]
      created: "2026-07-23"
      updated: "2026-07-23"
      notes: "2026-07-23 (574 caps): B18-B21 cluster split. B20=MCU_TEMP_1, B18=MCU_TEMP_3 are slow temps (load-decoupled, autocorr>0.93); B20 hottest charging (inverter/power-stage), B18 warms with driving (motor/coolant). B21 (was MCU_TEMP_2) and B19 (was MCU_INVERTER_TEMP) are load-tracking (r(Δbyte,Δ|tq|)=0.90/0.79), not temps; both enabled:false. Open: (1) B19 junction-temp estimate vs current (needs scan-tool inverter/junction temp); (2) B21 scale + load quantity (2nd phase current / modulation depth / power); (3) verify B18/B20 vs scan-tool temps on a long warm drive; (4) B22:B23=0xF7FF/F8FF near-constant, likely status/cal. Method: sustained hard drive + hill climb to separate junction (fast) from heatsink (slow); cross-check scan tool."
    - type: verify
      target: "2102"
      status: pending
      priority: P2
      vehicle_states: [ready]
      created: "2026-07-23"
      updated: "2026-07-23"
      notes: "Verify MCU_MOTOR_TORQUE [S12:S13]/100 and MCU_MOTOR_TORQUE_2 [S14:S15]/100 (command vs estimated) with a PEDAL-SYNCED drive co-polling VCU 2101 (ACCEL_PEDAL_DEPTH). 2026-07-23 cross-signal evidence: TORQUE r=+0.60 and TORQUE_2 r=+0.57 vs d(MCU_MOTOR_RPM)/dt; TORQUE<->TORQUE_2 r=+0.969 (coupled but distinct). Needed to confirm which field is command vs estimated, pin the /100 scale, and enable TORQUE_2. Hard accel + strong regen events required (this drive was gentle, only reached -10..+18 Nm)."

  sessions:
    "81":
      name: "standardDiagnosticSession"
      supported: true
    "82":
      name: "periodicDiagnosticSession"
      supported: false
      nrc: 0x12
      nrc_desc: "subFunctionNotSupported"
    "83":
      name: "extendedDiagnosticSession"
      supported: false
      nrc: 0x12
      nrc_desc: "subFunctionNotSupported"
