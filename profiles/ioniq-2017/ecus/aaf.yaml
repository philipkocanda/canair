# ─── AAF (Active Air Flap controller) ────────────────────────────────
#
AAF:
  tx_id: 0x7E6
  identity:
    description: Active Air Flap controller
    part_number: M3062000307  # KWP2000 1A91
    sw_id: EAE16AAFB30001  # KWP2000 1A8D — "AAF" is the Hyundai internal module code
    firmware: EAEAAFP201  # KWP2000 1A98 — "AAF" is the Hyundai internal module code
    id_protocol: KWP2000  # 1Axx
    notes: >
      Active Air Flap (AAF) controller — confirmed by the "AAF" module code in its
      sw_id (EAE16AAFB30001) and firmware (EAEAAFP201). Located in the front bumper, behind the grille.
      Also connected physically to the car's radiator, which cools the powertrain (inverter, motor, etc.).
  vehicle_states:
    - ready
    - charging
  pids:
    2180:
      status: active
      period: 10000
      vehicle_states:
        - ready
        - charging
      parameters:
        AMBIENT_TEMP:
          expression: "(B18-80)/2"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "87"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: >
            Outside/ambient air temp. Cross-validated vs ITStromer community sheet known-temp rows:
            10°C→9, 0°C→0.5, 14°C→14. ISO-TP 0x0E (Torque M).

        HEATER_ELEMENT_TEMP:
          expression: "S17/2"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "120"
          source: "ITStromer community PID sheet (heating element = signed(l)/2)"
          source_links: []
          verified: false
          notes: >
            PTC/heater element temperature. 2026-07-20: from community sheet (signed(l)/2 = signed(B17)/2).
            Tracks heat setting in the sheet's rows: 8°C (heat set 15.5°C) → 27°C (heat set 30°C); ~19°C with
            heat off (≈ambient). Live ACC2 (heat off) = 19°C. ISO-TP 0x0D (Torque L).

        HEATSINK_TEMP:
          expression: "B20-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "150"
          source: "ITStromer community PID sheet (VMCU heat sink = o-40)"
          source_links: []
          verified: false
          notes: >
            EPCU/power-electronics heat-sink temperature (0x7E6 appears to be an EPCU/climate thermal node,
            not just ambient). 2026-07-20: from community sheet (o-40 = B20-40). Live ACC2 reading was 42°C
            right after a charge finished — consistent with OBC/inverter warmth cooling down. ISO-TP 0x10.

        COMPRESSOR_TEMP:
          expression: "B21-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "120"
          source: "ITStromer community PID sheet (compressor = p-40)"
          source_links: []
          verified: false
          notes: >
            A/C compressor temperature. 2026-07-20: from community sheet (p-40 = B21-40). Reads ≈ambient with
            AC off (live ACC2 = 19°C). Needs an AC-on capture to confirm behaviour. ISO-TP 0x11.

        AAF_AUX_BATTERY_VOLTAGE:
          expression: B25/10
          unit: V
          min: "0"
          max: "16"
          source: canair correlate 2026-07-22 drive
          verified: false
          notes: >
            Aux 12V battery voltage. B25/10 = 12.9-15.2 V (mean 13.4), r=+0.995 vs VCU:2102 VCU_AUX_BATTERY_VOLTAGE over 61 co-polled pts. CORRECTS an earlier guess that B25 was a (x-80)/2 temperature — it is the 12V rail voltage, /10 V/LSB.
    2181:
      status: draft
      period: 0
      vehicle_states:
        - charging
      parameters:
        AAF_2181_UNKNOWN:
          expression: ""
          unit: ""
          source: "DID scan 2026-04-17"
          source_links: []
          verified: false
          notes: >
            27 bytes, same layout as 2180 but a richer variant (available in ACC2). 2026-07-20 live: identical
            to 2180 for ambient (B18) and the temp bytes, but exposes extra non-zero bytes where 2180 has zeros
            (B19, B22, B23, B24 populated). Likely additional temps/status. Payload: 6181FFFFC0002229000000000026778F523B5A5A981306969600 00
        AAF_VEHICLE_SPEED_KMH:
          expression: B13
          unit: km/h
          min: "0"
          max: "250"
          source: cross-ECU correlation vs ESC REAL_SPEED_KMH, 2026-07-22 drive
          verified: false
          notes: >
            Speed km/h. r=0.997 vs ESC 22C101 REAL_SPEED_KMH (66 joined points,
            2026-07-22 drive; B13 ≈ ESC km/h, e.g. 40 vs 39, 25 vs 26). Companion
            B12 = MPH. Unverified: scale not checked at high speed.
          enabled: true
        AAF_VEHICLE_SPEED_MPH:
          expression: B12
          unit: mph
          min: "0"
          max: "160"
          source: cross-ECU correlation vs ESC REAL_SPEED_KMH, 2026-07-22 drive
          verified: false
          notes: >
            Speed MPH. r=0.997 vs ESC REAL_SPEED_KMH; slope 0.6244 raw/km/h ≈
            0.6214 km/h→mph, mean residual 0.14 mph. Companion B13 = km/h. Car
            reports MPH internally (cf. VCU 2101 speed).
          enabled: true
        AAF_AUX_BATTERY_VOLTAGE:
          expression: B25/10
          unit: V
          min: "0"
          max: "16"
          source: canair correlate 2026-07-22 drive
          verified: false
          notes: >
            Aux 12V battery voltage. B25/10 = 12.9-15.2 V (mean 13.4), r=+0.995 vs VCU:2102 VCU_AUX_BATTERY_VOLTAGE over 61 co-polled pts. CORRECTS an earlier guess that B25 was a (x-80)/2 temperature — it is the 12V rail voltage, /10 V/LSB.
        HEATSINK_TEMP:
          expression: B20-40
          unit: °C
          min: "-40"
          max: "150"
          source: canair correlate 2026-07-22 drive
          verified: false
          notes: >
            Inverter heat-sink temperature, mirrors AAF 2180 HEATSINK_TEMP (B20-40). r=+0.987 vs MCU:2102 MCU_INVERTER_TEMP over 61 co-polled driving pts — the AAF (HVAC/thermal ECU) exposes the powertrain-cooling-loop temps.
        MOTOR_COOLANT_TEMP:
          expression: B22-40
          unit: °C
          min: "-40"
          max: "150"
          source: canair correlate 2026-07-22 drive
          verified: false
          notes: >
            Candidate motor/coolant temperature. B22-40, r=+0.958 vs MCU:2102 MCU_TEMP_2 over 61 co-polled driving pts. Distinct from the heat-sink temp (B20); likely the second powertrain-cooling temp the AAF thermal ECU monitors.

  research:
    - type: scan
      target: 21 00-FF
      status: done
      priority: P3
      vehicle_states:
        - ready
      date: "2026-07-22"
      result: "Exhaustive service-21 LID sweep (ignition on): only 80/81 respond (= known 2180/2181), all 254 others NRC. Confirms AAF lives in the 0x80 page range (not 0x01); no hidden pages. Fully mapped."
      notes: Hidden-page hunt 2026-07-22 (KWP2000 completion).
    - type: decode
      target: 2180/2181 thermal bytes
      status: captured
      priority: P2
      vehicle_states: [ready]
      created: "2026-07-23"
      updated: "2026-07-23"
      notes: "Speed bytes decoded (2181 B12=MPH, B13=km/h; r=0.997 vs ESC). Identity docs list ambient/heater-element/heat-sink/compressor temps on 2180/2181; temp bytes not yet located. Existing captures don't overlap HVAC 220100 AAT with timestamped AAF reads. Method: co-poll 'query HVAC:220100' 'query AAF:2180' 'query AAF:2181' over a temperature-varying window; correlate AAF bytes vs HVAC_AAT."
    - type: decode
      target: "2180"
      status: done
      priority: P3
      vehicle_states: [ready]
      created: "2026-07-23"
      updated: "2026-07-23"
      notes: "AAF 2180 has two more varying bytes beyond the 4 defined temps: B25 (raw 129-152) and B28==B29 (mirror pair, raw 141-152). Both plausibly temperatures at the same (x-80)/2 scale AMBIENT_TEMP uses on B18: B25->24.5-36C, B28->30.5-36C. Only 77 captures in a narrow ambient band and B25 does NOT track AMBIENT_TEMP (r=0.26), so it is a distinct signal (evaporator / in-car / coolant?). Needs a wide-thermal-range capture (cold morning + hot cabin + A/C on) with a temp anchor to assign. B28==B29 exact mirror suggests a duplicated/unit-variant temp."
    - type: decode
      target: 2180 B28/B29 mirror
      status: captured
      priority: P3
      vehicle_states: [ready]
      created: "2026-07-23"
      updated: "2026-07-23"
      notes: "AAF 2180 B25 RESOLVED = AAF_AUX_BATTERY_VOLTAGE (B25/10, r=0.995 vs VCU aux) — was mis-guessed as a temp. Renamed from AUX_BATTERY_VOLTAGE to AAF_AUX_BATTERY_VOLTAGE 2026-07-24 to avoid a shipped-signal-name collision with BMS 2101 AUX_BATTERY_VOLTAGE. Remaining: B28==B29 mirror pair (raw 141-152, distinct=3 among timed caps) still undecoded; near-constant, not a temp (doesn't track ambient). Low priority; needs a wider-range capture."
