# ─── AAF (Active Air Flaps controller) ────────────────────────────────
#
# Confirmed as the Active Air Flaps controller via the "AAF" module code in its sw_id
# (EAE16AAFB30001) and firmware (EAEAAFP201). This resolves the long-standing puzzle of
# why 0x7E6 looked like a dedicated ECU "just for ambient temperature": it isn't — it's the
# air-flap controller that also happens to expose several thermal readings (ambient, heater
# element, heat sink, compressor) via PID 2180/2181, which is the one set of values community
# projects bothered to document. The Renesas M306 MCU makes sense for an actuator controller.
# Does not wake from CAN bus activity — requires ACC power like other powertrain ECUs.
#
AAF:
  tx_id: 0x7E6
  identity:
    description: Active Air Flap controller
    part_number: M3062000307  # KWP2000 1A91
    sw_id: EAE16AAFB30001  # KWP2000 1A8D — "AAF" is the Hyundai internal module code
    firmware: EAEAAFP201  # KWP2000 1A98 — "AAF" is the Hyundai internal module code
    id_protocol: KWP2000  # 1Axx
    notes: >
      Active Air Flap (AAF) controller — confirmed by the "AAF" module code in its
      sw_id (EAE16AAFB30001) and firmware (EAEAAFP201). Also exposes several thermal
      readings via PID 2180/2181 (ambient temp, heater element, heat sink, compressor),
      which is why community projects (OVMS, pioniq, EVNotiPi, JejuSoul) use this address
      for external temp.
  vehicle_states:
    - ready
    - charging
  pids:
    2180:
      status: active
      period: 10000
      vehicle_states:
        - ready
        - charging
      parameters:
        AMBIENT_TEMP:
          expression: "(B18-80)/2"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "87"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: >
            Outside/ambient air temp. Cross-validated vs ITStromer community sheet known-temp rows:
            10°C→9, 0°C→0.5, 14°C→14. ISO-TP 0x0E (Torque M).

        HEATER_ELEMENT_TEMP:
          expression: "S17/2"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "120"
          source: "ITStromer community PID sheet (heating element = signed(l)/2)"
          source_links: []
          verified: false
          notes: >
            PTC/heater element temperature. 2026-07-20: from community sheet (signed(l)/2 = signed(B17)/2).
            Tracks heat setting in the sheet's rows: 8°C (heat set 15.5°C) → 27°C (heat set 30°C); ~19°C with
            heat off (≈ambient). Live ACC2 (heat off) = 19°C. ISO-TP 0x0D (Torque L).

        HEATSINK_TEMP:
          expression: "B20-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "150"
          source: "ITStromer community PID sheet (VMCU heat sink = o-40)"
          source_links: []
          verified: false
          notes: >
            EPCU/power-electronics heat-sink temperature (0x7E6 appears to be an EPCU/climate thermal node,
            not just ambient). 2026-07-20: from community sheet (o-40 = B20-40). Live ACC2 reading was 42°C
            right after a charge finished — consistent with OBC/inverter warmth cooling down. ISO-TP 0x10.

        COMPRESSOR_TEMP:
          expression: "B21-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "120"
          source: "ITStromer community PID sheet (compressor = p-40)"
          source_links: []
          verified: false
          notes: >
            A/C compressor temperature. 2026-07-20: from community sheet (p-40 = B21-40). Reads ≈ambient with
            AC off (live ACC2 = 19°C). Needs an AC-on capture to confirm behaviour. ISO-TP 0x11.
    2181:
      status: draft
      period: 0
      vehicle_states:
        - charging
      parameters:
        AAF_2181_UNKNOWN:
          expression: ""
          unit: ""
          source: "DID scan 2026-04-17"
          source_links: []
          verified: false
          notes: >
            27 bytes, same layout as 2180 but a richer variant (available in ACC2). 2026-07-20 live: identical
            to 2180 for ambient (B18) and the temp bytes, but exposes extra non-zero bytes where 2180 has zeros
            (B19, B22, B23, B24 populated). Likely additional temps/status. Payload: 6181FFFFC0002229000000000026778F523B5A5A981306969600 00
        AAF_VEHICLE_SPEED_KMH:
          expression: B13
          unit: km/h
          min: "0"
          max: "250"
          source: cross-ECU correlation vs ESC REAL_SPEED_KMH, 2026-07-22 drive
          verified: false
          notes: >
            Vehicle speed in km/h. Discovered by cross-ECU correlation: r=0.997 vs ESC 22C101 REAL_SPEED_KMH across 66 joined points on the 2026-07-22 drive (B13 ~= ESC km/h directly: 40vs39, 25vs26). AAF (Active Air Flap) needs road speed for aero-flap control. Companion B12 = same speed in MPH. Verified-grade correlation; marked unverified pending a scale sanity-check at higher speed.
          enabled: true
        AAF_VEHICLE_SPEED_MPH:
          expression: B12
          unit: mph
          min: "0"
          max: "160"
          source: cross-ECU correlation vs ESC REAL_SPEED_KMH, 2026-07-22 drive
          verified: false
          notes: >
            Vehicle speed in MPH. Cross-ECU correlation r=0.997 vs ESC REAL_SPEED_KMH; slope 0.6244 (raw/kmh) matches the 0.6214 km/h->mph factor, mean residual 0.14 mph. Companion B13 = same speed in km/h. This car reports MPH internally (matches the VCU 2101 MPH speed finding).
          enabled: true

  research:
    - type: scan
      target: 21 00-FF
      status: done
      priority: P3
      vehicle_states:
        - ready
      date: "2026-07-22"
      result: "Exhaustive service-21 LID sweep (ignition on): only 80/81 respond (= known 2180/2181), all 254 others NRC. Confirms AAF lives in the 0x80 page range (not 0x01); no hidden pages. Fully mapped."
      notes: Hidden-page hunt 2026-07-22 (KWP2000 completion).
    - type: decode
      target: 2180/2181 thermal bytes
      status: captured
      priority: P2
      vehicle_states: [ready]
      created: "2026-07-23"
      updated: "2026-07-23"
      notes: "AAF (Active Air Flap) identity docs say it exposes ambient/heater-element/heat-sink/compressor temps via 2180/2181 (community projects read external temp here). Speed bytes now decoded (2181 B12=MPH, B13=km/h via cross-ECU corr r=0.997 vs ESC). REMAINING: identify the temp bytes — needs an HVAC(ambient)+AAF co-polled session for a cross-ECU temperature correlation (current captures don't overlap HVAC 220100 AAT with timestamped AAF reads). Method: poll 'query HVAC:220100' 'query AAF:2180' 'query AAF:2181' together over a temperature-varying window, then correlate AAF bytes vs HVAC_AAT."
