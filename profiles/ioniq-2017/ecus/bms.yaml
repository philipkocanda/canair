          max: ""
          source: "AutoPID config (on device); bitfield decoded via ITStromer community sheet + ioniq-ev-bms xls"
          source_links: []
          verified: true
          notes: >
            BMS charging/relay state bitfield. 2026-07-20: decoded via the ITStromer community 2101 sheet
            (byte 'j' = "Charging Indicators") + our captures. Observed values: 0x03 (READY, not charging),
            0xA3 (AC charging), 0x45 (CCS/DC). Bits:
            b0=Main Relay ON (BMS_MAIN_RELAY; set in all responsive states),
            b1=? (set in ready + AC charge, clear in DC),
            b2=? (set in DC/CCS only — likely rapid-charge mode),
            b3/b4=? (unobserved),
            b5=J1772/AC plug connected (CHARGER_CONNECTED),
            b6=CCS/DC plug connected (CHARGING_DC),
            b7=Charging active (CHARGING).

