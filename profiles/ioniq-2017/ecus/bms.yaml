    21F2:
      status: static
      period: 0
      vehicle_states:
        - ready
      notes: |
        BMS identity / calibration block — 121 data bytes (123 incl. 61 F2 header), STATIC.
        Discovered via the 21 00-FF hidden-page sweep (2026-07-22); the only BMS service-21
        page outside 2101-2105. Confirmed static: 4 reads at ignition-on 2026-07-22 were
        byte-identical (no counters/timestamps/live signals) -> identity/calibration data,
        NOT live telemetry, so enabled:false (do not poll — wastes bus time).

        Field map (WiCAN Bnn; PCI bytes at B00/08/16/24/... are excluded by the notation):
          B09:B12   = 34 30 36 34  "4064" ASCII — software/calibration identifier.
                      CONFIRMED: same digits as KWP2000 identity 1A8D "4604" (34 36 30 34),
                      with the middle byte-pair swapped. Cross-referenced via `canair identity BMS`.
          B121:B124 = 4E 37 49 5A  "N7IZ" ASCII — hardware/lot code; absent from the 1Axx
                      identity set, so exposed only on this page.
          FF-separators (typical Hyundai/Kia identity padding): B04:B07, B59:B62, B127:B131.
          Candidate 16-bit BE constants (PCI-safe, UNVALIDATED — most likely static cal limits):
            B36:B37   = 0x0BB8 (3000)   # == 2101 ISOLATION_RESISTANCE nominal 3000 kOhm
            B43:B44   = 0x0174 (372)    B45:B46 = 0x0162 (354)   # pair; /100 = 3.72 / 3.54 V (cell-V cal points?)
            B68:B69   = 0x07DC (2012)
            B107:B108 = 0x02E6 (742)    B109:B110 = 0x02B5 (693)  # pair
            B132:B133 = 0x06E8 (1768)   B134:B135 = 0x018D (397)  # pair
        No parameters registered yet: the numeric fields need multi-state (sleep/charging/
        driving) contrast to classify constant-vs-dynamic before any are committed. See the
        21F2 decode research entry.
      parameters: {}
  research:
    - type: verify
      target: "2101 extended bytes"
      status: captured
      priority: P1
      vehicle_states:
        - ready
      notes: >
        2026-07-22 (READY, parked): BMS 2101 payload is 61-62 bytes (varies by state; a
        07-21 monitor run saw 62 B). The three "extended" params are NOT out of bounds —
        they decode within the payload: DRIVE_MOTOR_SPEED = 0 at park (plausible),
        ISOLATION_RESISTANCE = 3000 kOhm (plausible, healthy HV isolation). BUT
        INVERTER_CAPACITOR_VOLTAGE reads 0.10 V in READY, which is implausible — the
        inverter DC-link cap should sit near pack voltage (~388 V) once the main relay is
        closed (BMS_MAIN_RELAY=1). So its byte offset/scale is still wrong; the other two
        are single-point-plausible but need a moving capture (non-zero motor speed) to verify.
      what_to_test:
        - "INVERTER_CAPACITOR_VOLTAGE — 0.10 V at READY is wrong (expect ~pack V); find correct byte/scale"
        - "DRIVE_MOTOR_SPEED — 0 at park; confirm tracks motor RPM while driving (cross-check MCU 2102 [S10:S11])"
        - "ISOLATION_RESISTANCE — 3000 kOhm plausible; confirm it varies with HV state"
      sources:
        - "decode-captures.py output"
        - "captures/ — 2026-07-21 (62 B monitor), 2026-07-22 (READY parked)"
    - type: scan
      target: "22 BC01-BC0B"
      status: nrc
      priority: P2
      vehicle_states:
        - ready
        - charging
      notes: "ChatGPT-sourced: BC01 battery voltage, BC02 current, BC03 SoC, BC04 display SoC, BC05 charging status, BC06 temp, BC07 max cell V, BC08 min cell V, BC09 max/min cell temp, BC0A SoH, BC0B avg cell V."
      sources:
        - "ChatGPT"
    - type: scan
      target: "22 B002-B005"
      status: nrc
      priority: P3
      vehicle_states:
        - ready
        - charging
      notes: "ChatGPT-sourced: B002 max charge power, B003 max discharge power, B004 internal temp, B005 status flags."
      sources:
        - "ChatGPT"
    - type: scan
      target: "22 E003-E005"
      status: nrc
      priority: P2
      vehicle_states:
        - ready
        - charging
      notes: "E003 estimated range, E005 time to full charge (charging only)."
      sources:
        - "ChatGPT"
    - type: iocontrol_scan
      target: "30 00-FF"
      status: nrc
      priority: P1
      vehicle_states:
        - acc
      notes: >
        Looking for the battery fan / EWP control local identifier. The BMS is a
        KWP2000 ECU, so IOControl is service 0x30 InputOutputControlByLocalIdentifier
        (8-bit LID) — NOT UDS 0x2F. Scan safely with `canair iocontrol-scan BMS`
        (auto-selects 0x30, sends only IOCP 0x00 returnControlToECU — never actuates).
        Kingbolen scanner can actuate the fan from the BMS; find the LID here, then
