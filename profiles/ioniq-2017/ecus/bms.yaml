        CUMULATIVE_ENERGY_CHARGED:
          expression: "((B47<<24)|(B49<<16)|(B50<<8)|B51)/10"
          unit: kWh
          ha_class: energy
          min: "0"
          max: ""
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "Lifetime cumulative. ECU reports in 0.1 kWh units, /10 gives kWh. Verified ~12274 kWh lifetime on 2017 Ioniq 28kWh."

        CUMULATIVE_ENERGY_DISCHARGED:
          expression: "((B52<<24)|(B53<<16)|(B54<<8)|B55)/10"
          unit: kWh
          ha_class: energy
          min: "0"
          max: ""
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "Lifetime cumulative. ECU reports in 0.1 kWh units, /10 gives kWh."

        CUMULATIVE_CURRENT_CHARGED:
          expression: "((B38<<24)|(B39<<16)|(B41<<8)|B42)/10"
          unit: Ah
          ha_class: ""
          min: "0"
          max: ""
          source: "ImHex pattern (u32 @ ISO-TP 0x20) — PCI-corrected"
          source_links: []
          verified: true
          notes: >
            32-bit at ISO-TP 0x20 = WiCAN B38,B39,B41,B42 (skips PCI byte B40). 2026-07-20 fix:
            the old ((B32<<24)|...) conflated ImHex/ISO-TP offset 0x20 with WiCAN B32 — but B32 is a
            PCI frame byte, giving ~61,700,000 Ah of garbage. Corrected bytes read ~34,000 Ah, consistent
            with CUMULATIVE_ENERGY_CHARGED (÷ pack voltage ≈ same Ah). Sits just before the energy u32s.

        CUMULATIVE_CURRENT_DISCHARGED:
          expression: "((B43<<24)|(B44<<16)|(B45<<8)|B46)/10"
          unit: Ah
          ha_class: ""
          min: "0"
          max: ""
          source: "ImHex pattern (u32 @ ISO-TP 0x24) — PCI-corrected"
          source_links: []
          verified: true
          notes: >
            32-bit at ISO-TP 0x24 = WiCAN B43,B44,B45,B46. 2026-07-20 fix: old ((B36<<24)|...) used the
            wrong (PCI-unaware) indices, giving ~917,000 Ah. Corrected reads ~34,000 Ah, consistent with
            CUMULATIVE_ENERGY_DISCHARGED.

        OPERATING_TIME:
          expression: "[B57:B60]/3600"
          unit: "h"
          ha_class: duration
          min: "0"
          max: "1000000"
          source: "CSS Electronics DBC (OperatingTime m257 : 399|32@0+, scale 1/3600) + live verification"
          source_links:
            - "CSS Electronics/ev-data-pack-v10/electric_cars/dbc_files/can1-hyundai-kia-uds-v2.4.dbc"
          verified: true
          notes: "32-bit unsigned, ISO-TP bytes 48-51 (WiCAN B57-B60). Raw value is seconds, /3600 converts to hours. Live-verified 2026-04-14: 5902h. Was B57 (single byte = MSB of u32, always 0x01 = 1)."

