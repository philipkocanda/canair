# ─── BMS (Battery Management System) ─────────────────────────────────
#
# KWP2000 diagnostic sessions (service 0x10) — probed 2026-07-22, car in READY:
# see the structured `sessions:` field at the end of this ECU block.
# Only 0x81 (standardDiagnosticSession) is accepted; 21xx live-data reads work
# in the default session anyway — no session unlocks extra data. Payload sizes
# are identical across sessions: 2101=61B, 2102=38B, 2103=38B, 2104=38B, 2105=45B.
BMS:
  tx_id: 0x7E4
  identity:
    description: Battery Management System
    ecu_id: "AEEV__ BMS"  # KWP2000 1A90
    fw_version: "VER.2.3"  # KWP2000 1A91
    sw_id: CGBMSE305AE1000A  # KWP2000 1A8C
    calibration: "4604"  # KWP2000 1A8D
    id_protocol: KWP2000  # 1Axx
    notes: "1A80 firmware build date 2008-07-09 (likely platform date, not unit manufacture)"
  vehicle_states:
    - ready
    - charging
  pids:
    2101:
      status: active
      period: 2500
      vehicle_states:
        - ready
        - charging
      parameters:
        SOC_BMS:
          expression: "B09/2"
          unit: "%"
          ha_class: battery
          min: "0"
          max: "100"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "BMS state of charge (raw, not display-adjusted)"

        BATTERY_POWER:
          expression: "(([B18:B19]/10) * (((S15 << 8) | S17)/10)) / 1000"
          unit: kW
          ha_class: power
          min: ""
          max: ""
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "Computed from voltage * current. Negative = charging."

        BATTERY_VOLTAGE:
          expression: "[B18:B19]/10"
          unit: V
          ha_class: voltage
          min: "0"
          max: ""
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: ""

        BATTERY_CURRENT:
          expression: "((S15 << 8) | S17)/10"
          unit: A
          ha_class: current
          min: "-200"
          max: "200"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "Signed — negative = charging"

        MAX_CELL_VOLTAGE:
          expression: "B30*0.02"
          unit: V
          ha_class: voltage
          min: "0"
          max: "10"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: ""

        MIN_CELL_VOLTAGE:
          expression: "B33*0.02"
          unit: V
          ha_class: voltage
          min: "0"
          max: "10"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: ""

        AUX_BATTERY_VOLTAGE:
          expression: "B37*0.1"
          unit: V
          ha_class: voltage
          min: "0"
          max: "128"
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "12V auxiliary battery"

        BMS_MAIN_RELAY:
          expression: "B14:0"
          unit: ""
          ha_class: ""
          min: ""
          max: ""
          source: "ITStromer community sheet (j:0 = BMS Relay) + captures"
          source_links: []
          verified: true
          notes: "BMS main (HV) relay closed. 2026-07-20: set (1) in all responsive captures — READY, AC & DC charging."

        CHARGER_CONNECTED:
          expression: "B14:5"
          unit: ""
          ha_class: plug
          min: ""
          max: ""
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "J1772 / AC charge plug connected (bit5). 2026-07-20: set only during AC charging (0xA3), not DC (0x45)."

        CHARGING_DC:
          expression: "B14:6"
          unit: ""
          ha_class: plug
          min: ""
          max: ""
          source: "Original WiCAN config"
          source_links: []
          verified: true
          notes: "CCS / DC charge plug connected (bit6). 2026-07-20: set in the CCS/DC capture (0x45), clear on AC."

        CHARGING:
