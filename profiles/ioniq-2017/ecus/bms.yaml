          notes: >
            BMS state/status bitfield (was UNKNOWN_4). 2026-07-20: identified via research/ioniq-ev-bms-2101-2105.xls
            ("Bitfield? 41 when car off, 45 when car on"). Reads 0x29=41 in EVERY capture we have (ready, AC & DC/CCS
            charging, driving in the JejuSoul logs) — i.e. the "car off / charging" value; a car-on/driving 2105
            would be expected to read 0x2D=45 (bit2 set). Hypothesised bits (all unverified, xls marks them "?"):
            b0=Main Relay ON, b1=Controllable State, b2=Warning (set when car on?), b3=Fault, b4=Weld flag,
            b5=Normal Charge Port, b6=Rapid Charge Port, b7=Charging. NOTE: b7=Charging did NOT hold in our
            AC/DC charging captures (stayed 0), so the bit labels need verification. Capture a car-on driving 2105
            (expect 45) and a mid-charge 2105 to confirm the bits.

    # Cell voltage PIDs — 96 cells across 3 PIDs (32 each)
    # Format: B(6+n)*0.02 where n=cell index within PID (0-31)
    # Cells 1-32 in 2102, 33-64 in 2103, 65-96 in 2104
    # Only a subset are defined here; add more as needed.
    2102:
      status: draft
      period: 10000
      vehicle_states:
        - ready
        - charging
      parameters:
        CELL_01_VOLTAGE:
          expression: "B9*0.02"
          unit: V
          ha_class: voltage
          min: "0"
          max: "5"
          source: "ImHex pattern + raw capture verified"
          source_links: []
          verified: true
          notes: >
            First cell. 2026-07-20 FIX: cells start at B9 (after the 4-byte 0xFFFFFFFF cell-present header at
            B4-B7) and skip PCI bytes (B8/16/24/32/40). The old linear B(5+n) mapping was wrong on two counts:
            CELL_01/02 read the 0xFF header (5.10V) and CELL_03/11/19/27 landed on PCI bytes (0.66-0.72V).
            Correct WiCAN indices per in-PID cell (1..32): B9,10,11,12,13,14,15, B17,18,19,20,21,22,23,
            B25,26,27,28,29,30,31, B33,34,35,36,37,38,39, B41,42,43,44. Same layout for 2103 (33-64) and 2104 (65-96).
        CELL_02_VOLTAGE:
