# ─── IGPM (Integrated Gateway Power Module) ──────────────────────────
IGPM:
  tx_id: 0x770
  identity:
    description: Integrated Gateway & Power Module
    part_number: "91950G7510"
    mfg_date: "2017-06-06"
    hw_version: "100"
    sw_version: "109"
    boot_sw: "20"
    app_sw: "160205"
    id_protocol: UDS  # F1xx
    notes: >
      IGPM is the CAN gateway. OBD port connects directly to the IGPM, so all diagnostic requests are routed through it.
      It is also the main power distribution module, controlling ignition and accessory power to other ECUs.
  vehicle_states:
    - sleep
    - plugged
    - acc
    - acc2
    - ready
    - charging
  # WARM-UP: the first request to IGPM after it's been idle is slow and may
  # time out / return NO DATA on the first try; retry (or prime) and subsequent
  # reads are fast. This is the ECU waking, not a bad PID. See profile.yaml
  # (RECON GOTCHA). Observed here first during recon; likely affects most ECUs.
  #
  # UDS service-22 multi-DID batching: verified on-device 2026-07-21 — IGPM
  # answers `22 BC03 BC06` with `62BC03 <data> BC06 <data>` (BCM, by contrast,
  # rejects it with NRC 0x13). The monitor batches ≤3 known-length DIDs per
  # request and auto-falls back to single reads if a request is ever rejected.
  multi_did: true
  # NOTE: service-22 PID reads (22BC03/04/06 etc.) do NOT need an extended
  # diagnostic session. Verified 2026-07-21 on the live car (READY mode): a bare
  # ATSH770;ATFCSH770;22BC03 returned a valid 62BC03 payload with no 1003 sent,
  # reconfirmed after an 8s idle so the S3 timer had expired. The earlier
  # 2026-04-15 "1003 required for reads" note was wrong. IOControl (service 2F)
  # still requires 10 03 — that is handled per-command in the live query path,
  # not by this flag, so no session flag is set here.
  scan_log: # IGPM
    - service: 0x31
      range: "0000-FFFF"
      date: 2026-04-20
      hits: 0
      probes: 768  # cut off at 0x00FF — battery died
      vehicle_states:
        - sleep
      notes: >
        All NRC 0x12 (subFunctionNotSupported) — IGPM does not support sub-function 03
        (requestRoutineResults). Sub-function 01 (startRoutine) untested (unsafe to scan blindly).
  pids:
    22BC07:
      status: draft
      vehicle_states:
        - sleep
        - plugged
        - acc
        - acc2
        - ready
        - charging
      notes: >
        B12:
          0x11 (power off + not charging)
          0x18 (ACC2 + charge port unlocked)
          0x19 (ACC2 + charge port locked)
          0x10 (power off + charging)

        Sample (ACC2+charging): 62BC070841FBCC00801800.

      parameters:
        # TODO: All the other bytes on here!
        # Maybe window states?
        CHARGE_PORT_LOCK:
          expression: "B11:7"
          ha_class: lock
          verified: true
          notes: "1=locked, 0=unlocked. Verified 2026-07-18."

        CHARGE_PORT_LOCK_INV:
          expression: "B12:0"
          ha_class: lock
          verified: true
          notes: >
            0=locked, 1=unlocked. Verified 2026-07-18.
            Safety feedback of charge port lock?

        ACC2_RELATED:
          expression: "B12:3"
          verified: false
          notes: >
            1=ACC2, 0=all other modes. Verified 2026-07-18.

    22BC03:
      status: active
      period: 2500
      vehicle_states:
        - sleep
        - plugged
        - acc
        - acc2
        - ready
        - charging
      notes: >
        B10 cross-state observations (all doors closed):
          Deep sleep locked: 0x0A (00001010) — lock bits 1,3 set
          ACC locked: 0x20 (00100000) — bit 5 set, lock bits CLEAR
          ACC2+charging unlocked: 0x00 (00000000) — all clear
        Bit 5 correlates with ACC power, NOT driver door open as previously
        thought. Needs further investigation.
      parameters:
        # B10 = Doors and locks
        # B11 = Seatbelts
        # B12 = Lights
        # B13 =
        UNKNOWN_B10_6:
          expression: "B10:6"
          verified: false
          notes: >
            Bit flag likely, meaning unknown.
            maybe hood?

        DOOR_DRV_OPEN:
          expression: "B10:5"
          ha_class: door
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: >
            SUSPECT — may NOT be driver door open. B10:5 (0x20) was set during
            ACC mode with doors CLOSED (Apr 14), cleared in deep sleep locked
            (Apr 16, B10=0x0A) and ACC2+charging unlocked (Apr 19, B10=0x00).
            Pattern suggests bit 5 is an ACC power state flag, not door open.
            Original Apr 15 verification may have conflated ACC toggle with
            door open/close. Needs retesting: toggle door with ACC constantly on.

        DOOR_PAS_OPEN:
          expression: "B10:4"
          ha_class: door
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "Bit flag — 1=open. Verified 2026-04-15."

        DOOR_RL_OPEN:
          expression: "B10:0"
          ha_class: door
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "Bit flag — 1=open. Verified 2026-04-15."

        DOOR_RR_OPEN:
          expression: "B10:2"
          ha_class: door
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "Bit flag — 1=open. Verified 2026-04-15."

        TRUNK_OPEN:
          expression: "B10:7"
          ha_class: door
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "Bit flag — 1=open. Verified 2026-04-15."

        DRL:
          expression: "B12:2"
          ha_class: light
          source: "Decoded from live captures (2026-04-15)"
          source_links: []
          verified: true
          notes: "Daytime Running Lights. Bit flag — 1=on. On in all light modes (DRL, low beam, high beam). Verified 2026-04-15."

        TAIL_LIGHTS:
          expression: "B12:3"
          ha_class: light
          source: "Decoded from live captures (2026-04-15)"
          source_links: []
          verified: true
          notes: "Tail/position lights. Bit flag — 1=on. On in all light modes (DRL, low beam, high beam). Verified 2026-04-15."

        HIGH_BEAM:
          expression: "B12:4"
          ha_class: light
          source: "Decoded from live captures (2026-04-15)"
          source_links: []
          verified: true
          notes: "Bit flag — 1=on. Only set with high beams active. Niro PR had this on BC04 B13:4 — wrong for Ioniq. Verified 2026-04-15."

        LOW_BEAM:
          expression: "B12:5"
          ha_class: light
          source: "Decoded from live captures (2026-04-15)"
          source_links: []
          verified: true
          notes: "Low beam headlights. Bit flag — 1=on. Also set when high beams are on (both low+high active together). Verified 2026-04-15."

        ACC2_IGN_ON:
          expression: "B11:5"
          ha_class: power
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: >
            Renamed from IGNITION_ON — misleading because the ignition is NOT
            physically on. Activates at ACC2/IGN1 power state. Cannot distinguish
            ACC2 from Ready — both show bit=1. OFF and ACC1 both show bit=0.
            Fob-unlock does NOT set this bit (confirmed 2026-04-18 — B11 stays
            0x00 on fob unlock, the 0x2C seen was B12 lights). Also reads 1
            during ACC2+AC charging (2026-04-19). Verified 2026-04-15.

        IGPM_CONFIG_BYTE:
          expression: "B09"
          display: "f'0x{int(v):02X} {int(v):08b}'"
          ha_class: ""
          min: "0"
          max: "255"
          source: "Reverse engineered from cross-state comparison"
          source_links: []
          verified: true
          notes: >
            Static configuration/capability byte (IGPM BC03 WiCAN B09). Always 0x73
            (01110011) across all tested states: deep sleep, ACC, ready, locked,
            unlocked, key in, key out (16 captures 2026-04-14 to 2026-04-18).
            Originally misidentified as "POWER_MODE" — the changing byte was actually
            B10 (door lock bits). Likely a hardware revision or feature flag.
            Verified static 2026-04-18.

        SEATBELT_FL:
          expression: "B11:1"
          ha_class: ""
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "Driver seatbelt. 1=buckled, 0=unbuckled. Verified 2026-04-15."

        SEATBELT_FR:
          expression: "B11:2"
          ha_class: ""
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: false
          notes: "Passenger seatbelt. Not tested (no passenger available during verification session)."

        DOOR_LOCK_RL:
          expression: "B10:1"
          ha_class: lock
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "1=locked, 0=unlocked. Niro PR used inverted 1-B10:1 but Ioniq raw bit already has correct polarity. Verified 2026-04-15."

        DOOR_LOCK_RR:
          expression: "B10:3"
          ha_class: lock
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "1=locked, 0=unlocked. Niro PR used inverted 1-B10:3 but Ioniq raw bit already has correct polarity. Verified 2026-04-15."
        IGN_STATUS_MIRROR:
          expression: B11:6
          min: "0"
          max: "1"
          source: RE 2026-07-23 bit analysis (40 captures)
          verified: false
          notes: >
            B11 bit6 == ACC2_IGN_ON (B11:5) EXACTLY across all 40 captures (diff=0 constant). Redundant ignition/ACC2-on status bit. Disabled: no new info beyond ACC2_IGN_ON. Documents B11:6. Remaining B11 bits 0,2,3,4,7 and B12 bits 0,1,6,7 are constant-0 across all captures (never observed active - no data to decode). SEATBELT_FR (B11:2) also constant-0 (pax belt never buckled in captures). B5=FD B6=EE B7=3C constant config; B13=0x00 constant.
          enabled: false

    22BC04:
      status: active
      period: 2500
      vehicle_states:
        - sleep
        - plugged
        - acc
        - acc2
        - ready
        - charging
      parameters:
        # TODO: All the other bytes on here!
        # Maybe window states?
        DOOR_LOCK_FL:
          expression: "B10:3"
          ha_class: lock
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "1=locked, 0=unlocked. Verified 2026-04-15."

        DOOR_LOCK_FR:
          expression: "B10:2"
          ha_class: lock
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: true
          notes: "1=locked, 0=unlocked. Verified 2026-04-15."
        IGPM_BC04_B10_0:
          expression: B10:0
          min: "0"
          max: "1"
          source: RE 2026-07-23 bit analysis
          verified: false
          notes: >
            Toggling bit at B10 bit0 (door locks are bits 2,3). n=29, distinct=2. Unidentified body signal. B10 other active: bits 2,3 (locks, mapped). B12:5 (0x20) and B13:6 (0x42 vs 0x02) also toggle. B5=B5 B6=3F B7=F4 B9=EA constant config. Enabled unverified — correlate with body actions to identify.
          enabled: true

    22BC06:
      status: active
      period: 2500
      vehicle_states:
        - sleep
        - plugged
        - acc
        - acc2
        - ready
        - charging
      parameters:
        BRAKE_LIGHT:
          expression: "B10"
          ha_class: ""
          min: "0"
          max: "255"
          source: "Decoded from live captures (2026-04-15)"
          source_links: []
          verified: true
          notes: "Scalar value. 0x00=off, 0x2D=brake pressed. Ioniq 5 OBDb had this at B4 — wrong for Ioniq 2017. Actual position is B7 (data byte 4). Verified 2026-04-15."

        LEFT_TURN_SIGNAL:
          expression: "B10:0"
          ha_class: ""
          source: "Decoded from live captures (2026-04-15)"
          source_links: []
          verified: false
          notes: >
            2026-04-15: Left turn signal stalk. Bit flag — 1=on, persistent (not blinking state). Hazard lights do NOT register here.
            2026-07-21: live car (READY mode) falsely shows LEFT_TURN_SIGNAL=1 when neither is active!


        RIGHT_TURN_SIGNAL:
          expression: "B10:1"
          ha_class: ""
          source: "Decoded from live captures (2026-04-15)"
          source_links: []
          verified: true
          notes: "Right turn signal stalk. Bit flag — 1=on, persistent (not blinking state). Hazard lights do NOT register here. Verified 2026-04-15."
        BRAKE_PEDAL_BITS:
          expression: B10:2
          min: "0"
          max: "1"
          source: RE 2026-07-23 bit analysis
          verified: false
          notes: >
            Refines BRAKE_LIGHT (whole-byte B10). Brake-pressed payload B10=0x2D sets bits 2,3,5 together (0,1 = turn signals). Bit2 chosen as brake indicator candidate; bits 3+5 co-occur (could be brake-switch redundancy or brake-light-relay). Enabled unverified — press brake with turn signals OFF to isolate which single bit is the clean brake flag. Undecoded BC06 bits also active: B10:3, B10:5 (co-set with brake).
          enabled: true

    22BC01:
      status: draft
      vehicle_states:
        - sleep
        - plugged
        - acc
        - acc2
        - ready
        - charging
      notes: >
        9 bytes. B03=0x40 (bit 6 set), B08=0x02 (bit 1 set), rest zeros. Static across
        deep sleep and ACC captures. Possibly immobilizer or key-related configuration flags.
        Sample: 62BC01400000000002.
      parameters:
        IGPM_BC01_STATIC:
          expression: B5
          source: RE 2026-07-23 multi-state analysis
          verified: false
          notes: >
            CONSTANT across all 6 power states (sleep/plugged/acc/acc2/ready/charging) and all captures: full data = 40 00 00 00 00 02 (B5=0x40; only trailing 0xAA ELM padding differs). Static config/version register, NO live signal. B5 is the representative byte; nothing to decode.
          enabled: false
    22BC02:
      status: draft
      vehicle_states:
        - sleep
        - plugged
        - acc
        - acc2
        - ready
        - charging
      notes: >
        4 data bytes, all zeros in every capture (deep sleep and ACC). May only populate
        during driving (speed pulse, wiper state?). Sample: 62BC0200000000.
      parameters:
        IGPM_BC02_STATIC:
          expression: B5
          source: RE 2026-07-23 multi-state analysis
          verified: false
          notes: >
            CONSTANT all-zero (62 BC 02 00 00 00 00) across every state/capture. B5=0x00. Carries no data. Nothing to decode.
          enabled: false
    22BC05:
      status: draft
      vehicle_states:
        - sleep
        - plugged
        - acc
        - acc2
        - ready
        - charging
      notes: >
        8 data bytes. B03=0x7F, B04=0x11, B05=0x20, rest zeros. Static across all power
        states. 0x7F11 could be a version or capability register. Purpose unknown.
        Sample: 62BC057F112000000000.
      parameters:
        IGPM_BC05_STATIC:
          expression: B5
          source: RE 2026-07-23 multi-state analysis
          verified: false
          notes: >
            CONSTANT across all states/captures: full data = 7F 11 20 00 00 00 00 00 (B5=0x7F). Static config/version register, no live signal. B5 representative; nothing to decode.
          enabled: false
    22BC08:
      status: ignored
      vehicle_states:
        - sleep
        - plugged
        - acc
        - acc2
        - ready
        - charging
      notes: >
        NRC 0x31 (requestOutOfRange). DID does not exist on Ioniq 2017 IGPM.
        Tested 2026-04-14.
      parameters: {}

  # ─── IOControl (service 2F) ──────────────────────────────────────────
