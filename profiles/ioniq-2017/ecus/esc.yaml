# ─── ESC (Electronic Stability Control) ──────────────────────────────
ESC:
  tx_id: 0x7D1
  identity:
    alias: ABS
    description: Electronic Stability Control
    serial: "GWLK7F01A986826"
    app_sw: "G7"
    id_protocol: UDS  # F1xx (limited — no part number DID)
  vehicle_states:
    - acc
    - acc2
    - ready
  pids:
    22C101:
      period: 2500
      vehicle_states: []
      parameters:
        REAL_SPEED_KMH:
          expression: B12
          unit: km/h
          ha_class: speed
          min: "0"
          max: "250"
          source: Kia Niro EV WiCAN PR#660; verified RE 2026-07-22
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/660
          verified: true
          notes: >
            ESC vehicle-speed estimate, 1 km/h/bit at ISO-TP 0x09. Verified against 4 wheel speeds (B18-B21, r=+1.000) and driving profile 0-39 km/h. Reads 0 at standstill.
        WHEEL_SPEED_FL:
          expression: B18
          unit: km/h
          min: "0"
          max: "250"
          source: RE 2026-07-22 driving capture; r=+1.000 vs REAL_SPEED_KMH
          verified: true
          notes: >
            Individual wheel speed, 1 km/h/bit. ISO-TP 0x0E. Left/right grouping confirmed (B18/B20 track together = left pair, diverge with B19/B21 in turns). Front/rear within side by Ioniq5/OBDb FL,FR,RL,RR convention — not independently verified.
        WHEEL_SPEED_FR:
          expression: B19
          unit: km/h
          min: "0"
          max: "250"
          source: RE 2026-07-22 driving capture; r=+1.000 vs REAL_SPEED_KMH
          verified: true
          notes: >
            Individual wheel speed, 1 km/h/bit. ISO-TP 0x0F. Right pair (B19/B21 track together). Front/rear by convention.
        WHEEL_SPEED_RL:
          expression: B20
          unit: km/h
          min: "0"
          max: "250"
          source: RE 2026-07-22 driving capture; r=+1.000 vs REAL_SPEED_KMH
          verified: true
          notes: >
            Individual wheel speed, 1 km/h/bit. ISO-TP 0x10. Left pair (B18/B20 track together). Front/rear by convention.
        WHEEL_SPEED_RR:
          expression: B21
          unit: km/h
          min: "0"
          max: "250"
          source: RE 2026-07-22 driving capture; r=+1.000 vs REAL_SPEED_KMH
          verified: true
          notes: >
            Individual wheel speed, 1 km/h/bit. ISO-TP 0x11. Right pair (B19/B21 track together). Front/rear by convention.
    22C102:
      status: draft
      period: 2500
      vehicle_states: []
      parameters:
        ESC_C102_UNKNOWN:
          expression: ""
          unit: ""
          ha_class: ""
          min: ""
          max: ""
          source: "DID scan 2026-04-17"
          source_links: []
          verified: false
          notes: "26-27 bytes. 2026-04-17: 62C1023FE00000FFFFFFFFFFFF01010000A9AA000000C0C0D4D400. 2026-07-22 (READY, parked) re-scan: 62C1023FE00000FFFFFFFFFFFF010100009C9C000000C0C0D4D4 — the 16-bit word after '01010000' changed A9AA->9C9C between captures while the 0x3FE0 prefix and 0xC0C0D4D4 tail stayed constant. So that word (ISO-TP ~byte 0x0F-0x10) is a dynamic signal (candidate wheel/ABS sensor), the rest static. Needs a driving capture to decode."
  research:
    - type: decode
      target: "22C101"
      status: captured
      priority: P2
      vehicle_states:
        - acc
      notes: >
        REAL_SPEED_KMH (B12) and 4 wheel speeds (B18-B21, FL/FR/RL/RR interleaved,
        1 km/h/bit) decoded + verified from the 2026-07-22 drive (r=+1.000). STILL
        UNDECODED: candidate ESC dynamics at B35:B36 (signed, centred ~0x8000 →
        yaw rate or steering angle?), B37:B38 (~2048 = offset-binary accel?), and
        B39/B41 (~2048, spans PCI B40 so use (B39<<8)|B41 → 2nd accel axis?). All
        three sit near their centre at standstill and deviate while driving; they
        did NOT correlate with speed (expected). Also B18-B21 front/rear within a
        side is by convention only. B22/B27 = low-rate status/counter.
      what_to_test:
        - "B35:B36 signed centred ~0x8000 — yaw rate vs steering angle"
        - "B37:B38 and (B39<<8)|B41 centred ~2048 — lateral/longitudinal accel"
        - "Confirm wheel front/rear assignment (needs known-corner reference)"
      sources:
        - "captures/2026-07-22.yaml — driving capture, lots of steering"
        - "OBDb Ioniq 5"
    - type: scan
      target: "22 C101-C10F"
      status: done
      priority: P2
      vehicle_states:
        - acc
      notes: "ESC C1xx range scan."
    - type: scan
      target: "22 0101-010F"
      status: nrc
      priority: P2
      vehicle_states:
        - acc
      notes: "ESC 01xx range. 0104 = individual wheel speeds FL/FR/RL/RR per Ioniq 5."
      sources:
        - "OBDb Ioniq 5"
    - type: scan
      target: "22 F010 (on 0x730)"
      status: nrc
      priority: P2
      vehicle_states:
        - ready
      notes: "Ioniq 5 uses 0x730 for ESC with 22F010: 4 wheel speeds (16-bit/32), steering angle (/10), lateral/longitudinal accel, yaw rate. Try on both 0x7D1 and 0x730."
      sources:
        - "OBDb Ioniq 5"
