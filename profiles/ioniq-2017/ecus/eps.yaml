# ─── EPS (Electric Power Steering) ───────────────────────────────────
EPS:
  tx_id: 0x7D4
  identity:
    alias: MDPS  # Motor-Driven Power Steering
    description: Electric Power Steering
    part_number: "56310G7300"
    mfg_date: "2017-06-01"
    firmware: "MDPS C 1.00/1.03"
    id_protocol: UDS  # F1xx
    notes: Steering column
  vehicle_states:
    - acc
    - acc2
    - ready
  pids:
    220101:
      status: active
      period: 2500
      vehicle_states:
        - ready
      parameters:
        EPS_0101_STEERING_UNMAPPED:
          expression: ""
          unit: ""
          ha_class: ""
          min: ""
          max: ""
          source: "DID scan 2026-04-17; RE 2026-07-22 driving capture"
          source_links: []
          verified: false
          notes: >
            18-byte payload. Steering data lives in ISO-TP bytes 0x03-0x0A
            (WiCAN B05,B06,B07,B09,B10,B11,B12,B13). During the 2026-07-22 drive
            (lots of steering both directions) this region swings both signs and
            settles near constant at standstill, but exact pairing/endianness/scale
            is NOT yet resolved: B10 holds a stable ~0xA8 at rest and wraps while
            driving (candidate absolute-angle low byte); B12 is a signed byte ~0 at
            rest with +-127 swings while driving (candidate steering torque/rate).
            The +-256 flips seen when treating B10:B11 or B12:B13 as a single 16-bit
            LE value show they are NOT clean little-endian pairs. Needs a controlled
            capture (see research entry) to pin down angle vs torque vs MDPS current.
            B14 = vehicle speed (decoded). B18/B19 tail = 0x1010 constant.
        EPS_VEHICLE_SPEED:
          expression: B14
          unit: km/h
          min: "0"
          max: "250"
          source: RE 2026-07-22 driving capture
          verified: true
          notes: >
            EPS-side vehicle speed echo (speed-dependent steering assist). ISO-TP 0x0B. Tracks ESC REAL_SPEED_KMH within +-1 km/h across 0-39 km/h drive; 0 at standstill.
        STEERING_ANGLE:
          expression: (B10+S11*256)/10
          unit: deg
          min: "-500"
          max: "500"
          source: RE 2026-07-22 MT->KW drive; Ioniq5 /10 deg convention
          verified: false
          notes: >
            STRONG CANDIDATE, unverified. Little-endian signed 16-bit: low byte B10 (ISO-TP 0x07), signed high byte B11 (ISO-TP 0x08). Across the 2026-07-22 drive range -374..+299 deg (~1.5 turns each way), centered ~0, returns to centre at standstill; big-endian variant is bimodal (wrong). Scale /10 assumed from Ioniq5 EPS. NEEDS controlled stationary capture (centre/quarter/full-lock each way + lock-to-lock sweep) to confirm scale, zero, and sign convention. This car has active LKAS (lane-keep) so expect related steering-torque/LKAS-command signals nearby (B7/B12 swing signed +-full-scale = torque/rate/MDPS-current candidates).
        EPS_STEERING_TORQUE:
          expression: (B12+S13*256)
          unit: ""
          min: "-10000"
          max: "10000"
          source: RE 2026-07-23 analysis of 2026-07-22 MT->KW drive
          verified: false
          notes: >
            STRONG candidate: little-endian signed 16-bit at ISO-TP 0x09:0x0A (low B12, signed high S13; no PCI between B12/B13). Range -9258..+9752 across the drive, symmetric ~0, ~0 at standstill. Correlates r=-0.64 with STEERING_ANGLE (OPPOSITE sign) and r=-0.43 with d(angle)/dt. Opposite-sign-to-angle + torque-like magnitude => most likely STEERING/MDPS TORQUE (self-centering opposes displacement), though a second column-angle representation isn't ruled out. Scale unknown (raw). NEEDS controlled stationary capture (hold torque at each wheel position) to confirm torque vs angle and units (Nm?).
          enabled: true
        EPS_MDPS_ASSIST:
          expression: B17
          unit: ""
          min: "0"
          max: "255"
          source: RE 2026-07-23 analysis
          verified: false
          notes: >
            MDPS motor assist effort candidate. ISO-TP 0x0D. Exactly 0 at ALL 16 standstill samples; swings 0-253 while moving (r=+0.53 vs VEHICLE_SPEED, noisy). Speed-gated + high during active steering => likely MDPS motor CURRENT or PWM/assist-duty (unsigned magnitude, no direction). Not a clean linear scalar; scale/units unknown. Verify with controlled steer-effort capture.
          enabled: true
        EPS_STEERING_TORQUE_ALT:
          expression: S7
          unit: ""
          min: "-40"
          max: "40"
          source: RE 2026-07-23 analysis
          verified: false
          notes: >
            Small signed steering signal, ISO-TP 0x05. Raw signed -36..+37, ~0 at rest (-10..-1), r=+0.34 vs STEERING_ANGLE. Candidate driver steering torque or angular rate (small-magnitude signed). Distinct from the larger EPS_STEERING_TORQUE (B12:S13). Disambiguate driver-torque vs rate vs MDPS with a controlled capture.
          enabled: true
        EPS_B9_FLAG:
          expression: B9
          min: "0"
          max: "255"
          source: RE 2026-07-23 analysis
          verified: false
          notes: >
            BIMODAL 0x00/0xFF only (not a scalar) — status/validity flag at ISO-TP 0x06, immediately before the STEERING_ANGLE low byte B10. Likely an angle sign/validity or MDPS-status flag. Disabled (documents the byte; needs a targeted capture to confirm what toggles it). B05=0x8A B06=0x8E constant config. B18/B19 tail=0x1010 constant. B20/B21 = ISO-TP message counter (cycles 21->22).
          enabled: false
    220102:
      status: draft
      period: 2500
      vehicle_states:
        - ready
      parameters:
        EPS_0102_UNKNOWN:
          expression: ""
          unit: ""
          ha_class: ""
          min: ""
          max: ""
          source: "DID scan 2026-04-17"
          source_links: []
          verified: false
          notes: "13 bytes. B6=0x03, rest zeros. Status/config register. Payload: 62010200000003000000000000"
  research:
    - type: scan
      target: "22 0101-0105"
      status: done
      priority: P2
      vehicle_states:
        - acc
      notes: "0101 = steering wheel angle absolute (/10 deg), MDPS motor current (signed A) per Ioniq 5."
      sources:
        - "OBDb Ioniq 5"
        - "OpenDBC fingerprints confirm EPS at 0x7D4"
    - type: decode
      target: "220101"
      status: captured
      priority: P1
      vehicle_states:
        - ready
      notes: >
        STEERING_ANGLE now DEFINED as an unverified candidate: (B10+S11*256)/10
        deg (little-endian signed 16-bit, low byte B10 / signed high byte B11).
        Range -374..+299 deg across the 2026-07-22 MT->KW drive (~1.5 turns each
        way), centres ~0 and returns to centre at standstill; big-endian variant
        is bimodal (wrong). VEHICLE_SPEED (B14) already decoded.
        2026-07-23 analysis (376 captures) added three more enabled-unverified
        candidates from the B05-B17 region: EPS_STEERING_TORQUE = (B12+S13*256) LE
        signed-16 at ISO-TP 0x09:0x0A, range +-9500, ~0 at rest, r=-0.64 vs angle
        (opposite sign => torque, or a 2nd angle rep); EPS_MDPS_ASSIST = B17,
        exactly 0 at standstill and swinging 0-253 while moving (r=+0.53 vs speed)
        => motor current/PWM assist; EPS_STEERING_TORQUE_ALT = S7 (small signed
        +-36, r=+0.34 vs angle). B9 = bimodal 0/FF flag (EPS_B9_FLAG, disabled).
        STILL TO CONFIRM with the controlled stationary capture below: (1) angle
        scale/zero/sign, (2) which byte is torque vs angle-2 vs rate, (3) assist
        units. All scales are raw/unverified.
      what_to_test:
        - "VERIFY STEERING_ANGLE scale (/10?), zero point, and left/right sign via controlled capture"
        - "EPS_STEERING_TORQUE (B12:S13) — torque vs 2nd angle? hold wheel against resistance at fixed positions to separate torque from displacement; find units"
        - "EPS_MDPS_ASSIST (B17) — motor current/PWM? push wheel with engine on/off to vary assist effort at fixed speed"
        - "EPS_STEERING_TORQUE_ALT (S7) vs B12:S13 — which is driver torque, which is rate/MDPS?"
      sources:
        - "captures/2026-07-22.yaml — driving capture, lots of steering"
        - "OBDb Ioniq 5"
      capture_protocol: >
        Car stationary in ACC/ready. Hold wheel steady ~5s at each of: centre,
        quarter-turn left, quarter-turn right, full-lock left, full-lock right;
        then a slow lock-to-lock sweep. Save each with --label/--state, then
        'canair decode EPS 220101 --plot' to sweep u16/i16 x endianness and read
        off scaling. Cross-check STEERING_ANGLE against wheel position at each hold.
    - type: decode
      target: "220101"
      status: pending
      priority: P2
      vehicle_states:
        - ready
      notes: >
        LKAS / lane-keep signals. This car has active LKAS (lane-keep assist steering)
        which commands the MDPS to apply torque — so EPS 220101 (or a sibling
        22010x page / a separate LKAS-related DID) likely carries an LKAS active
        flag, a commanded-torque/overlay-torque value, and possibly a driver-override
        / hands-on-wheel torque. Capture during an LKAS-active highway drive (lane
        markings present, LKAS engaged, then let it nudge the wheel and also
        override it) and diff against a manual-steering drive to isolate the LKAS
        command bytes from the driver-angle/torque bytes (B7/B12 region).
      what_to_test:
        - "LKAS active/engaged flag"
        - "LKAS commanded/overlay steering torque"
        - "Driver override / hands-on-wheel torque"
        - "Whether LKAS data is on 220101 or a sibling 22010x page"
      sources:
        - "OpenDBC Hyundai LKAS message set (MDPS / LKAS11/LKAS12)"
        - "OBDb Ioniq 5"
    - type: scan
      target: 22 0100-0110
      status: nrc
      priority: P2
      vehicle_states:
        - ready
      date: "2026-07-22"
      result: "22010x sibling sweep (ignition on): only 0101 (18B) and 0102 (8B) respond; 0100 and 0103-0110 all NRC. No hidden sibling pages -> any LKAS active/torque-command signal must live WITHIN 220101/220102 themselves (or is not OBD-exposed on EPS). Narrows the LKAS decode lead."
      notes: Hidden-page hunt 2026-07-22. Rules out sibling 22010x pages for the LKAS backlog.
