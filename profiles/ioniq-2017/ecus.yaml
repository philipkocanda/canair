      ESC/EPS-adjacent address, this reinforces the chassis/brake sub-module hypothesis.
      See pids/unknown-7d5.yaml 22C101. 01xx/B0xx/C0xx/D0xx/service-21 all NRC.
  0x7E2:
    name: VCU  # ecu_id "VLDC" is the module code; VCU is the functional role exposed via 2101
    alias: VLDC  # KWP2000 ecu_id module code (VCU with integrated LDC)
    description: Vehicle Control Unit (integrated LDC)
    part_number: "36601-0E250"
    ecu_id: AEVLDC53  # KWP2000 1A8C — "VLDC": VCU with the LDC integrated (standalone at 0x7CD on Kia Soul)
    sw_id: "EAEEO5L-NS7-D060"
    calibration: "C5210617"
    vin: "KMHCXXXXXXXXXXXX"
    id_protocol: KWP2000  # 1Axx
  0x7E3:
    name: MCU
    alias: VMCU # aka HPCU (Hybrid Power Control Unit - legacy term but may help to know)
    description: Motor Control Unit (inverter)
    part_number: "36600-0E250"
    ecu_id: AEEMCU83  # KWP2000 1A8C
    sw_id: "EAEEHEL-MS2-D000"
    calibration: "00000001"
    id_protocol: KWP2000  # 1Axx
  0x7E4:
    name: BMS
    description: Battery Management System
    ecu_id: "AEEV__ BMS"  # KWP2000 1A90
    fw_version: "VER.2.3"  # KWP2000 1A91
    sw_id: CGBMSE305AE1000A  # KWP2000 1A8C
    calibration: "4604"  # KWP2000 1A8D
    id_protocol: KWP2000  # 1Axx
    notes: "1A80 firmware build date 2008-07-09 (likely platform date, not unit manufacture)"
  0x7E5:
    name: OBC
    alias: LDC  # Combined unit — also houses the LDC (DC-DC converter); reports its 12V output live while driving
    description: On-Board Charger (integrated LDC / DC-DC converter)
    part_number: "36400-0E150"
    ecu_id: AEEOBC51  # KWP2000 1A8C → EOBC
    sw_id: "EAEEH5L-OS3-D000"
    calibration: "00000001"
    id_protocol: KWP2000  # 1Axx
    notes: >
      Combined OBC + LDC power unit (part 36400-0E150). OBC signals (charge voltage/current,
      pilot duty) are active only while AC charging; the LDC (DC-DC) 12V output is measured
      live even while driving with the OBC idle (OBC_DC_A=0) — confirming both functions live
      in this one ECU. The LDC *control* bits (enable/inhibit) live on the VCU (0x7E2, whose
      module code is "VLDC"), not here.
  0x7E6:
    name: AAF
    description: Active Air Flap controller
    part_number: M3062000307  # KWP2000 1A91
    sw_id: EAE16AAFB30001  # KWP2000 1A8D — "AAF" is the Hyundai internal module code
    firmware: EAEAAFP201  # KWP2000 1A98 — "AAF" is the Hyundai internal module code
    id_protocol: KWP2000  # 1Axx
    notes: >
      Active Air Flap (AAF) controller — confirmed by the "AAF" module code in its
      sw_id (EAE16AAFB30001) and firmware (EAEAAFP201). Also exposes several thermal
      readings via PID 2180/2181 (ambient temp, heater element, heat sink, compressor),
      which is why community projects (OVMS, pioniq, EVNotiPi, JejuSoul) use this address
      for external temp.
