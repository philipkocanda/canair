  0x7D2:
    name: SRS
    description: Airbag / Supplemental Restraint System
    id_protocol: none  # NRC 0x11 on all UDS F1xx and KWP2000 1Axx
    notes: >
      Identified via Kia e-Niro CAN spreadsheet (exact address match 7D2/7DA).
      Security-locked — no diagnostic identity exposed.
      Dead during AC charging (2026-04-19): 1001, 1003, 3E00, 1A8C all NO DATA.
  0x7D4:
    name: EPS
    alias: MDPS  # Motor-Driven Power Steering
    description: Electric Power Steering
    part_number: "56310G7300"
    mfg_date: "2017-06-01"
    firmware: "MDPS C 1.00/1.03"
    id_protocol: UDS  # F1xx
