  # 0x744 removed — never responded positively. Discovery scan (2026-04-17) returned
  # CAN-level errors, service 21 scan during AC charging (2026-04-18) returned 255 NO DATA.
  # Cross-platform reference only; likely does not exist on Ioniq 28kWh.
  0x746:
    name: Unknown-746
    description: Unknown ECU — KWP2000 only, no OBC evidence
    ecu_id: "1.10"  # KWP2000 1A8C
    sw_id: "Z311"  # KWP2000 1A8D/1A8E
    calibration: "Z311"
    hw_sw: "3.5"  # KWP2000 1A92
    id_protocol: KWP2000  # 1Axx (10/32 responding)
    notes: >
      Previously labelled OBC-746 speculatively (address proximity to 0x744).
      No evidence of OBC function. Only data PID: 21F2 → 00000007 (4 bytes).
      Responds to 1001 with NRC 0x12 but alive. Most identity fields FFFFFFFF.
  0x755:
    name: BSD-L
    description: Blind Spot Detection radar (left)
    part_number: "95821G2000"
    serial: "31114851712211429"
    id_protocol: UDS  # F1xx (many FF-padded fields)
  0x780:
    name: AVN
    description: Audio/Video/Navigation head unit
    serial: "00000076FE0085-003240"
    app_sw: "AE_EV EURSOP 12 017.1"
    id_protocol: UDS  # F1xx (limited — 3 DIDs)
    notes: "Firmware ID 'AE_EV EUR.SOP' matches Ioniq head unit firmware/map updates. Previously misidentified as TCU."
  0x783:
    name: AMP
    description: Audio Amplifier (external - Infinity audio system)
    id_protocol: none  # NRC 0x11 on all UDS F1xx and KWP2000 1Axx
    identity_confidence: tentative  # no self-identity; label from cross-vehicle address match
    notes: >
      Identified via Kia e-Niro CAN spreadsheet (exact address match 783/78B).
      No diagnostic identity data — audio-only module.
      Services supported: 10 (session), 14 (clearDTC), 19 (readDTC), 3E (testerPresent).
      All other services (21, 22, 27, 2F) return NRC 0x11 (serviceNotSupported).
      DTCs during charging (2026-04-19, ignition off):
        A919 (status 09), A91A (09), A91B (09), A915 (09),
        A916 (09), A920 (09), A921 (09) — 7 DTCs, all status 0x09.
      Deep scan (2026-07-22, READY): confirms minimal/non-compliant diag stack.
      Service 19 only implements sub-fn 0x02 (readDTCByStatusMask); 0x01/0x0A →
      subFunctionNotSupported, 0x03/04/06 → incorrectMessageLength (handler hard-gated
      to a 3-byte SID+SF+mask request) → no snapshot/extended/supported-DTC data.
      Quirky masks: 1902FF→7 DTCs (avail 0xFF), 190208→0 (avail 0x09), 190204/01→ROOR.
      22/1A identity and 17/18 KWP-DTC all NRC 0x11 even in extended session.
      Decoded DTCs: B2915/16/19/1A/1B/20/21 (all status 0x09, actively failing).
      Identity is tentative: minimal identity-less peripheral + premium/Infinity audio
      fitted + e-Niro address match + body/audio-range speaker-circuit codes are all
      consistent with an external amplifier (functional identity ~probable), but the exact
      module cannot be confirmed from the bus (no part number by any service). Likely code
      cause: amp channels the harness expects but this trim doesn't populate (open circuit).
  0x796:
    name: RCAM
    description: Rear View Camera (parking)
    part_number: "95760G2000"
    mfg_date: "2017-05-30"  # ASCII-encoded in raw field
    hw_version: "100"
