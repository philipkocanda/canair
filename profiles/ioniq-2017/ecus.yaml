# Ioniq 2017 EV — ECU address lookup
# TX ID is the OBD-II request arbitration ID; RX ID is TX + 8.
#
# Protocol split:
#   Body/comfort ECUs (IGPM, BCM, SKM, CLU, ESC, EPS, HVAC, PSM, VESS, SAS, etc.) → UDS
#     Identity: 22 F1xx (with Hyundai -1 offset: F187 instead of F188, etc.)
#     Live data: 22 xxxx (ReadDataByIdentifier)
#   Powertrain ECUs (BMS, VCU, MCU, LDC/OBC, Gateway, Unknown-746) → KWP2000
#     Identity: 1A xx (ReadEcuIdentification, range 80-9F)
#     Live data: 21 xx (manufacturer-specific, paged: 2101, 2102, etc.)
#     These ECUs do NOT respond to UDS 22 F1xx or 22 Exxx DIDs.
#   Some ECUs (0x783 AMP, 0x7D2 SRS) respond to session control (1001) but have no
#     identity DIDs — security-locked or audio-only modules.
#
# Hyundai powertrain ECU ID naming (KWP2000 1A8C string):
#   Hyundai's own powertrain ECUs encode identity as  AE + <variant> + <MODULE> + <ver>
#     AE       platform code (Ioniq "AE", model years 2016-2019)
#     variant  single letter — E on MCU/OBC, V on LDC (meaning unconfirmed)
#     MODULE   3-char module code — the reliable identifier: LDC, MCU, OBC, ...
#     ver      version digits (e.g. 53, 83, 51)
#   Confirmed on this car:
#     0x7E2  AEVLDC53  → "VLDC"  VCU integrated with the LDC (part 36601-0E250)
#     0x7E3  AEEMCU83  → "EMCU"  Motor Control Unit / inverter (part 36600-0E250)
#     0x7E5  AEEOBC51  → "EOBC"  On-Board Charger, also reports the shared LDC hardware (part 36400-0E150)
#   Third-party / non-powertrain ECUs use their own conventions instead, e.g.:
#     0x7E4  BMS  CGBMSE305AE1000A  (LG Chem supplier format)
#     0x7E6  AAF  EAE16AAFB30001    (embeds the "AAF" module code)
#     0x746       "1.10" / "Z311"   (bare version string — non-Hyundai supplier)
#
# Discovery scan 2026-04-17: full sweep 0x700-0x7EF found 30 alive addresses.
# 16 previously known + 14 newly discovered + 0x7C0 (unknown) + 0x7DF (OBD-II broadcast).
#
# Per-ECU scan log — tracks which UDS service/range combinations have been probed.
# Format: service (hex), range, date, result count, car state.
scan_log:
  0x770:  # IGPM
    - service: 0x31
      range: "0000-FFFF"
      date: 2026-04-20
      hits: 0
      probes: 768  # cut off at 0x00FF — battery died
      state: asleep
      notes: >
        All NRC 0x12 (subFunctionNotSupported) — IGPM does not support sub-function 03
        (requestRoutineResults). Sub-function 01 (startRoutine) untested (unsafe to scan blindly).
  0x7A0:  # BCM
    - service: 0x31
      range: "0000-FFFF"
      date: 2026-04-20
      hits: "~71+ (screen only, not in log — connection dropped)"
      probes: 49813  # cut off at 0xC8D2 — WiCAN sleep/disconnect
      state: asleep
      notes: >
        BCM supports service 31 (sub-fn 03 requestRoutineResults).
        Two clusters of positive responses seen on screen (not saved to log — connection dropped):
          Cluster A: 0x95CE–0x97C2 (~40 hits, stride 0x0D)
          Cluster B: 0xC726–0xC8B8 (~32 hits, stride 0x0D)
        All responses are 2 bytes (just positive ack, no result data — routine exists but no
        result available, likely needs startRoutine first or ignition on).
        Notable: RID 0x12A1 returned NRC 0x22 (conditionsNotCorrect).
        Remaining range 0xC8D3-0xFFFF not yet scanned.
        TODO: Resume scan from 0xC8D3. Also re-scan 0x95CE-0xC8D2 to capture hits to log.
  0x7B3:  # HVAC
    - service: 0x31
      range: "E000-E0FF"
      date: 2026-04-20
      hits: 0
      probes: 256
      state: asleep
      notes: "256 errors — likely no service 31 support without ignition"
  # ─── 2026-07-22 read-DID (service 22) sweep, car in READY (parked) ───
  # Goal: find live-data DIDs on ECUs previously only identity-scanned.
  # Ranges tried per ECU noted below. All responses were NRC (alive, no such DID)
  # unless a hit is listed. Powertrain 22-DID probes are logged in the pids/ research.
  0x7B6:  # GSA (gear shift assembly)
    - service: 0x22
      range: "0101-010F,B001-B010,C001-C010,D001-D010"
      date: 2026-07-22
      hits: 0
      state: ready
      notes: "Also service 21 01-0F: all NRC. No live-data DIDs exposed via OBD — gear state is available via VCU 2101 DRIVE_MODE_* instead."
  0x7A3:  # PSM (power seat)
    - service: 0x22
      range: "0101-010F,B001-B010,C001-C010,D001-D010"
      date: 2026-07-22
      hits: 0
      state: ready
      notes: "Also service 21 01-0F: all NRC. No live-data DIDs (seat position not exposed via OBD read)."
  0x7A5:  # SKM
    - service: 0x22
      range: "0101-010F,B001-B010"
      date: 2026-07-22
      hits: "B002,B003,B005,B006,B008,B00A"
      state: "ready, fob present"
      notes: >
        Re-confirmed the B0xx live-data block (already registered in pids/skm.yaml).
        01xx all NRC. NOTE the Hyundai -1 echo: requesting B007/B009/B00B returns
        B006/B008/B00A's data. B002 (178 B) content DIFFERS between deep-sleep (2026-04-18)
        and READY — useful power-state contrast for decoding key/immobiliser bytes.
  0x796:  # RCAM (rear camera)
    - service: 0x22
      range: "0101-010F,B001-B010,C101-C10F"
      date: 2026-07-22
      hits: 0
      state: ready
      notes: "No live-data DIDs found. Camera likely exposes only identity/diagnostics via OBD."
  0x725:  # WPC (wireless phone charging)
    - service: 0x22
      range: "0101-010F,B001-B010,C101-C10F"
      date: 2026-07-22
      hits: 0
      state: ready
      notes: "No live-data DIDs found."
  0x755:  # BSD-L (blind spot radar, left)
    - service: 0x22
      range: "0101-010F,B001-B010,C101-C10F"
      date: 2026-07-22
      hits: 0
      state: ready
      notes: "No live-data DIDs found (radar object data may need driving / a different range)."
  0x7B7:  # BSD-R (blind spot radar, right)
    - service: 0x22
      range: "0101-010F,B001-B010,C101-C10F"
      date: 2026-07-22
      hits: 0
      state: ready
      notes: "No live-data DIDs found."
  0x7A1:  # SWRC-L (steering wheel remote, left)
    - service: 0x22
      range: "0101-010F,B001-B010,C101-C10F"
      date: 2026-07-22
      hits: 0
      state: ready
      notes: "No live-data DIDs found (button states not exposed as readable DIDs)."
  0x7A2:  # SWRC-R (steering wheel remote, right)
    - service: 0x22
      range: "0101-010F,B001-B010,C101-C10F"
      date: 2026-07-22
      hits: 0
      state: ready
      notes: "No live-data DIDs found."
  0x736:  # VESS
    - service: 0x22
      range: "0101-010F,B001-B010,C101-C10F"
      date: 2026-07-22
      hits: 0
      state: ready
      notes: "No live-data DIDs found (VESS actuation is via IOControl, not read DIDs)."
  0x7D0:  # SCC (smart cruise control)
    - service: 0x22
      range: "0101-010F,0106-0120,B001-B010"
      date: 2026-07-22
      hits: "0101,0102,0103,0105"
      state: ready
      notes: "Re-confirmed the 01xx block (already registered). 0106-0120 and B0xx all NRC."
  0x7C4:  # MFC (ADAS camera)
    - service: 0x22
      range: "0101-010F,0103-0120,B001-B010"
      date: 2026-07-22
      hits: "0101,0102"
      state: ready
      notes: "Re-confirmed 0100/0101/0102 (already registered). Higher 01xx and B0xx all NRC."
  0x7D5:  # Unknown-7D5 (candidate AHB/iBAU brake module)
    - service: 0x22
      range: "0101-010F,B001-B010,C101-C10F,C001-C010,D001-D010"
      date: 2026-07-22
      hits: "C101"
      state: ready
      notes: "FIRST live-data DID found — C101 (27 B), same DID as ESC. Registered in pids/unknown-7d5.yaml. All other ranges NRC."

ecus:
  0x770:
    name: IGPM
    description: Integrated Gateway & Power Module
    part_number: "91950G7510"
    mfg_date: "2017-06-06"
    hw_version: "100"
    sw_version: "109"
    boot_sw: "20"
    app_sw: "160205"
    id_protocol: UDS  # F1xx
    notes: >
      IGPM is the CAN gateway. OBD port connects directly to the IGPM, so all diagnostic requests are routed through it.
      It is also the main power distribution module, controlling ignition and accessory power to other ECUs.
  0x7A0:
    name: BCM
    description: Body Control Module
    part_number: "95400G7470"
    mfg_date: "2017-05-31"
    id_protocol: UDS  # F1xx
