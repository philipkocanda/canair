
# ─── PSM (Power Seat Module) ──────────────────────────────────────────
# From e-Niro — untested on Ioniq 2017 (Premium trim has power seats).
# Likely requires ACC/IGN on. Actuators are continuous motors — hold command
# active for desired duration, send OFF to stop.
PSM:
  tx_id: 0x7A3
  availability: [plugged, acc, acc2, ready, charging]
  identity:
    part_number: "95450G7000"
    description: "Power Seat Module"
  pids: {}

  # ─── IOControl (service 2F) ──────────────────────────────────────────
  # All from e-Niro — untested on Ioniq 2017.
  # Continuous motors: send ON, wait desired duration, send OFF.
  # Usage: python3 canreq.py --raw 7A3:<on_command> --hold
  iocontrol:
    B401:
      availability: []
      label: Seat slide forward
      verified: true
      on: "2FB40103"
      off: "2FB40100"
      notes: >
        Continuous motor — send OFF to stop.

    B402:
      availability: []
      label: Seat slide backward
      verified: true
      on: "2FB40203"
      off: "2FB40200"
      notes: >
        Continuous motor — send OFF to stop.

    B403:
      availability: []
      label: Seat recline upright
      verified: true
      on: "2FB40303"
      off: "2FB40300"
      notes: >
        Continuous motor — send OFF to stop.

    B404:
      availability: []
      label: Seat recline backward
      verified: true
      on: "2FB40403"
      off: "2FB40400"
      notes: >
        Continuous motor — send OFF to stop.

    B405:
      availability: []
      label: Seat front height up
      verified: true
      on: "2FB40503"
      off: "2FB40500"
      notes: >
        Continuous motor — send OFF to stop.

    B406:
      availability: []
      label: Seat front height down
      verified: true
      on: "2FB40603"
      off: "2FB40600"
      notes: >
        Continuous motor — send OFF to stop.

    B407:
      availability: []
      label: Seat rear height up
      verified: true
