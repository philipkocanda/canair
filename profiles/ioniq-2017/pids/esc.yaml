
# ─── ESC (Electronic Stability Control) ──────────────────────────────
ESC:
  tx_id: 0x7D1
  availability: [acc, acc2, ready]
  pids:
    22C101:
      period: 2500
      enabled: true
      availability: []
      parameters:
        REAL_SPEED_KMH:
          expression: "B12"
          unit: km/h
          ha_class: speed
          min: "0"
          max: "200"
          source: "Kia Niro EV WiCAN PR#660"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/660
          verified: false
          notes: "Wheel-speed based, may differ from VCU speed. Untested on Ioniq."
    22C102:
      period: 2500
      enabled: false
      availability: []
      parameters:
        ESC_C102_UNKNOWN:
          expression: ""
          unit: ""
          ha_class: ""
          min: ""
          max: ""
          source: "DID scan 2026-04-17"
          source_links: []
          verified: false
          notes: "26-27 bytes. 2026-04-17: 62C1023FE00000FFFFFFFFFFFF01010000A9AA000000C0C0D4D400. 2026-07-22 (READY, parked) re-scan: 62C1023FE00000FFFFFFFFFFFF010100009C9C000000C0C0D4D4 — the 16-bit word after '01010000' changed A9AA->9C9C between captures while the 0x3FE0 prefix and 0xC0C0D4D4 tail stayed constant. So that word (ISO-TP ~byte 0x0F-0x10) is a dynamic signal (candidate wheel/ABS sensor), the rest static. Needs a driving capture to decode."
  research:
    - type: decode
      target: "22C101"
      status: captured
      priority: P1
      prerequisite: [acc]
      notes: "42 bytes captured but undecoded. REAL_SPEED_KMH at B12 unverified. Verify against GPS while driving."
      what_to_test:
        - "REAL_SPEED_KMH (B12) — verify vs GPS"
        - "Decode remaining 41 bytes"
      sources:
        - "captures/ — 2026-04-14"
    - type: scan
      target: "22 C101-C10F"
      status: done
      priority: P2
      prerequisite: [acc]
      notes: "ESC C1xx range scan."
    - type: scan
      target: "22 0101-010F"
      status: nrc
      priority: P2
      prerequisite: [acc]
      notes: "ESC 01xx range. 0104 = individual wheel speeds FL/FR/RL/RR per Ioniq 5."
      sources:
        - "OBDb Ioniq 5"
    - type: scan
      target: "22 F010 (on 0x730)"
      status: nrc
      priority: P2
      prerequisite: [ready]
      notes: "Ioniq 5 uses 0x730 for ESC with 22F010: 4 wheel speeds (16-bit/32), steering angle (/10), lateral/longitudinal accel, yaw rate. Try on both 0x7D1 and 0x730."
      sources:
        - "OBDb Ioniq 5"
