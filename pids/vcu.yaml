
# ─── VCU (Vehicle Control Unit) ──────────────────────────────────────
#
# Sometimes referred to as VMCU, though the distinction is vague..
#
# The VCU is the logical brain of the EV powertrain:
# - Torque requests (accelerator input, cruise control)
# - Drive mode logic
# - Regen braking strength (0-1-2-3) and brake blending
# - Coordination between motor, inverter, battery, and safety systems
# - Suspected: preconditioning, charge timer, charge power limit settings (station/portable).
#
# The Vehicle Control Unit (VCU) and Motor Control Unit (MCU)
# are both part of the Electronic Powertrain Control Unit (EPCU) physical housing.
#
VCU:
  tx_id: 0x7E2
  availability: [ready, charging]
  pids:
    2101:
      period: 2500
      enabled: true
      availability: [ready, charging]
      parameters:
        VEHICLE_SPEED:
          expression: "[B20:B21]*1.609344/100"
          unit: km/h
          ha_class: speed
          min: "0"
          max: "255"
          verified: false
          notes: >
            Raw field is speed in MPH×100, big-endian 16-bit at [B20:B21]. Converted to km/h (×1.609344).
            2026-07-20: Old formula ((S20*256)+S19)/100 was wrong on two counts:
            (1) it paired high byte B20 with the preceding byte B19 as low byte, but B19 is an unrelated
            erratic signal (values swing 23→219) and was read as *signed* (S19), corrupting ~17% of frames
            (whenever B19≥0x80). Correct 16-bit field is big-endian [B20:B21].
            (2) unit is MPH, not km/h.
            Cross-checked against dashboard at 3 points (2026-07-19 drive): 83/96/109 km/h cluster vs
            78.9/91.4/103.7 decoded → constant +5.1% (= normal speedometer over-read). The constant bias
            only appears with the correct low byte B21; using B19 it scatters 2.3–5.5%.
            Pending GPS/multi-point confirmation across full speed range (see research). NOTE: dashboard
            speed itself is a separate signal — ESC 0x7D1 22C101 REAL_SPEED_KMH (B12), wheel-speed based.

        DEBUG_DRIVE_MODE_FLAGS:
          expression: "B10"
          unit: ""
          verified: true
          notes: "Raw byte — individual bits below"

        DRIVE_MODE_P:
          expression: "B10:0"
          unit: ""
          verified: true
          notes: ""

        DRIVE_MODE_R:
          expression: "B10:1"
          unit: ""
          verified: true
          notes: ""

        DRIVE_MODE_N:
          expression: "B10:2"
          unit: ""
          verified: true
          notes: ""

        DRIVE_MODE_D:
          expression: "B10:3"
          unit: ""
          verified: true
          notes: ""

        DEBUG_VEHICLE_STATE_FLAGS:
          expression: "B11"
          unit: ""
          verified: false
          notes: "Raw byte — individual bits below"

        VEHICLE_STATE_BRAKE_LAMP:
          expression: "B11:0"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_NOT_BRAKING:
          expression: "B11:1"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_START_KEY:
          expression: "B11:2"
          unit: ""
          verified: false
          notes: ""

        VEHICLE_STATE_EV_READY:
          expression: "B11:3"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_VCU_READY:
          expression: "B11:4"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_MAIN_RELAY_ON:
          expression: "1-B11:5"
          unit: ""
          verified: false
          notes: "Inverted from MAIN_RELAY_OFF bit. 1=relay closed (normal Ready/charging), 0=relay open (car off)."

        VEHICLE_STATE_POWER_ENABLE:
          expression: "B11:6"
          unit: ""
          verified: false
          notes: ""

        VEHICLE_STATE_LDC_ENABLED:
          expression: "1-B11:7"
          unit: ""
          verified: false
          notes: "Inverted from LDC_INHIBIT bit. 1=LDC active, 0=inhibited."

        DEBUG_MCU_STATE_FLAGS:
          expression: "B12"
          unit: ""
          source: "AutoPID config (on device)"
          verified: true
          notes: "Present in AutoPID but not in vehicle profile"

        CAR_READY:
          expression: "B26:3"
          unit: ""
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: false
          notes: ""

        PARK_BRAKE:
          expression: "B26:5"
          unit: ""
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: false
          notes: ""

        VCU_UNKNOWN:
          expression: "B16/2"
          unit: "%"
          min: "0"
          max: "100"
          source: "ImHex pattern (@ 0x0E) + JejuSoul Torque Pro CSV"
          source_links:
            - https://docs.google.com/spreadsheets/d/1R2dW_4-ANg04TQdkHH52-8wdYItBkWDfppcsqOc-m1M
          verified: false
          notes: >
            ImHex offset 0x0E + 2 = B16. Ioniq 5 OBDb confirms at bix 96, len 8, div 2.
            2026-07-19: Implausible - fixed at 17% during charging
            2026-07-19: Could be regen/drive mode?

    2102:
      period: 5000
      enabled: true
      availability: [ready, charging]
      parameters:
        VCU_MOTOR_RPM:
          expression: "((S7<<8)|B6)"
          unit: RPM
          source: "JejuSoul Torque Pro CSV"
          verified: false
          notes: "Torque letters e=B4,f=B5 → ISO-TP 4,5 → WiCAN B6,B7. Signed 16-bit."

        VCU_INVERTER_INPUT_VOLTAGE:
          expression: "B10*2"
          unit: V
          ha_class: voltage
          min: "0"
          source: "JejuSoul Torque Pro CSV"
          verified: false
          notes: >
            Torque letter I=B8 → ISO-TP 8 → WiCAN B10.

        VCU_HEAT_SINK_TEMP:
          expression: "B16"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "215"
          source: "JejuSoul Torque Pro CSV"
          verified: false
          notes: >
            Torque letter o=B14 → ISO-TP 14 → WiCAN B16.

        VCU_MCU_TEMP:
          expression: "B22"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "215"
          source: "JejuSoul Torque Pro CSV"
          verified: false
          notes: >
            Torque letter u=B20 → ISO-TP 20 → WiCAN B22.

    21F2:
      period: 0
      enabled: false
      availability: [charging]
      notes: >
        69 bytes. Discovered during charging PID scan (2026-04-18).
        Raw payload: 61F2FF000000084566003FC6AE1101877F00000000000000000000000000...
        Undecoded — needs analysis.

        2026-07-19: charge timer schedule and precondition timestamp? -> no change
        2026-07-19: charger power limit setting? -> no change

  research:
    - type: verify
      target: "2101"
      status: pending
      priority: P1
      prerequisite: [acc]
      notes: >
        Several unverified params: CAR_READY (B26:3) causes OOB on 22-byte response, PARK_BRAKE (B26:5) same issue, ACCEL_PEDAL_DEPTH (B17), LDC_INHIBIT (B11:7),
        MCU_STATE (B11:6).
        Also ECO/Sport/Normal mode (B10 upper nibble?) and regen mode unknown.
      what_to_test:
        - "CAR_READY (B26:3) — OOB on 22-byte response, try with ACC on"
        - "PARK_BRAKE (B26:5) — same OOB issue"
        - "ECO/Sport/Normal mode — suspected in B10 upper nibble"
        - "Regen mode (off/1/2/3) — location unknown"
      sources:
        - "Kia Niro PR — CAR_READY/PARK_BRAKE"
        - "Obsidian: VCU.md"
    - type: decode
      target: "2102"
      status: captured
      priority: P1
      prerequisite: [ready, charging]
      notes: "27 bytes captured. Expected: heat sink temp (val-40), inverter input voltage (val*2), MCU temp (val-40), motor actual speed RPM (signed 16-bit)."
      sources:
        - "Obsidian: VCU.md — 23 bytes captured 2025-08-07"
        - "38kWh profile — B20*3.97+2.3 speed formula"

    - type: scan
      target: "22 E001-E010"
      status: pending
      priority: P1
      prerequisite: [acc]
      notes: >
        Ioniq 5 cross-ref: E001 vehicle speed, E002 motor RPM, E004 accel pedal/speed HD/aux voltage, E005 disconnector, E006 drive mode, E007 regen level, E008 torque request, E009 actual regen torque, E00A odometer, E00B motor temp, E00C inverter cooling temp, E010 gear state."
        2026-07-19: 22E001 -> NRC 0x12 (subFunctionNotSupported)

      sources:
        - "OBDb Ioniq 5"
        - "ChatGPT"
    - type: verify
      target: "2101 speed"
      status: pending
      priority: P1
      prerequisite: [ready]
      notes: >
        2026-07-20: RESOLVED unit = MPH (not km/h). Field is MPH×100 big-endian at [B20:B21];
        expression now converts to km/h. Confirmed against dashboard at 3 points → constant +5.1%
        speedo over-read. STILL PENDING: GPS + multi-point confirmation across full speed range, and
        confirm the B21 low byte (vs B19) definitively. Also capture ESC 22C101 REAL_SPEED_KMH (B12)
        while driving to verify it as the true dashboard speed source.
    - type: scan
      target: "0x7E1 22 0101-0105"
      status: pending
      priority: P3
      prerequisite: [acc]
      notes: "Powertrain address — test if anything responds."
