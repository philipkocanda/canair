
# ─── VCU (Vehicle Control Unit) ──────────────────────────────────────
#
# Sometimes referred to as VMCU, though the distinction is vague..
#
# The VCU is the logical brain of the EV powertrain:
# - Torque requests (accelerator input, cruise control)
# - Drive mode logic
# - Regen braking strength (0-1-2-3) and brake blending
# - Coordination between motor, inverter, battery, and safety systems
# - Suspected: preconditioning, charge timer, charge power limit settings (station/portable).
#
# The Vehicle Control Unit (VCU) and Motor Control Unit (MCU)
# are both part of the Electronic Powertrain Control Unit (EPCU) physical housing.
#
VCU:
  tx_id: 0x7E2
  availability: [ready, charging]
  pids:
    2101:
      period: 2500
      enabled: true
      availability: [ready, charging]
      parameters:
        VEHICLE_SPEED:
          expression: "((S20*256)+B19)/60"
          unit: km/h
          ha_class: speed
          min: "0"
          max: "255"
          verified: false
          notes: >
            16-bit: high byte S20 (signed, for reverse/regen roll-back), low byte B19 (unsigned), divided by 60.
            2026-07-20: divisor corrected to /60 (was *1.609344/100). The ITStromer community PID sheet gives
            "Real Vehicle Speed = ((Signed(o)*256)+n)/60" (o=B20, n=B19) — /60 yields km/h directly, matching
            the dashboard within ~1.5% (83/96/109 cluster vs 82.6/94.2/110.3 decoded). The earlier mph theory
            (*1.609/100) read ~4-5% low — a contrived fit; /60 is the internal vehicle speed (≈ dash).
            Reads exactly 0 at park (B19=B20=0 in all parked frames; B19 is a smooth 16-bit low byte while
            accelerating). Original ((S20*256)+S19)/100 also had the low byte read *signed* (corrupting B19≥0x80).
            WARNING: do NOT use B21 as the low byte — B21 is a separate signal, non-zero/jittery at standstill.
            NOTE: a distinct wheel-speed source exists at ESC 0x7D1 22C101 REAL_SPEED_KMH (B12).

        ACCEL_PEDAL_DEPTH:
          expression: "B18/2"
          unit: "%"
          ha_class: ""
          min: "0"
          max: "100"
          source: "ITStromer community PID sheet (Accel Pedal Depth = m/2)"
          verified: false
          notes: >
            Accelerator pedal position. 2026-07-20: from the ITStromer community sheet, confirmed by its
            controlled test (0% pedal → B18=0; pedal to floor → B18=0xC8=200 → 100%). Our captures: 0% at
            rest, 0-56% while driving, up to 86% with pedal pressed in Park. ISO-TP byte 0x0e.

        ACCEL_PEDAL_RELATED:
          expression: "B17"
          unit: ""
          min: "0"
          max: "255"
          source: "ITStromer community PID sheet (Accel Pedal Related = l)"
          verified: false
          notes: "Raw accelerator-related sensor (APS). Tracks pedal (0-254). ISO-TP byte 0x0d."

        DEBUG_DRIVE_MODE_FLAGS:
          expression: "B10"
          unit: ""
          verified: true
          notes: "Raw byte — individual bits below"

        DRIVE_MODE_P:
          expression: "B10:0"
          unit: ""
          verified: true
          notes: ""

        DRIVE_MODE_R:
          expression: "B10:1"
          unit: ""
          verified: true
          notes: ""

        DRIVE_MODE_N:
          expression: "B10:2"
          unit: ""
          verified: true
          notes: ""

        DRIVE_MODE_D:
          expression: "B10:3"
          unit: ""
          verified: true
          notes: ""

        DEBUG_VEHICLE_STATE_FLAGS:
          expression: "B11"
          unit: ""
          verified: false
          notes: "Raw byte — individual bits below"

        VEHICLE_STATE_BRAKE_LAMP:
          expression: "B11:0"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_NOT_BRAKING:
          expression: "B11:1"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_START_KEY:
          expression: "B11:2"
          unit: ""
          verified: false
          notes: ""

        VEHICLE_STATE_EV_READY:
          expression: "B11:3"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_VCU_READY:
          expression: "B11:4"
          unit: ""
          verified: true
          notes: ""

        VEHICLE_STATE_MAIN_RELAY_ON:
          expression: "1-B11:5"
          unit: ""
          verified: false
          notes: "Inverted from MAIN_RELAY_OFF bit. 1=relay closed (normal Ready/charging), 0=relay open (car off)."

        VEHICLE_STATE_POWER_ENABLE:
          expression: "B11:6"
          unit: ""
          verified: false
          notes: ""

        VEHICLE_STATE_LDC_ENABLED:
          expression: "1-B11:7"
          unit: ""
          verified: false
          notes: "Inverted from LDC_INHIBIT bit. 1=LDC active, 0=inhibited."

        DEBUG_MCU_STATE_FLAGS:
          expression: "B12"
          unit: ""
          source: "AutoPID config (on device)"
          verified: true
          notes: "Present in AutoPID but not in vehicle profile"

        CAR_READY:
          expression: "B26:3"
          unit: ""
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: false
          notes: ""

        PARK_BRAKE:
          expression: "B26:5"
          unit: ""
          source: "Kia Niro EV WiCAN PR#716"
          source_links:
            - https://github.com/meatpiHQ/wican-fw/pull/716
          verified: false
          notes: ""

        VCU_UNKNOWN:
          expression: "B20/2"
          unit: "%"
          min: "0"
          max: "100"
          source: "ImHex pattern (@ 0x0E) + JejuSoul Torque Pro CSV"
          source_links:
            - https://docs.google.com/spreadsheets/d/1R2dW_4-ANg04TQdkHH52-8wdYItBkWDfppcsqOc-m1M
          verified: false
          notes: >
            ImHex offset 0x0E + 2 = B16. Ioniq 5 OBDb confirms at bix 96, len 8, div 2.
            2026-07-19: Implausible - fixed at 17% during charging
            2026-07-19: Could be regen/drive mode?

    2102:
      period: 5000
      enabled: true
      availability: [ready, charging]
      parameters:
        VCU_INVERTER_INPUT_VOLTAGE:
          expression: "B17*2"
          unit: V
          ha_class: voltage
          min: "0"
          max: "450"
          source: "Kia Soul EV VMCU CSV (Inverter Input Voltage = f*2)"
          verified: true
          notes: >
            HV DC-link (= battery pack) voltage. 2026-07-20: identified via Kia Soul EV VMCU
            reference (0x7E2, "Inverter Input Voltage = f*2"). Old guess B10*2 gave ~2V (B10=0x01, wrong).
            B17*2 reads 364–382V in ready/driving across 1317 captures (range 28–412V over all states),
            matching BMS pack voltage (~369V) and LDC HV input (~353V) — the inverter DC-link is the pack.
            Cross-validated while charging (2026-07-20, SOC 94%): B17*2 = 396V vs BMS pack 396.4V — spot on.
            NOTE: Soul's letter positions do NOT transfer directly (its f = our B17, its e = our B18);
            the Ioniq VCU 2102 field order differs from the Soul VMCU.

        VCU_AUX_BATTERY_VOLTAGE:
          expression: "B18/10"
          unit: V
          ha_class: voltage
          min: "0"
          max: "16"
          enabled: false
          source: "Kia Soul EV VMCU CSV (Aux Battery Voltage = e/10)"
          verified: false
          notes: >
            DISABLED 2026-07-20: B18/10 does NOT match the 12V aux battery. Charging cross-check (SOC 94%) read
            14.8V while the actual 12V bus was 12.8V per BOTH BMS AUX_BATTERY_VOLTAGE (12.80V) and LDC_OUTPUT_V
            (12.81V). It tracked plausibly (~12.3-13.6V) in READY but reads ~2V high under charge — likely an LDC
            output target/command rather than the battery terminal. Use BMS AUX_BATTERY_VOLTAGE or LDC_OUTPUT_V
            for the real 12V. Kept for research trail; excluded from profile.

        # VCU_MOTOR_RPM:
        #   expression: "((S7<<8)|B6)"
        #   unit: RPM
        #   enabled: false
        #   source: "JejuSoul Torque Pro CSV"
        #   verified: false
        #   notes: >
        #     DISABLED 2026-07-20: B6/B7 (ISO-TP 4,5) are always 0x00 across all VCU captures → always 0.
        #     The Ioniq splits the inverter into a separate MCU ECU (0x7E3); live motor RPM/torque/phase-current
        #     are in MCU 2102 (see MCU_MOTOR_RPM), not VCU 2102. Kept for research trail; excluded from profile.

        # VCU_HEAT_SINK_TEMP:
        #   expression: "B16"
        #   unit: "°C"
        #   ha_class: temperature
        #   min: "-40"
        #   max: "215"
        #   enabled: false
        #   source: "JejuSoul Torque Pro CSV"
        #   verified: false
        #   notes: >
        #     DISABLED 2026-07-20: B16 is an ISO-TP PCI byte (0x22), not data — the 34°C it "reads" is the
        #     frame header, coincidental garbage. No valid heat-sink temp found in VCU 2102: candidate bytes
        #     (B14/B20/B25/B27) are identical between a cold April parked capture and a hot July drive → constants,
        #     not temps. Inverter/motor temps are likely in MCU 0x7E3. Kept for research trail; excluded from profile.

        # VCU_MCU_TEMP:
        #   expression: "B22"
        #   unit: "°C"
        #   ha_class: temperature
        #   min: "-40"
        #   max: "215"
        #   enabled: false
        #   source: "JejuSoul Torque Pro CSV"
        #   verified: false
        #   notes: >
        #     DISABLED 2026-07-20: B22 is dynamic (0–120, correlates weakly with speed), not a stable temperature.
        #     MCU/inverter temps are likely in MCU 0x7E3, not VCU 2102. Kept for research trail; excluded from profile.

    21F2:
      period: 0
      enabled: false
      availability: [charging]
      notes: >
        69 bytes. Discovered during charging PID scan (2026-04-18).
        Raw payload: 61F2FF000000084566003FC6AE1101877F00000000000000000000000000...
        Undecoded — needs analysis.

        2026-07-19: charge timer schedule and precondition timestamp? -> no change
        2026-07-19: charger power limit setting? -> no change

  research:
    - type: verify
      target: "2101"
      status: pending
      priority: P1
      prerequisite: [acc]
      notes: >
        Several unverified params: CAR_READY (B26:3) causes OOB on 22-byte response, PARK_BRAKE (B26:5) same issue, ACCEL_PEDAL_DEPTH (B17), LDC_INHIBIT (B11:7),
        MCU_STATE (B11:6).
        Also ECO/Sport/Normal mode (B10 upper nibble?) and regen mode unknown.
      what_to_test:
        - "CAR_READY (B26:3) — OOB on 22-byte response, try with ACC on"
        - "PARK_BRAKE (B26:5) — same OOB issue"
        - "ECO/Sport/Normal mode — suspected in B10 upper nibble"
        - "Regen mode (off/1/2/3) — location unknown"
        - "ACCEL_PEDAL — Kia Soul VMCU has 'Accel Pedal Related=i' + 'Accel Pedal Depth=j/2' (%). In our 2101, B17 and B18 are 0 when truly parked (P) and active while driving — strong candidates. Press pedal while stationary in Ready to confirm which is depth (÷2 for %) and the raw-related byte."
      sources:
        - "Kia Niro PR — CAR_READY/PARK_BRAKE"
        - "Kia Soul EV VMCU CSV — accel pedal (i, j/2), drive-mode/state bits"
        - "Obsidian: VCU.md"
    - type: decode
      target: "2102"
      status: captured
      priority: P1
      prerequisite: [ready, charging]
      notes: >
        27 bytes. 2026-07-20 (Kia Soul EV VMCU cross-ref, 0x7E2): mapped INVERTER_INPUT_VOLTAGE=B17*2
        (verified vs BMS pack ~369V) and AUX_BATTERY_VOLTAGE=B18/10 (~12–13.6V). KEY FINDING: the Ioniq
        redistributes the Soul VMCU payload — motor RPM/torque/heat-sink & MCU temp/phase currents are NOT
        in VCU 2102 (candidate temp bytes are constant across cold/hot sessions; no byte tracks speed like RPM).
        Those live in the separate MCU ECU (0x7E3). Soul letter positions also don't transfer 1:1
        (Soul e/f = our B18/B17, transposed). Disabled the old bogus params (MOTOR_RPM/HEAT_SINK/MCU_TEMP).
      what_to_test:
        - "Re-map motor RPM/torque/temps under MCU 0x7E3 2101/2102 using the Soul VMCU scalings as a guide"
        - "Confirm B17 HV voltage with a same-instant BMS read while driving"
      sources:
        - "Kia Soul EV VMCU CSV — 0x7E2 (Inverter f*2, Aux e/10, temps w/x/y-40, RPM/torque 16-bit)"
        - "Obsidian: VCU.md — 23 bytes captured 2025-08-07"
        - "38kWh profile — B20*3.97+2.3 speed formula"

    - type: scan
      target: "22 E001-E010"
      status: pending
      priority: P1
      prerequisite: [acc]
      notes: >
        Ioniq 5 cross-ref: E001 vehicle speed, E002 motor RPM, E004 accel pedal/speed HD/aux voltage, E005 disconnector, E006 drive mode, E007 regen level, E008 torque request, E009 actual regen torque, E00A odometer, E00B motor temp, E00C inverter cooling temp, E010 gear state."
        2026-07-19: 22E001 -> NRC 0x12 (subFunctionNotSupported)

      sources:
        - "OBDb Ioniq 5"
        - "ChatGPT"
    - type: verify
      target: "2101 speed"
      status: pending
      priority: P1
      prerequisite: [ready]
      notes: >
        2026-07-20: RESOLVED unit = MPH (not km/h) and low byte = B19 (unsigned), high byte = S20 (signed).
        Expression ((S20*256)+B19)*1.609344/100 reads 0 at park (verified live) and ~+4% under dashboard.
        An interim revision wrongly used B21 as low byte → non-zero jittery speed while parked (B21 is a
        separate signal, 67–150 at standstill); reverted to B19. STILL PENDING: GPS + multi-point
        confirmation across full speed range. Also capture ESC 22C101 REAL_SPEED_KMH (B12)
        while driving to verify it as the true dashboard speed source.
    - type: scan
      target: "0x7E1 22 0101-0105"
      status: pending
      priority: P3
      prerequisite: [acc]
      notes: "Powertrain address — test if anything responds."
