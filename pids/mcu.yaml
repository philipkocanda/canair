
# ─── MCU (Motor Control Unit) ─────────────────────────────────────────
#
# This is the power electronics + control for the traction motor.
#
# Responsibilities:
# - Inverter switching (DC → 3-phase AC)
# - Motor torque/current control loops
# - Rotor position handling
# - Thermal protection of motor/inverter
#
# The Vehicle Control Unit (VCU) and Motor Control Unit (MCU)
# are both part of the Electronic Powertrain Control Unit (EPCU) physical housing.
#
# Full service 21 scan (01-FF) during AC charging (2026-04-18):
#   0x01 (34 bytes), 0x02 (62 bytes), 0x03 (27 bytes, all zeros), 0xF2 (69 bytes).
MCU:
  tx_id: 0x7E3
  availability: [ready, charging]
  pids:
    2101:
      period: 5000
      enabled: false
      availability: [charging]  # TODO: likely also ready — verify with ignition on
      notes: >
        34 bytes. Captured but not decoded.
        Raw payload (charging): 6101000003FF083801268D7F390000000A00460253044F397A007A000CFF...
      parameters: {}

    2102:
      period: 5000
      enabled: true
      availability: [charging]  # TODO: likely also ready — verify with ignition on
      parameters:
        MCU_MOTOR_RPM:
          expression: "[S10:S11]"
          unit: RPM
          ha_class: ""
          min: "-10500"
          max: "10500"
          source: "Kia Soul EV VMCU CSV (Motor Actual Speed RPM) + physical validation"
          source_links: []
          verified: true
          notes: >
            Signed 16-bit big-endian at B10:B11 (ISO-TP 0x07:0x08). 2026-07-20: verified against
            VCU vehicle speed across 179 driving samples — rpm/speed ratio = 62.8 (median), matching the
            physical single-speed reduction (gear 7.412 × 205/55R16 tyre ≈ 61.8 rpm per km/h). Reads 0 at
            park (live READY capture) and peaks ~6650 at 107 km/h; slightly negative during regen/rock-back.
            Old expr ((S7<<8)|B6) read B6/B7 (0xFF 0xFF) = -1 — wrong bytes.

        MCU_MOTOR_TORQUE:
          expression: "[S12:S13]/100"
          unit: Nm
          ha_class: ""
          min: "-300"
          max: "300"
          source: "ITStromer community PID sheet (Motor Torque Command / Estimated Torque)"
          source_links: []
          verified: false
          notes: >
            Motor torque, signed 16-bit big-endian at B12:B13 (ISO-TP 0x09:0x0A), the pair right after
            MCU_MOTOR_RPM [S10:S11]. 2026-07-20 fix: previous ((S12*256)+B11)/10 reused B11 (the RPM low
            byte) and its ÷10 scale gave ±3226 Nm across all captures — 10× the motor's ~295 Nm limit.
            [S12:S13]/100 reads −249..+324 Nm (cruise small +ve, hard accel ~+300, regen ~−250) — physical.
            Scale/bytes inferred from range; not yet correlated with pedal/accel, so still unverified.

        MCU_TEMP_1:
          expression: "S20"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "150"
          source: "ITStromer community PID sheet (temp?)"
          verified: false
          notes: >
            Candidate motor/inverter temperature (community sheet 'temp?', Signed byte). 2026-07-20: reads
            13°C at park (~ambient 18°C, cold-soaked), 10-22°C range — plausible but barely warmed on a short
            cool drive. ISO-TP 0x10.

        MCU_TEMP_2:
          expression: "S21"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "150"
          source: "ITStromer community PID sheet (temp?)"
          verified: false
          notes: >
            Candidate motor/inverter temperature (community sheet 'temp?', Signed byte). 2026-07-20: 13°C at
            park, 10-34°C range — warms more than MCU_TEMP_1 under load (likely inverter/IGBT vs motor).
            ISO-TP 0x11. Needs a longer/warmer drive to confirm.

    2103:
      period: 0
      enabled: false
      availability: [charging]
      notes: >
        27 bytes, all zeros during AC charging.
        Raw payload: 610300000000000000000000000000000000000000000000000000
        May contain data during driving. Discovered 2026-04-18.
      parameters: {}

    21F2:
      period: 0
      enabled: false
      availability: [charging]
      notes: >
        69 bytes. Discovered during charging PID scan (2026-04-18).
        Raw payload: 61F2FFFFFF3FF6FFF8FF7DD60900000000000000000003050000EE04CDABC2CD4C00F0F32B002A041D002900000012000F001100C1CD967393222D4548454C2D4D53320000
        Undecoded — needs analysis.
        2026-07-19: Contains a part of the ECU sw_id string ("-EHEL-MS2"), so likely to be static.
      parameters: {}
  research:
    - type: decode
      target: "2102"
      status: captured
      priority: P1
      prerequisite: [charging]
      notes: >
        62 bytes. 2026-07-20: MOTOR_RPM verified at [S10:S11] (signed BE), not the old E:F guess.
        Remaining Soul VMCU fields (0x7E2 on Soul, split into this MCU on Ioniq) still to place:
        motor torque command / estimated torque (signed 16-bit, ±Nm), phase-current RMS, and the
        U/V-phase + resolver current-sensor offsets. The offset/calibration block sits around B27–B47
        (static bytes 7D D6 CD AB C2 CD ... — the same pattern appears in 21F2 alongside the "EHEL-MS2"
        cal ID, confirming it is calibration data). Torque bytes near B12–B15 swing the full ±32k, so
        they read like phase-current values; separating torque needs a time-synced VCU+MCU drive capture.
      what_to_test:
        - "Torque: best candidate so far is [S17:S18] (~0 at park, r=+0.42 vs dRPM) but it stays >=0 (0..2069), so likely |torque|/output power, not signed torque. Confirm with regen/braking segments where signed torque must go negative."
        - "Phase-current RMS: Soul Int16(v:u); expect ~0 at park, rises with torque"
        - >
          CAPTURE METHOD: WebSocket polling is sequential over one connection and the stored
          timestamp is per-cycle (not per-PID acquisition), so VCU 2101 and MCU 2102 are skewed
          ~0.3-3s and cannot be tightly synced across ECUs. Mitigation: poll ONLY the two PIDs,
          dense + back-to-back:  canreq --multi "query VCU 2101" "query MCU 2102" --monitor 1
          --keep-all --save --wican vpn  (drive with hard launches, lift-off/regen, and braking;
          run long enough to warm the inverter for the temp mapping). NOTE: torque RPM are BOTH in
          MCU 2102, so torque needs no cross-ECU sync - just finer dRPM (dense sampling) + regen data.
      sources:
        - "Kia Soul EV VMCU CSV — RPM/torque (signed 16-bit), phase current + resolver offsets (Int16)"
        - "Obsidian: MCU.md"
    - type: decode
      target: "2101"
      status: captured
      priority: P1
      prerequisite: [ready]
      notes: >
        34 bytes. 2026-07-20: live READY capture at ~18°C ambient did NOT yield clean temps —
        candidate bytes are bimodal/constant (B10 = 4 or 56, B15 ≈ constant 57, B13 tight ~150),
        i.e. status/calibration, not motor/inverter/heat-sink temps. The July drive was short and cool,
        so components barely warmed. Re-attempt temp mapping (Soul motor/MCU/heat-sink = val-40) after a
        longer drive that heats the inverter, comparing cold-soak vs warm bytes. Also search for HV DC-link
        voltage here (VCU 2102 has B17*2; MCU may carry its own).
      sources:
        - "Kia Soul EV VMCU CSV — temps (w/x/y - 40)"
        - "Obsidian: MCU.md"
        - "OBDb Ioniq 5 MCU 22E001"
    - type: decode
      target: "2103"
      status: captured
      priority: P2
      prerequisite: [charging]
      date: "2026-04-18"
      notes: "27 bytes, all zeros during charging. May contain data while driving."
    - type: decode
      target: "21F2"
      status: captured
      priority: P2
      prerequisite: [charging]
      date: "2026-04-18"
      notes: "69 bytes. Discovered during charging scan. Undecoded."
    - type: scan
      target: "22 E001-E010"
      status: pending
      priority: P1
      prerequisite: [acc]
      notes: "Ioniq 5 cross-ref: E001 ignition voltage/motor RPM/torque/phase current/temps, E009 electric water pump/oil pump."
      sources:
        - "OBDb Ioniq 5"
    - type: iocontrol_scan
      target: "2F E000-E0FF"
      status: pending
      priority: P2
      prerequisite: [acc]
      notes: "MCU IOControl E0xx range."
