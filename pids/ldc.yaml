
# ─── LDC / OBC (Low-Voltage DC-DC Converter / On-Board Charger) ─────
#
# Combines functions of the LDC and OBC into a single ECU. This ECU is responsible for:
# - Converting high-voltage DC from the traction battery to low-voltage DC for the 12V system (LDC function).
# - Managing AC charging of the traction battery (OBC function).
# - Reporting various voltages, currents, and temperatures related to the LDC and OBC.
#
# The challenge here is disambiguating the LDC and OBC parameters.
# IDEA: Compare between charging (OBC active) and non-charging in READY-mode (LDC active) to identify which parameters belong to which function.
#
# CarScanner identifies ECU 0x7E5 as "AEV**LDC**53" on Ioniq 2017.
# Response to PID 2101 is 48 ISO-TP bytes (56 WiCAN bytes).
# PID 2103 returns NRC 0x12 (subFunctionNotSupported) — does not exist on Ioniq 2017.
# Original Niro PR#716 formulas (B52-B55, B60-B61) are WRONG for Ioniq —
# they reference bytes beyond the Ioniq's shorter response (zero padding / OOB).
# Correct byte offsets decoded from live captures during AC charging (2026-04-14).
#
#
LDC:
  tx_id: 0x7E5
  availability: [ready, charging, acc2]
  pids:
    2101:
      period: 5000
      enabled: true
      availability: [ready, charging, acc2]
      parameters:
        LDC_HV_INPUT_V:
          expression: "[B12:B13]/100"
          unit: V
          ha_class: voltage
          min: "0"
          max: "500"
          source: "Decoded from live captures (2026-04-14)"
          source_links: []
          verified: true
          notes: "HV battery input voltage to LDC. Cross-validated: matches BMS BATTERY_VOLTAGE (353.45V vs 353.3V). ISO-TP bytes 9-10."

        LDC_OUTPUT_V:
          expression: "[B25:B26]/100"
          unit: V
          ha_class: voltage
          min: "0"
          max: "20"
          source: "Decoded from live captures (2026-04-14)"
          source_links: []
          verified: true
          notes: "LDC 12V system output voltage. Reads 14.52V during charging — correct for 12V system under charge. ISO-TP bytes 20-21."

        LDC_TEMP:
          expression: "B21-40"
          unit: "°C"
          ha_class: temperature
          min: "-40"
          max: "120"
          source: "Decoded from live captures (2026-04-14)"
          source_links: []
          verified: false
          notes: >
            2026-04-14: LDC converter temperature? Increased gradually 35→36°C between captures ~2 min apart during AC charging.
            2026-07-19: implausible -> 14°C after long drive on a very hot day, and varies way too much during charging

        OBC_CHARGE_V:
          expression: "[B10:B11]/100"
          unit: V
          ha_class: voltage
          min: "0"
          max: "500"
          source: "Decoded from live captures (2026-04-14)"
          source_links: []
          verified: true
          notes: "OBC DC output voltage (charge voltage into battery). Reads ~370V during AC charging — higher than HV battery voltage as expected. ISO-TP bytes 7-8."

        LDC_OUTPUT_A:
          expression: "B15/10"
          unit: A
          ha_class: current
          min: "0"
          max: "40"
          source: "Decoded from live captures (2026-04-14)"
          source_links: []
          verified: false
          notes: "LDC output current to 12V system. Changed 11.7→9.4A between captures — plausible for varying 12V load. ISO-TP byte 12. Medium confidence."

        OBC_DC_A:
          expression: "[B17:B18]/100"
          unit: A
          ha_class: current
          min: "0"
          max: "50"
          source: "Decoded from live captures (2026-04-14)"
          source_links: []
          verified: true
          notes: "DC output current during charging. Reads 2.85A — close to BMS charging current (~2.6A). Constant between captures. ISO-TP bytes 13-14. Medium confidence."

        OBC_PILOT_DUTY:
          expression: "B47/3"
          unit: "%"
          ha_class: ""
          min: "0"
          max: "100"
          source: "Ioniq PID sheet (Torque am)"
          source_links:
            - https://docs.google.com/spreadsheets/d/1R2dW_4-ANg04TQdkHH52-8wdYItBkWDfppcsqOc-m1M
          verified: false
          notes: >
            EVSE pilot duty cycle.
            Value is 6 when charging at 6 Amps AC.
            Value is briefly 4.33 then constant at 32.33 when increasing charging speed to 8 Amps AC.
            Value is 39.67 when increasing charging speed to 10 Amps AC
            After a while down to 22.67 then 32 (still at 10 Amps AC)
            ISO-TP byte 39. Torque letter am.

        OBC_TEMP_HEATSINK:
          expression: "S15"
          verified: false
          notes: >
            WIP - Needs verification
            2026-07-19: Seems implausible (varies wildly: [-119, -106, 118, 126, 123, -114, -118, -127, 98, 103, 112, 111, 121, -125])

        OBC_TEMP_INSIDE:
          expression: "S16"
          verified: false
          notes: >
            WIP - Needs verification
            2026-07-19: Seems plausible (static at 34°C after several hours of AC charging)

        OBC_TEMP_WATER:
          expression: "S17"
          verified: false
          notes: >
            WIP - Needs verification
            2026-07-19: Implausible (static value of 1)


        OBC_AC_INPUT_V:
          expression: "B15"
          verified: false
          notes: >
            WIP - Needs verification
            2026-07-19: ?

        # notes: "Some params unverified: OBC_TEMP_HEATSINK (S15), OBC_TEMP_INSIDE (S16), OBC_TEMP_WATER (S17), OBC_DC_V ([B18:B19]/10), OBC_AC_V ([B20:B21]/10), LDC temp (val-100), DC volt out (/10)."

    2102:
      period: 5000
      enabled: false
      availability: [charging, acc2]
      notes: >
        34 bytes. Also responds in ACC2 (not just charging). Returns NRC when car is fully off.
        Discovered during charging PID scan (2026-04-18).
        Raw payload: 6102FFFC0000684F792A694A79286E847927650F791B7499791F7293792B...
        Undecoded — needs analysis.
      parameters: {}

  research:
    - type: decode
      target: "2101"
      status: captured
      priority: P1
      prerequisite: [ready, charging]
      notes: "Some params unverified: OBC_TEMP_HEATSINK (S15), OBC_TEMP_INSIDE (S16), OBC_TEMP_WATER (S17), OBC_DC_V ([B18:B19]/10), OBC_AC_V ([B20:B21]/10), LDC temp (val-100), DC volt out (/10)."
      what_to_test:
        - "OBC temps (S15/S16/S17)"
        - "OBC DC/AC voltage"
        - "LDC temp and DC volt out"
      sources:
        - "Kia Niro PR#660"
    - type: decode
      target: "2102"
      status: done
      priority: P3
      prerequisite: [charging]
      date: "2026-04-19"
      notes: >
        34 bytes captured during charging. Payload identical across Apr 14 and Apr 19 sessions —
        static factory calibration data, not live measurements. Structure after header (6102 FFFC 0000):
        7 pairs of uint16 big-endian values alternating (variable, 79xx reference).
        Variable values: 684F, 694A, 6E84, 650F, 7499, 7293, 7482 (range 25871-29849).
        Reference values: 792A, 7928, 7927, 791B, 791F, 792B, 7931 (range 30971-30993).
        Likely ADC calibration table. Low priority — no live data value.
    - type: scan
      target: "22 E001-E011"
      status: done
      priority: P2
      prerequisite: [charging]
      date: "2026-04-19"
      notes: "All 17 DIDs return NRC 0x12 (subFunctionNotSupported) — both default and extended session. LDC also rejects 10 03 with NRC 0x12. Service 22 not supported on Ioniq 2017 LDC. Ioniq 5 cross-ref does not apply."
      sources:
        - "OBDb Ioniq 5"
