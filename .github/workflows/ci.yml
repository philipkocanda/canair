name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-extras --dev --group docs

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (ty)
        run: uv run ty check

      - name: Validate bundled profile data
        # The repo bundles more than one profile, so `validate all` can't
        # auto-resolve a single one — validate each bundled profile explicitly.
        run: |
          for p in profiles/*/; do
            name="$(basename "$p")"
            echo "::group::validate $name"
            uv run canair --profile "$name" validate all
            echo "::endgroup::"
          done

      - name: CLI reference is current
        run: uv run python scripts/gen_cli_reference.py --check

      - name: Docs build (mkdocs --strict)
        run: uv run mkdocs build --strict --site-dir /tmp/site

      - name: Tests
        run: uv run pytest -q
